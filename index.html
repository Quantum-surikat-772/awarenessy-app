<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#top{
flex:1;
display:flex;
}

#app{
height:100vh;
display:flex;
flex-direction:column;
}

#bottom{
padding:10px;
}

.btn{
flex:1;
height:50px;
border-radius:12px;
border:1px solid #333;
background:#111;
font-size:14px;
font-weight:700;
}

.wake{
color:#c9a86a; /* золото */
}

.dream{
color:#69b7ff; /* голубой */
}

#header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
border-bottom:1px solid #222;
}

#brand{
color:#c9a86a;
font-weight:700;
font-size:16px;
}

#brandWrap{
display:flex;
flex-direction:column;
}

#sub{
font-size:11px;
color:#777;
margin-top:2px;
}

#langs button{
background:none;
border:none;
color:#aaa;
font-size:13px;
margin-left:6px;
}

#langs button.active{
color:#fff;
}

#modal{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999;
overflow:hidden;
}

/* Эмиссар */

.emissaryWrap{
position:absolute;
top:20%;
left:55%;
transform:translateX(-50%);
width:100%;
display:flex;
justify-content:center;
}

#emissary{
width:70%;
max-width:300px;
opacity:0;
}

.emissary{
filter:blur(2px);
}

@keyframes emissaryAppear{
0%{
opacity:0;
transform:scale(0.8) translateX(0);
filter:blur(6px);
}
50%{
opacity:0.6;
filter:blur(2px);
}
100%{
opacity:0;
transform:scale(2) translateX(20%);
filter:blur(0);
}
}

/* текст */

#msg{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:80%;
max-width:360px;
text-align:left;
line-height:1.5;
opacity:0;
}

/* кнопка */

#backBtn{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
height:50px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:#fff;
}

#settingsBtn:hover{
background:rgba(255,255,255,0.15);
}

/* 🔴 режим аномалии */

body.alert{
background:#c00000;
}

body.alert .btn{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.25);
}

body.alert .wake,
body.alert .dream{
color:#fff;
}

body.alert #brand{
color:#fff;
}

body.alert #langs button{
color:#eee;
}

body.alert{
background:#c00000;
animation:pulse 2.5s ease-in-out infinite alternate;
}

@keyframes pulse{
0%{background:#b00000;}
100%{background:#d00000;}
}

.anomalyText{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:800;
text-align:center;

opacity:0;
transform:scale(0.95);
animation:fadeIn 4s ease forwards;
}

@keyframes fadeIn{
to{
opacity:1;
transform:scale(1);
}
}

body.alert::after{
content:"";
position:fixed;
inset:0;
background:rgba(255,255,255,0.03);
pointer-events:none;
animation:glitch 0.8s infinite;
}

@keyframes glitch{
0%{opacity:0;}
50%{opacity:0.04;}
100%{opacity:0;}
}

@keyframes fadeIn{
0%{
opacity:0;
transform:scale(0.92);
filter:blur(6px);
}
60%{
opacity:0.6;
filter:blur(2px);
}
100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}
}

#settingsBtn{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:90%;
height:50px;

border-radius:12px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.08);
color:#fff;

opacity:0;
transition:1s ease;
}

</style>
</head>

<body>

<div id="app">
<div id="header"></div>

<div id="top">TOP OK</div>
<div id="bottom">BOTTOM OK</div>
</div>

<script>

const HAND_IMG = "https://i.postimg.cc/zXp9BVGf/Hands-1.png";
const HAND_VIDEO = "https://i.imgur.com/ocTkSQj.mp4";

const state = {
lang: "ru"
};

const TXT = {

ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения Осознанности",
wake:"ЯВЬ",
dream:"СОН",
settings:"Настройка",
back:"Назад",

special:"ЭТО НЕ СОН?",
  
intro:[
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя сейчас настроение?"
],

emissary:`ЗДРАВСТВУЙ

Я — Эмиссар Сновидений

На русском языке меня зовут ОСоЗНАЙКА!

ОС — Осознанное Сновидение + Знание

Я твой Друг и Попутчик на Пути Осознания

Я смотрю из глубины твоего Внимания

Напоминаю об осознанности

Настрой частоту напоминаний,
и я буду с тобой

И я отвечу на вопросы
в этом Приложении

Мы встретимся.`
},

en:{
brand:"AWARENESSY!",
sub:"Awareness training mediator",
wake:"WAKE",
dream:"DREAM",
settings:"Settings",
back:"Back",

special:"IS THIS A DREAM?",
  
intro:[
"What were you doing 5 minutes ago?",
"I observe...",
"Where is your Home?",
"Look at your hands",
"How do you feel?"
],

emissary:`HELLO

I am the Dream Emissary

I observe from within your attention

I remind you of awareness

We will meet.`
},

es:{
brand:"¡CONCIENCITO!",
sub:"Facilitador de consciencia",
wake:"VIGILIA",
dream:"SUEÑO",
settings:"Ajustes",
back:"Volver",

special:"¿ESTO ES UN SUEÑO?",
  
intro:[
"¿Qué hacías hace 5 minutos?",
"Observo...",
"¿Dónde está tu hogar?",
"Mira tus manos",
"¿Cómo te sientes?"
],

emissary:`HOLA

Soy el Emisario de los Sueños

Observo desde tu atención

Te recuerdo la consciencia

Nos veremos.`
}

};

function t(key){
return TXT[state.lang][key];
}

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

window.onload = function(){
render();
};

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

function render(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

header.innerHTML = `
<div id="brandWrap">
  <div id="brand" onclick="openModal()">${t("brand")}</div>
  <div id="sub">${t("sub")}</div>
</div>

<div id="langs">
<button onclick="setLang('ru')">RU</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>
`;

// РАНДОМ
const r = Math.random();
document.body.classList.remove("alert");

let html = "";

if(r < 0.2){
document.body.classList.add("alert");

html = `<div class="anomalyText">${t("special")}</div>`;
}
else if(r < 0.5){
html = `<img src="${HAND_IMG}" style="width:120%; max-width:420px;">`;
}
else if(r < 0.75){
html = `
<video autoplay muted loop playsinline style="max-width:95%;">
<source src="${HAND_VIDEO}" type="video/mp4">
</video>`;
}
else{
html = `<div>${rand(t("intro"))}</div>`;
}

// TOP
topBox.innerHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
${html}
</div>
`;

// BOTTOM
bottomBox.innerHTML = `
<div style="display:flex;gap:10px;">
<button class="btn wake">${t("wake")}</button>
<button class="btn dream">${t("dream")}</button>
</div>
`;

}

function setLang(l){
state.lang = l;
render();
}

function openModal(){

const modal = document.getElementById("modal");
const img = document.getElementById("emissary");
const msg = document.getElementById("msg");

document.getElementById("backBtn").innerText = t("back");
document.getElementById("settingsBtn").innerText = t("settings");

modal.style.display = "block";

msg.innerHTML = "";
msg.style.opacity = 0;

// старт состояния
img.style.opacity = 0;
img.style.transform = "translateX(-55%) scale(1)";
img.style.transition = "none";

// движение
setTimeout(()=>{
img.style.transition = "6s linear";
img.style.opacity = 0.6;
img.style.transform = "translateX(-20%) scale(2)";
},50);

// после движения — текст
setTimeout(()=>{
showText();
},4000);

setTimeout(()=>{
img.style.opacity = 0;
},6500);

}

function showText(){

const msg = document.getElementById("msg");

const text = t("emissary");

msg.innerHTML = "";

const lines = text.split("\n");

lines.forEach((line,i)=>{
const d = document.createElement("div");
d.innerText = line;
d.style.opacity = 0;
d.style.transition = "1.2s ease";
msg.appendChild(d);

setTimeout(()=>{
d.style.opacity = 1;
}, i * 700);
});

const settingsBtn = document.getElementById("settingsBtn");

// время появления = последняя строка + пауза
setTimeout(()=>{
settingsBtn.style.opacity = 1;
}, lines.length * 700 + 800);

document.getElementById("settingsBtn").onclick = function(){
alert("Здесь будет настройка будильника");
};

msg.style.opacity = 1;

}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

</script>

<div id="modal">

  <div class="emissaryWrap">
    <img id="emissary" src="https://i.postimg.cc/V6gqpw1V/Emissary.png">
  </div>

  <div id="msg"></div>

  <button id="settingsBtn">Настройка</button>
  <button id="backBtn" onclick="closeModal()">Вернуться</button>

</div>

</body>
</html>
