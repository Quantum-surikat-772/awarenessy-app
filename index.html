<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#top{
flex:1;
display:flex;
}

#app{
height:100vh;
display:flex;
flex-direction:column;
transition:0.3s ease;
}

#bottom{
padding:10px;
}

.btn{
flex:1;
height:56px;

display:flex;
align-items:center;
justify-content:center;

border-radius:12px;
border:1px solid #333;
background:#111;

font-size:18px;
font-weight:600;

color:#fff;
}

.wake{
color:#c9a86a; /* золото */
}

.dream{
color:#69b7ff; /* голубой */
}

#header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
border-bottom:1px solid #222;
}

#brand{
color:#c9a86a;
font-weight:700;
font-size:16px;
}

#brandWrap{
display:flex;
flex-direction:column;
}

#sub{
font-size:11px;
color:#777;
margin-top:2px;
}

#langs button{
background:none;
border:none;
color:#aaa;
font-size:13px;
margin-left:6px;
}

#langs button.active{
color:#fff;
}

#modal{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999;
overflow:hidden;
}

@keyframes pulseGlow{
0%{
opacity:0.4;
}
50%{
opacity:1;
}
100%{
opacity:0.4;
}
}

.pulse{
animation:pulseGlow 6s ease-in-out infinite;
}

@keyframes solarBreath{

0%{
opacity:.18;
filter:brightness(1);
}

50%{
opacity:.42;
filter:brightness(1.35);
}

100%{
opacity:.18;
filter:brightness(1);
}

}

.solarSide{
animation:solarBreath 6s ease-in-out infinite;
transform-origin:center;
}

.solarA{
animation-delay:0s;
}

.solarB{
animation-delay:3s;
}

/* Эмиссар */

.emissaryWrap{
position:absolute;
top:20%;
left:55%;
transform:translateX(-50%);
width:100%;
display:flex;
justify-content:center;
}

#emissary{
width:70%;
max-width:300px;
opacity:0;
}

.emissary{
filter:blur(2px);
}

@keyframes emissaryAppear{
0%{
opacity:0;
transform:scale(0.8) translateX(0);
filter:blur(6px);
}
50%{
opacity:0.6;
filter:blur(2px);
}
100%{
opacity:0;
transform:scale(2) translateX(20%);
filter:blur(0);
}
}

@keyframes emissaryFlow {

  0%{
    opacity:0;
    transform:translateX(-55%) scale(0.9);
  }

  25%{
    opacity:0.65;
    transform:translateX(-50%) scale(1.1);
  }

  50%{
    opacity:0.65;
    transform:translateX(-40%) scale(1.5);
  }

  100%{
    opacity:0;
    transform:translateX(-10%) scale(2.1);
  }

}

/* текст */

#msg{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:80%;
max-width:360px;
text-align:left;
line-height:1.5;
opacity:0;
}

/* кнопка */

#backBtn{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
height:50px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:#fff;
}

#settingsBtn:hover{
background:rgba(255,255,255,0.15);
}

/* 🔴 режим аномалии */

body.alert{
background:#c00000;
}

body.alert .btn{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.25);
}

body.alert .wake,
body.alert .dream{
color:#fff;
}

body.alert #brand{
color:#fff;
}

body.alert #langs button{
color:#eee;
}

body.alert{
background:#c00000;
animation:pulse 2.5s ease-in-out infinite alternate;
}

@keyframes pulse{
0%{background:#b00000;}
100%{background:#d00000;}
}

.anomalyText{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:800;
text-align:center;

opacity:0;
transform:scale(0.95);
animation:fadeIn 4s ease forwards;
}

@keyframes fadeIn{
to{
opacity:1;
transform:scale(1);
}
}

body.alert::after{
content:"";
position:fixed;
inset:0;
background:rgba(255,255,255,0.03);
pointer-events:none;
animation:glitch 0.8s infinite;
}

@keyframes glitch{
0%{opacity:0;}
50%{opacity:0.04;}
100%{opacity:0;}
}

@keyframes fadeIn{
0%{
opacity:0;
transform:scale(0.92);
filter:blur(6px);
}
60%{
opacity:0.6;
filter:blur(2px);
}
100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}
}

#settingsBtn{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:90%;
height:50px;

border-radius:12px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.08);
color:#fff;

opacity:0;
transition:1s ease;
}

@keyframes pulse2{
0%{opacity:0.35;}
50%{opacity:0.12;}
100%{opacity:0.35;}
}

.pulse2{
animation:pulse2 6s ease-in-out infinite;
animation-delay:2.5s;
}

.attentionCard{

padding:14px;
border-radius:16px;

background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);

}

.attentionTitle{
font-size:18px;
font-weight:700;
margin-bottom:6px;
}

.attentionHint{
font-size:13px;
line-height:1.4;
opacity:0.6;
margin-bottom:10px;
}

.attentionInput{

width:100%;
height:48px;

border:none;
border-radius:12px;

background:#111;
color:#fff;

padding:0 14px;
font-size:18px;

}

.helpBtn{

width:22px;
height:22px;

display:inline-flex;
align-items:center;
justify-content:center;

margin-left:6px;

border:none;
border-radius:6px;

background:#6f4cff;
color:white;

font-size:14px;
font-weight:700;

flex-shrink:0;

animation:emissaryGlow 5s ease-in-out infinite;

}

@keyframes emissaryGlow{

0%{
background:#6f4cff;
box-shadow:0 0 6px rgba(111,76,255,0.35);
}

50%{
background:#304ffe;
box-shadow:0 0 14px rgba(48,79,254,0.65);
}

100%{
background:#6f4cff;
box-shadow:0 0 6px rgba(111,76,255,0.35);
}

}

</style>
</head>

<body>

<div id="app">
<div id="header"></div>

<div id="top">TOP OK</div>
<div id="bottom">BOTTOM OK</div>
</div>

<script>

const HAND_IMG = "https://i.postimg.cc/zXp9BVGf/Hands-1.png";
const HAND_VIDEO = "https://i.imgur.com/ocTkSQj.mp4";

let entries =
JSON.parse(localStorage.getItem("awarenessy_entries") || "[]");
const ENERGY = {

"#FFFFFF":  3, // Осознанное творчество

"#FFD700":  1, // Радость
"#3F51B5":  1, // Вдохновение

"#26C6DA":  0, // Мечтательность
"#808080":  0, // Нейтральность
"#FF9800":  0, // Самоуверенность

"#4CAF50": -1, // Тревожность
"#F44336": -1, // Агрессия

"#000000": -3  // Хаос
};
  
const state = {
lang: "ru",

mode: null,   // wake / dream
step: "intro", // где мы сейчас

// будущий компас
time: null,
home: null,
beam: null,
ring: null,
emotion: null,
emotionLabel: null,
selectedBeam: null,
selectedRing: null,
interaction:0,
analyticsPeriod: null,
analyticsMetric: "transformations",
analyticsTime: null,
analyticsBeam: null,
analyticsRing: null,
reminderMinutes: null,
reminderTimer: null,
};

const TXT = {

ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения Осознанности",
wake:"ЯВЬ",
dream:"СОН",
settings:"Настройка",
back:"Назад",

special:"ЭТО НЕ СОН?",
  
intro:[
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя сейчас настроение?"
],

emissary:`ЗДРАВСТВУЙ!

Я — Эмиссар Сновидений.

На русском языке меня зовут ОСоЗНАЙКА!

ОС — Осознанное Сновидение + Знание.

Я твой Друг и Попутчик на Пути Осознания.

Я смотрю из глубины твоего Внимания.

Напоминаю об осознанности.

Настрой частоту напоминаний,
и я буду с тобой.

И я отвечу на вопросы
в этом Приложении.


Мы встретимся.`
},

en:{
brand:"AWARENESSY!",
sub:"Awareness training mediator",
wake:"WAKE",
dream:"DREAM",
settings:"Settings",
back:"Back",

special:"IS THIS A DREAM?",
  
intro:[
"What were you doing 5 minutes ago?",
"I observe...",
"Where is your Home?",
"Look at your hands",
"How do you feel?"
],

emissary:`HELLO

I am the Dream Emissary.

In your language, I am called AWARENESSY!

I am your Companion on the Path of Awareness.

I observe from within your attention.

I appear when your awareness softens.

I remind you to notice.

To question.

To return.

You will find explanations here —
attached to certain elements.

Look for the question mark.


I will guide you.



We will meet.`
},

es:{
brand:"¡CONCIENCITO!",
sub:"Facilitador de consciencia",
wake:"VIGILIA",
dream:"SUEÑO",
settings:"Ajustes",
back:"Volver",

special:"¿ESTO ES UN SUEÑO?",
  
intro:[
"¿Qué hacías hace 5 minutos?",
"Observo...",
"¿Dónde está tu hogar?",
"Mira tus manos",
"¿Cómo te sientes?"
],

emissary:`HOLA

Soy el Emisario de los Sueños.

En tu idioma, me llaman ¡CONCIENCITO!

Soy tu compañero en el camino de la consciencia.

Observo desde el interior de tu atención.

Aparezco cuando tu consciencia se abre.

Te recuerdo que observes.

Que cuestiones.

Que regreses.

Ajusta la frecuencia de los recordatorios,
y estaré contigo.

Aquí encontrarás explicaciones,
asociadas a ciertos elementos.

Busca el signo de pregunta.


Te guiaré.


Nos encontraremos.`
}

};

function t(key){
return TXT[state.lang][key];
}

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

window.onload = function(){

  const savedLang = localStorage.getItem("lang");

  if(savedLang){
    state.lang = savedLang;
  } else {
    const deviceLang = navigator.language.slice(0,2);

    if(TXT[deviceLang]){
      state.lang = deviceLang;
    }
  }

  const savedReminder =
  localStorage.getItem("awarenessy_reminder_minutes");

  if(savedReminder){
  state.reminderMinutes = Number(savedReminder);
  startReminderTimer();
  }

  render();
};

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

function render(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

header.innerHTML = `
<div id="brandWrap">
  <div id="brand" onclick="openModal()">${t("brand")}</div>
  <div id="sub">${t("sub")}</div>
</div>

<div id="langs">
<button onclick="setLang('ru')">RU</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>
`;

// РАНДОМ
const r = Math.random();
document.body.classList.remove("alert");

let html = "";

if(r < 0.2){
document.body.classList.add("alert");

html = `<div class="anomalyText">${t("special")}</div>`;
}
else if(r < 0.5){
html = `<img src="${HAND_IMG}" style="width:120%; max-width:420px;">`;
}
else if(r < 0.75){
html = `
<video autoplay muted loop playsinline style="max-width:95%;">
<source src="${HAND_VIDEO}" type="video/mp4">
</video>`;
}
else{
html = `
<div style="
font-size:22px;
font-weight:700;
padding:20px;
line-height:1.4;
">
${rand(t("intro"))}
</div>
`;
}

// ЕСЛИ режим НЕ выбран → стартовый экран
if(!state.mode){

topBox.innerHTML = `
<div style="
flex:1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
position:relative;
">

${html}

</div>
`;

bottomBox.innerHTML = `
<div style="display:flex;gap:10px;">
  <div class="btn wake" onclick="start('wake')">${t("wake")}</div>
  <div class="btn dream" onclick="start('dream')">${t("dream")}</div>
</div>
`;

return;
}

renderCompass();

}

function setLang(l){
  state.lang = l;

  localStorage.setItem("lang", l); // 👈 сохраняем

  render();
}

function openModal(){

const modal = document.getElementById("modal");
const img = document.getElementById("emissary");
const msg = document.getElementById("msg");

document.getElementById("backBtn").innerText = t("back");
document.getElementById("settingsBtn").innerText = t("settings");

modal.style.display = "block";

msg.innerHTML = "";
msg.style.opacity = 0;

// старт
img.style.opacity = 0;
img.style.transform = "translateX(-55%) scale(1)";
img.style.transition = "none";

img.style.animation = "emissaryFlow 9s linear forwards";

// текст
setTimeout(()=>{
  showText();
},3500);

}

function showText(){

const msg = document.getElementById("msg");

const text = t("emissary");

msg.innerHTML = "";

const lines = text.split("\n");

lines.forEach((line,i)=>{
const d = document.createElement("div");
d.innerText = line;
d.style.opacity = 0;
d.style.transition = "1.2s ease";
msg.appendChild(d);

setTimeout(()=>{
d.style.opacity = 1;
}, i * 700);
});

const settingsBtn = document.getElementById("settingsBtn");

// время появления = последняя строка + пауза
setTimeout(()=>{
settingsBtn.style.opacity = 1;
}, lines.length * 700 + 800);

document.getElementById("settingsBtn").onclick = function(){
openReminderSettings();
};

msg.style.opacity = 1;

}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

function start(mode){

document.body.classList.remove("alert");

state.mode = mode;
state.step = "south";

renderCompass();
}

function renderTimeMetricScale(){

const list =
filterByPeriod(state.analyticsPeriod);

const times = [
["dawn","Рассвет","#d84cff"],
["morning","Утро","#6fd7ff"],
["day","День","#ffd56a"],
["evening","Вечер","#6fd7ff"],
["sunset","Закат","#d84cff"],
["night","Ночь","#2f65ff"]
];

const values =
times.map(t =>
metricValue(
list,
state.analyticsMetric,
t[0]
)
);

const max =
Math.max(...values,1);

return `

<div style="
display:flex;
flex-direction:column;
gap:8px;
">

${times.map((t,i)=>`

<div
onclick="
selectAnalyticsTime('${t[0]}');
"
style="
position:relative;
height:34px;
border-radius:10px;
overflow:hidden;
background:#111;
border:1px solid #222;
cursor:pointer;
">

<div style="
position:absolute;
left:0;
top:0;
bottom:0;
background:${t[2]};
width:${
values[i] > 0
? Math.round(values[i] / max * 100)
: state.analyticsTime === t[0]
? 100
: 8
}%;

opacity:${
values[i] > 0
? 0.75
: state.analyticsTime === t[0]
? 0.35
: 0.45
};
box-shadow:0 0 14px ${t[2]};
"></div>

<div style="
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-size:14px;
font-weight:700;
color:#fff;
">

<span>${t[1]}</span>
<span>${Number(values[i]).toFixed(1)}</span>

</div>

</div>

`).join("")}

</div>
`;

}

function filterByPeriod(period){

if(!period){

const last =
entries[entries.length - 1];

return last ? [last] : [];

}

const now = Date.now();

let limit = 0;

if(period === "day"){
limit = 24 * 60 * 60 * 1000;
}

if(period === "week"){
limit = 7 * 24 * 60 * 60 * 1000;
}

if(period === "month"){
limit = 30 * 24 * 60 * 60 * 1000;
}

return entries.filter(e=>
now - e.timestamp <= limit
);

}

function selectAnalyticsPeriod(p){

state.analyticsPeriod = p;

state.analyticsBeam = null;
state.analyticsRing = null;

renderCompass();

}

function entryAttention(e){

const tr = e.transformations || 0;
const tz = e.transits || 0;
const an = e.anomalies || 0;
const inter = Math.abs(e.interaction || 0);

return (tr + tz + an + inter) / 4;

}

function activityAttentionData(list){

const map = {};

list.forEach(e=>{

const a = e.activity || "other";

if(!map[a]){
map[a] = {
sum:0,
count:0
};
}

map[a].sum += entryAttention(e);
map[a].count += 1;

});

return Object.entries(map).map(x=>{

return {
activity:x[0],
value:x[1].sum / x[1].count
};

});

}

function activityName(a){

const map = {
create:"Творю",
work:"Работаю",
learn:"Учусь",
move:"Иду / Еду",
rest:"Отдыхаю",
eat:"Ем",
drink:"Выпиваю и/или прочее",
fun:"Развлекаюсь",
freeze:"Торможу"
};

return map[a] || a || "Другое";

}

function renderActivityAttentionChart(list){

const data =
activityAttentionData(list);

if(data.length === 0){
return "";
}

const max =
Math.max(...data.map(x=>x.value),1);

return `

<div style="
margin-top:26px;
">

<div style="
font-size:17px;
font-weight:700;
margin-bottom:12px;
color:#b08a4f;
">
Индекс внимания по деятельности
</div>

${data.map(x=>`

<div style="
position:relative;
height:34px;
margin-bottom:8px;
border-radius:10px;
overflow:hidden;
background:#111;
border:1px solid #222;
">

<div style="
position:absolute;
left:0;
top:0;
bottom:0;
width:${Math.max(8, Math.round(x.value / max * 100))}%;
background:#9b5cff;
opacity:0.65;
box-shadow:0 0 14px #9b5cff;
"></div>

<div style="
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-size:14px;
font-weight:700;
color:#fff;
">

<span>${activityName(x.activity)}</span>
<span>${x.value.toFixed(1)}</span>

</div>

</div>

`).join("")}

</div>
`;

}
  
function metricValue(list,metric,time){

const filtered = list.filter(e=>
e.time === time
);

if(metric === "transformations"){

return filtered.reduce(
(sum,e)=>sum + (e.transformations || 0),
0
);

}

if(metric === "transits"){

return filtered.reduce(
(sum,e)=>sum + (e.transits || 0),
0
);

}

if(metric === "anomalies"){

return filtered.reduce(
(sum,e)=>sum + (e.anomalies || 0),
0
);

}

if(metric === "interaction"){

return filtered.reduce(
(sum,e)=>sum + (e.interaction || 0),
0
);

}

if(metric === "energy"){

if(filtered.length === 0) return 0;

const total = filtered.reduce((sum,e)=>
sum + (e.energy || 0),
0
);

return total / filtered.length;

}

if(metric === "attention"){

if(filtered.length === 0) return 0;

const total = filtered.reduce((sum,e)=>
sum + entryAttention(e),
0
);

return total / filtered.length;

}

return 0;

}

function renderCompass(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");

// 🔝 ВЕРХ — КОНТЕНТ
let topHTML = "";

if(state.step === "south"){

topHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
<div>
<div style="
font-size:22px;
font-weight:700;
color:${state.mode === 'wake' ? '#c9a86a' : '#fff'};
">
Повернись к Югу
</div>
<button class="helpBtn"
onclick="openHelp('south')">?</button>
<div style="font-size:14px;color:#777;margin-top:8px">(там где солнце в полдень)</div>

<button class="btn"
style="margin-top:20px;width:160px;margin-left:auto;margin-right:auto;"
onclick="nextStep()">OK</button>
</div>
</div>
`;

}

if(state.step === "time"){

const times = [
["dawn","Рассвет"],
["morning","Утро"],
["day","День"],
["evening","Вечер"],
["sunset","Закат"],
["night","Ночь"]
];

topHTML = `
<div style="
flex:1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
">
<div style="width:100%;max-width:360px;">

<div style="
font-size:22px;
font-weight:700;
margin-bottom:20px;
color:${state.mode === 'wake' ? '#c9a86a' : '#fff'};
">
Какое сейчас время суток?
</div>

<div style="
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
">

${times.map(t=>`

<button class="btn"
onclick="pickTime('${t[0]}')">

${t[1]}

</button>

`).join("")}

</div>

</div>
</div>
`;

function drawAnalyticsZones(svg){

if(state.step !== "diagrams") return;
if(!state.analyticsTime) return;

const timeColors = {
dawn:"#d84cff",
morning:"#6fd7ff",
day:"#ffd56a",
evening:"#6fd7ff",
sunset:"#d84cff",
night:"#2f65ff"
};

const baseColor =
timeColors[state.analyticsTime] || "#b388ff";

let zones;
let isEmptyMetric = false;

if(state.analyticsPeriod){

zones = observationLocations();
isEmptyMetric = true;

}else{

zones = metricLocations();

if(Object.keys(zones).length === 0){

zones = observationLocations();
isEmptyMetric = true;

}

}

const values =
Object.values(zones);

if(values.length === 0) return;

const max =
Math.max(...values,1);

const step =
Math.PI * 2 / 8;

const rings = [
[53,94],
[94,142],
[142,191]
];

Object.entries(zones).forEach(item=>{

const key = item[0];
const value = item[1];

const parts = key.split("_");

const beam = parts[0];
const ring = Number(parts[1]);

const color =
isEmptyMetric ? baseColor : "#b388ff";

const power =
isEmptyMetric
? 0.38
: 0.22 + (value / max) * 0.58;

// ДОМ / ЦЕНТР
if(beam === "c"){

svg.innerHTML += `

<circle
cx="200"
cy="200"
r="52"
fill="${color}"
opacity="${power}"
filter="url(#glow)"
style="pointer-events:none;"
/>

<circle
cx="200"
cy="200"
r="38"
fill="${color}"
opacity="${isEmptyMetric ? 0.18 : 0.42}"
style="pointer-events:none;"
/>

`;

return;

}

// СЕКТОРА
const idx =
DIRS.indexOf(beam);

if(idx < 0) return;

const rr =
rings[ring - 1];

if(!rr) return;

const start =
-Math.PI/2 - step/2 + idx * step;

const end =
start + step;

const d =
sector(
rr[0],
rr[1],
start,
end
);

svg.innerHTML += `

<path
d="${d}"
fill="${color}"
opacity="${power}"
filter="url(#glow)"
style="pointer-events:none;"
/>

<path
d="${d}"
fill="${color}"
opacity="${isEmptyMetric ? 0.18 : 0.32}"
style="pointer-events:none;"
/>

`;

});

}

[94,142],
[142,191]
];

const step = Math.PI * 2 / 8;

DIRS.forEach((dir,idx)=>{

const visualDir = dir;
const visualIdx = DIRS.indexOf(visualDir);

const start =

const end = start + step;

rings.forEach((rr,ringIndex)=>{

const d = sector(

"
/>

`;

});

});

}

function drawSolarRing(svg){

if(!state.time) return;

const map = {
dawn: 2,
morning: 3,
day: 4,
evening: 5,
sunset: 6,
night: 0
};

const colors = {
dawn:"#d84cff",
morning:"#6fd7ff",
day:"#ffd56a",
evening:"#6fd7ff",
sunset:"#d84cff",
night:"#2f65ff"
};

const idx = map[state.time];
const col = colors[state.time];

const step = Math.PI * 2 / 8;

// 3 сегмента дуги
const segments = [

{ offset:-1, power:0.22, ring:[198,200], cls:"solarSide solarA" },

{ offset:0, power:0.95, ring:[195,203], cls:"" },

{ offset:1, power:0.22, ring:[198,200], cls:"solarSide solarB" }

];

segments.forEach(seg=>{

const i = (idx + seg.offset + 8) % 8;

const a0 =
Math.PI/2 - step/2 + i * step;

const a1 = a0 + step;

svg.innerHTML += `

<!-- мягкое свечение -->
<path
d="${sector(seg.ring[0]-2,seg.ring[1]+2,a0,a1)}"
fill="${col}"
opacity="${seg.power * 0.18}"
filter="url(#glow)"
class="${seg.cls}"
/>

<!-- основная дуга -->
<path
d="${sector(seg.ring[0],seg.ring[1],a0,a1)}"
fill="${col}"
opacity="${seg.power}"
class="${seg.cls}"
/>

`;

});

}

function sector(ir, or, a0, a1){

function p(r,a){
return [200 + Math.cos(a)*r, 200 + Math.sin(a)*r];
}

const A = p(or,a0);
const B = p(or,a1);
const C = p(ir,a1);
const D = p(ir,a0);

return `
M ${A[0]} ${A[1]}
A ${or} ${or} 0 0 1 ${B[0]} ${B[1]}
L ${C[0]} ${C[1]}
A ${ir} ${ir} 0 0 0 ${D[0]} ${D[1]}
Z`;
}

const DIRS = ["n","ne","e","se","s","sw","w","nw"];

function opposite(v){
let i = DIRS.indexOf(v);
return DIRS[(i+4)%8];
}

function getMetricEntries(){

const list =
filterByPeriod(
state.analyticsPeriod
);

return list.filter(e=>

!state.analyticsTime ||
e.time === state.analyticsTime

);

}

function metricLocations(){

const list = getMetricEntries();

const zones = {};
const counts = {};

list.forEach(e=>{

let value = 0;

if(state.analyticsMetric === "transformations"){
value = e.transformations || 0;
}

if(state.analyticsMetric === "transits"){
value = e.transits || 0;
}

if(state.analyticsMetric === "anomalies"){
value = e.anomalies || 0;
}

if(state.analyticsMetric === "interaction"){
value = Math.abs(e.interaction || 0);
}

if(state.analyticsMetric === "energy"){
value = e.energy || 0;
}

if(state.analyticsMetric === "attention"){
value = entryAttention(e);
}

if(value === 0) return;

const key = e.beam + "_" + e.ring;

zones[key] = (zones[key] || 0) + value;
counts[key] = (counts[key] || 0) + 1;

});

if(
state.analyticsMetric === "energy" ||
state.analyticsMetric === "attention"
){

Object.keys(zones).forEach(key=>{
zones[key] = zones[key] / counts[key];
});

}

return zones;

}

zones[key] =

});

return zones;

}
