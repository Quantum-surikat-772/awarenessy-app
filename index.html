<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy 3.3 MASTER</title>

<style>
:root{
--bg:#040404;
--panel:#0f0f0f;
--line:#222;
--text:#f5f5f5;
--muted:#7f7f7f;
--gold:#c9a86a;
--red:#d60000;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
margin:0;padding:0;width:100%;height:100%;
background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}
body{display:flex;justify-content:center;}
#app{
width:100%;
max-width:520px;
height:100vh;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at 18% 18%, rgba(255,255,255,.03), transparent 20%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,.02), transparent 24%),
var(--bg);
}

#top{
height:50vh;
padding:10px 16px 10px;
display:flex;
flex-direction:column;
}
#bottom{
height:50vh;
position:relative;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:0 10px 10px;
}

#header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:8px;
}
#brand{
font-size:16px;
font-weight:700;
color:var(--gold);
}
#sub{
font-size:11px;
color:#777;
margin-top:2px;
}
#langs{display:flex;gap:8px;}
.mini{
width:50px;height:42px;border:none;
border-radius:14px;
background:#151515;
color:#ddd;
border:1px solid #242424;
font-size:13px;
}

#content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
width:100%;
padding:18px;
border-radius:22px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.05);
}

.title{
font-size:22px;
font-weight:700;
text-align:center;
line-height:1.25;
}
.small{font-size:14px;color:#aaa;text-align:center;margin-top:8px;}

.row{display:flex;gap:10px;}
.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:14px;
}
.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-top:14px;
}

.main{
height:48px;
border:none;
border-radius:14px;
background:linear-gradient(180deg,#1a1a1a,#101010);
color:#fff;
font-size:15px;
font-weight:700;
border:1px solid #252525;
width:100%;
}

.media{
width:100%;
max-width:360px;
border-radius:20px;
overflow:hidden;
}
.media img,.media video{width:100%;display:block;}

#compassWrap{
position:relative;
width:min(92vw,410px);
height:min(92vw,410px);
margin:0 auto;
}
#compassImg,#fx{
position:absolute;inset:0;width:100%;height:100%;
}
#foot{
font-size:11px;
text-align:center;
color:#666;
margin-top:6px;
}

@keyframes pulse{
0%{opacity:.62}
50%{opacity:1}
100%{opacity:.62}
}
.pulse{
animation:pulse 3s ease-in-out infinite;
}

.fade{
animation:f .35s ease;
}
@keyframes f{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:none}
}
</style>
</head>
<body>

<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<script>
const topBox=document.getElementById("top");
const bottomBox=document.getElementById("bottom");

const state={
lang:"ru",
mode:null,
time:null,
home:null,
distance:null,
beam:null,
ring:null,
emotion:null
};

const TXT={
ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения осознанности",
wake:"ЯВЬ",dream:"СОН",
ready:"Готово",
turn:"Повернись к Югу",
hint:"(там где солнце в полдень)",
time:"Какое время суток?",
doing:"Что сейчас здесь делаешь?",
hunt:"За минувший период сколько заметил?",
tr:"Трансформаций",
tz:"Транзитов",
home:"В каком направлении твой Дом?",
dist:"Как далеко?",
emo:"Эмоция",
ok:"OK",
saved:"Запись сохранена",
times:["Рассвет","Утро","День","Вечер","Закат","Ночь"]
}
};

function t(k){return TXT.ru[k];}

function header(){
return `
<div id="header">
<div>
<div id="brand">${t("brand")}</div>
<div id="sub">${t("sub")}</div>
</div>
<div id="langs">
<button class="mini">RU</button>
<button class="mini">EN</button>
<button class="mini">ES</button>
</div>
</div>`;
}

function intro(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="title fade">Я наблюдаю...</div>
</div>`;

bottomBox.innerHTML=`
<div class="row">
<button class="main" onclick="start('wake')">${t("wake")}</button>
<button class="main" onclick="start('dream')">${t("dream")}</button>
</div>
<div id="foot">Awarenessy 3.3 MASTER</div>`;
}

function start(mode){
state.mode=mode;
compass();
stepSouth();
}

function compass(){
bottomBox.innerHTML=`
<div id="compassWrap">
<img id="compassImg" src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png">
<svg id="fx" viewBox="0 0 400 400"></svg>
</div>
<div id="foot">Awarenessy 3.3 MASTER</div>`;
drawFX();
}

function stepSouth(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("turn")}</div>
<div class="small">${t("hint")}</div>
<button class="main" style="margin-top:16px" onclick="stepTime()">${t("ready")}</button>
</div>
</div>`;
}

function stepTime(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("time")}</div>
<div class="grid2">
${t("times").map((x,i)=>`<button class="main" onclick="pickTime(${i})">${x}</button>`).join("")}
</div>
</div>
</div>`;
}

function pickTime(i){
state.time=i;
drawFX();
stepDoing();
}

function stepDoing(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("doing")}</div>
<input class="main" style="margin-top:14px;text-align:center" placeholder="...">
<button class="main" style="margin-top:12px" onclick="stepHunt()">Далее</button>
</div>
</div>`;
}

function stepHunt(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title" style="font-size:18px">${t("hunt")}</div>
<div class="grid2">
<input class="main" placeholder="${t("tr")}">
<input class="main" placeholder="${t("tz")}">
</div>
<button class="main" style="margin-top:12px" onclick="stepHome()">Далее</button>
</div>
</div>`;
}

function stepHome(){
const dirs=[
["nw","↖"],["n","↑"],["ne","↗"],
["w","←"],["c","Я"],["e","→"],
["sw","↙"],["s","↓"],["se","↘"]
];

topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("home")}</div>
<div class="grid3">
${dirs.map(d=>`<button class="main" onclick="pickDir('${d[0]}')">${d[1]}</button>`).join("")}
</div>
</div>
</div>`;
}

const DIRS=["n","ne","e","se","s","sw","w","nw"];

function opposite(v){
let i=DIRS.indexOf(v);
return DIRS[(i+4)%8];
}

function pickDir(v){
state.home=v;
if(v==="c"){
state.beam="c";
state.ring=0;
drawFX();
stepEmotion();
return;
}
state.beam=opposite(v);
state.ring=null;
drawFX();
stepDist();
}

function stepDist(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("dist")}</div>
<div class="grid2">
<button class="main" onclick="pickRing(0)">Дом</button>
<button class="main" onclick="pickRing(1)">Близко</button>
<button class="main" onclick="pickRing(2)">Средне</button>
<button class="main" onclick="pickRing(3)">Далеко</button>
</div>
</div>
</div>`;
}

function pickRing(v){
state.ring=v;
drawFX();
stepEmotion();
}

function stepEmotion(){
const list=[
["#FFD700","Радость, позитивная деятельность"],
["#FFFFFF","Осознанное творчество"],
["#3F51B5","Вдохновение, спокойствие, творчество"],
["#26C6DA","Фантазёрство, мечтательность"],
["#808080","Нейтральное, пассивное вовлечение"],
["#4CAF50","Тоска, испуг, зависимость"],
["#F44336","Гнев, агрессия, превосходство"],
["#FF9800","Самоуверенность, соревновательность"],
["#000000","Хаос, ужас, отсутствие контроля"]
];

topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title" style="font-size:18px">${t("emo")}</div>
<div class="grid2">
${list.map(x=>`<button class="main" style="font-size:11px;height:42px" onclick="pickEmotion('${x[0]}')">${x[1]}</button>`).join("")}
</div>
</div>
</div>`;
}

function pickEmotion(c){
state.emotion=c;
drawFX();
setTimeout(done,500);
}

function done(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("saved")}</div>
<button class="main" style="margin-top:14px" onclick="intro()">${t("ok")}</button>
</div>
</div>`;
}

function drawFX(){
const svg=document.getElementById("fx");
if(!svg)return;
svg.innerHTML="";

drawSolar(svg);

if(!state.beam)return;

if(state.beam==="c"){
if(state.emotion){
svg.innerHTML+=`
<circle cx="200" cy="200" r="34"
fill="${state.emotion}" opacity=".85" class="pulse"/>`;
}else{
svg.innerHTML+=`
<circle cx="200" cy="200" r="44"
fill="white" opacity=".32" filter="blur(12)"/>`;
}
return;
}

const idx=DIRS.indexOf(state.beam);
const step=Math.PI*2/8;
const start=-Math.PI/2-step/2+idx*step;
const end=start+step;

const rings=[
[48,92],
[92,138],
[138,184],
[184,212]
];

const r=rings[state.ring||1];

const d=sector(r[0],r[1],start,end);

if(state.emotion){
svg.innerHTML+=`
<path d="${d}" fill="${state.emotion}" opacity=".85" class="pulse"/>`;
}else{
svg.innerHTML+=`
<path d="${d}" fill="white" opacity=".30" filter="blur(14)"/>`;
}
}

function sector(ir,or,a0,a1){
function p(r,a){
return [200+Math.cos(a)*r,200+Math.sin(a)*r];
}
const A=p(or,a0),B=p(or,a1),C=p(ir,a1),D=p(ir,a0);
return `
M ${A[0]} ${A[1]}
A ${or} ${or} 0 0 1 ${B[0]} ${B[1]}
L ${C[0]} ${C[1]}
A ${ir} ${ir} 0 0 0 ${D[0]} ${D[1]}
Z`;
}

function drawSolar(svg){
if(state.time===null)return;

const map=[2,3,4,5,6,0];
const idx=map[state.time];
const colors=["#d84cff","#6fd7ff","#ffd56a","#6fd7ff","#d84cff","#2f65ff"];
const col=colors[state.time];

for(let k=-1;k<=1;k++){
let i=(idx+k+8)%8;
let power=(k===0)?1:.35;

const step=Math.PI*2/8;
const a0=-Math.PI/2-step/2+i*step;
const a1=a0+step;

svg.innerHTML+=`
<path d="${sector(188,196,a0,a1)}"
fill="${col}" opacity="${power}"/>`;
}
}

intro();
</script>
</body>
</html>
