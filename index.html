<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy</title>

<style>
:root{
--bg:#050505;
--red:#d90000;
--panel:#101010;
--line:#2a2a2a;
--text:#f4f4f4;
--muted:#8a8a8a;
--gold:#c8a96b;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
font-family:Arial,Helvetica,sans-serif;
color:var(--text);
}

body{
display:flex;
justify-content:center;
}

#app{
width:100%;
max-width:520px;
height:100vh;
position:relative;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at 20% 15%, rgba(255,255,255,.03), transparent 20%),
radial-gradient(circle at 80% 65%, rgba(255,255,255,.02), transparent 25%),
var(--bg);
transition:.3s ease;
}

/* ---------- TOP ---------- */

#topPanel{
flex:1;
padding:10px 16px 120px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
text-align:center;
position:relative;
}

#header{
width:100%;
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:4px;
}

#brand{
font-size:16px;
font-weight:700;
letter-spacing:.8px;
color:var(--gold);
}

#subBrand{
font-size:11px;
color:var(--muted);
margin-top:2px;
text-align:left;
}

#langBar{
display:flex;
gap:6px;
}

.mini{
width:38px;
height:34px;
border:none;
border-radius:10px;
background:#171717;
color:#ddd;
border:1px solid var(--line);
font-size:12px;
}

#centerBox{
flex:1;
width:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:10px 0;
}

.title{
font-size:30px;
font-weight:700;
line-height:1.25;
max-width:360px;
}

.media{
width:100%;
max-width:360px;
border-radius:18px;
overflow:hidden;
border:1px solid rgba(255,255,255,.06);
box-shadow:0 0 24px rgba(0,0,0,.35);
}

.media img,
.media video{
width:100%;
display:block;
}

.subtle{
font-size:14px;
color:#cfcfcf;
margin-top:10px;
}

/* ---------- BOTTOM ---------- */

#bottomDock{
position:absolute;
left:0;
right:0;
bottom:0;
padding:12px 16px 16px;
}

.row{
display:flex;
gap:10px;
}

button.main{
height:52px;
width:100%;
border:none;
border-radius:14px;
background:linear-gradient(180deg,#181818,#111);
color:#fff;
font-size:16px;
font-weight:700;
border:1px solid var(--line);
}

button.main:active{
transform:translateY(1px);
}

#foot{
margin-top:8px;
font-size:11px;
color:#666;
text-align:center;
}

/* ---------- SCREEN 2 ---------- */

#compassArea{
height:50vh;
display:flex;
justify-content:center;
align-items:center;
border-top:1px solid rgba(255,255,255,.05);
}

#compassImg{
width:min(78vw,340px);
height:min(78vw,340px);
object-fit:contain;
filter:drop-shadow(0 0 12px rgba(255,255,255,.08));
}

.card{
width:100%;
max-width:360px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.05);
}

.fade{
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:none;}
}
</style>
</head>
<body>

<div id="app">
<div id="topPanel"></div>
<div id="bottomDock"></div>
</div>

<script>
/* ===============================
   AWARENESSY FOUNDATION BUILD 1.1
=============================== */

try{
if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.ready();
Telegram.WebApp.expand();
}
}catch(e){}

/* ---------- STATE ---------- */

const state = {
lang: localStorage.getItem("awarenessy_lang") || detectLang(),
mode:null
};

/* ---------- TEXT ---------- */

const TXT = {
ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения осознанности",
wake:"ЯВЬ",
dream:"СОН",
observe:"Я наблюдаю...",
five:"Что ты делал 5 минут назад?",
home:"В каком направлении твой Дом?",
alert:"ЭТО НЕ СОН?",
turnSouth:"Повернись к Югу",
southHint:"(там где солнце в полдень)",
ready:"Готово"
},
en:{
brand:"AWARENESSY!",
sub:"Mediator of awareness training",
wake:"WAKE",
dream:"DREAM",
observe:"I observe...",
five:"What were you doing 5 minutes ago?",
home:"Where is your Home direction?",
alert:"THIS IS NOT A DREAM?",
turnSouth:"Turn to the South",
southHint:"(where the sun is at noon)",
ready:"Ready"
},
es:{
brand:"CONCIENCITO!",
sub:"Mediador del entrenamiento consciente",
wake:"VIGILIA",
dream:"SUEÑO",
observe:"Estoy observando...",
five:"¿Qué hacías hace 5 minutos?",
home:"¿En qué dirección está tu Hogar?",
alert:"¿ESTO NO ES UN SUEÑO?",
turnSouth:"Gira hacia el Sur",
southHint:"(donde el sol está al mediodía)",
ready:"Listo"
}
};

function t(k){ return TXT[state.lang][k] || k; }

function detectLang(){
let code=(navigator.language||"en").toLowerCase();
try{
if(window.Telegram?.WebApp?.initDataUnsafe?.user?.language_code){
code=Telegram.WebApp.initDataUnsafe.user.language_code.toLowerCase();
}
}catch(e){}
if(code.startsWith("ru")) return "ru";
if(code.startsWith("es")) return "es";
return "en";
}

/* ---------- DOM ---------- */

const app = document.getElementById("app");
const topPanel = document.getElementById("topPanel");
const bottomDock = document.getElementById("bottomDock");

/* ---------- INTRO ---------- */

const variants = [
"text1",
"text2",
"text3",
"alert",
"image",
"video"
];

function rnd(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function header(){
return `
<div id="header">
<div>
<div id="brand">${t("brand")}</div>
<div id="subBrand">${t("sub")}</div>
</div>

<div id="langBar">
<button class="mini lang" data-l="ru">RU</button>
<button class="mini lang" data-l="en">EN</button>
<button class="mini lang" data-l="es">ES</button>
</div>
</div>
`;
}

function renderIntro(){

app.style.background = `
radial-gradient(circle at 20% 15%, rgba(255,255,255,.03), transparent 20%),
radial-gradient(circle at 80% 65%, rgba(255,255,255,.02), transparent 25%),
var(--bg)
`;

const v = rnd(variants);

let center = "";

if(v==="text1"){
center=`<div class="title fade">${t("observe")}</div>`;
}

if(v==="text2"){
center=`<div class="title fade">${t("five")}</div>`;
}

if(v==="text3"){
center=`<div class="title fade">${t("home")}</div>`;
}

if(v==="alert"){
app.style.background="var(--red)";
center=`<div class="title fade">${t("alert")}</div>`;
}

if(v==="image"){
center=`
<div class="media fade">
<img src="https://i.postimg.cc/zXp9BVGf/Hands-1.png">
</div>
`;
}

if(v==="video"){
center=`
<div class="media fade">
<video autoplay muted loop playsinline>
<source src="https://i.imgur.com/ocTkSQj.mp4" type="video/mp4">
</video>
</div>
`;
}

topPanel.innerHTML = `
${header()}
<div id="centerBox">
${center}
</div>
`;

bottomDock.innerHTML = `
<div class="row">
<button class="main" id="wakeBtn">${t("wake")}</button>
<button class="main" id="dreamBtn">${t("dream")}</button>
</div>
<div id="foot">Awarenessy Foundation Build</div>
`;

bindIntro();
}

/* ---------- SCREEN 2 ---------- */

function enterMode(mode){

state.mode = mode;

app.style.background = `
radial-gradient(circle at 20% 15%, rgba(255,255,255,.03), transparent 20%),
radial-gradient(circle at 80% 65%, rgba(255,255,255,.02), transparent 25%),
var(--bg)
`;

topPanel.innerHTML = `
${header()}

<div id="centerBox">
<div class="card fade">
<div class="title" style="font-size:28px;">${t("turnSouth")}</div>
<div class="subtle">${t("southHint")}</div>

<div style="margin-top:18px;">
<button class="main" id="readyBtn">${t("ready")}</button>
</div>
</div>
</div>
`;

bottomDock.innerHTML = `
<div id="compassArea">
<img id="compassImg" src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png">
</div>
<div id="foot">Awarenessy Foundation Build</div>
`;

bindHeader();
document.getElementById("readyBtn").onclick = ()=>{
alert("Следующий шаг будет добавлен в Build 1.2");
};

}

/* ---------- BINDS ---------- */

function bindHeader(){
document.querySelectorAll(".lang").forEach(b=>{
b.onclick=()=>{
state.lang=b.dataset.l;
localStorage.setItem("awarenessy_lang",state.lang);
renderIntro();
};
});
}

function bindIntro(){

bindHeader();

document.getElementById("wakeBtn").onclick=()=>enterMode("wake");
document.getElementById("dreamBtn").onclick=()=>enterMode("dream");

}

/* ---------- START ---------- */

renderIntro();

</script>
</body>
</html>
