<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awarenessy Mini App</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#top {
  height: 45%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  font-size: 18px;
}

#bottom {
  height: 55%;
  display: flex;
  align-items: center;
  justify-content: center;
}

button {
  padding: 10px 16px;
  margin: 6px;
  border: none;
  border-radius: 8px;
  background: #0f0;
  color: #000;
  font-size: 14px;
}

.hidden {
  display: none;
}

/* Архикомпас */
svg {
  width: 300px;
  height: 300px;
}

.segment {
  fill: #111;
  stroke: #333;
  cursor: pointer;
}

.segment.active {
  fill: #00ff99;
}

.center {
  fill: #222;
  cursor: pointer;
}

.center.active {
  fill: #00ff99;
}

/* сетка */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 50px);
  gap: 10px;
  justify-content: center;
  margin-top: 10px;
}

.cell {
  width: 50px;
  height: 50px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.cell:hover {
  background: #333;
}

</style>
</head>

<body>

<div id="top"></div>
<div id="bottom"></div>

<script>

let mode = null;
let selectedDirection = null;
let selectedDistance = null;

/* --- СЦЕНАРИИ --- */

const scenarios = [
  "В каком настроении ты был 5 минут назад?",
  "В каком направлении твой дом?",
  "Я наблюдаю...",
  "ЭТО НЕ СОН?",
  ""
];

/* --- СТАРТ --- */

function startScreen() {
  const text = scenarios[Math.floor(Math.random()*scenarios.length)];

  document.getElementById("top").innerHTML = `
    <div>${text}</div>
    <div style="margin-top:20px;">
      <button onclick="enterMode('real')">ЯВЬ</button>
      <button onclick="enterMode('dream')">СОН</button>
    </div>
  `;

  document.getElementById("bottom").innerHTML = "";
}

startScreen();

/* --- ВХОД В РЕЖИМ --- */

function enterMode(m) {
  mode = m;
  stepTurnSouth();
}

/* --- ШАГИ ЯВИ --- */

function stepTurnSouth() {
  document.getElementById("top").innerHTML = `
    <div>Повернись к Югу (Солнце в полдень)</div>
    <button onclick="stepTime()">Готово</button>
  `;
}

function stepTime() {
  const times = ["Рассвет","Утро","Полдень","Вечер","Закат","Ранняя ночь","Глубокая ночь","Перед рассветом"];

  document.getElementById("top").innerHTML = `
    <div>Какое время суток?</div>
    ${times.map(t => `<button onclick="stepHome()">${t}</button>`).join("")}
  `;
}

/* --- СЕТКА --- */

function stepHome() {
  document.getElementById("top").innerHTML = `
    <div>Где твой Дом?</div>
    <div class="grid">
      <div class="cell" onclick="selectDir('nw')">↖</div>
      <div class="cell" onclick="selectDir('n')">↑</div>
      <div class="cell" onclick="selectDir('ne')">↗</div>
      <div class="cell" onclick="selectDir('w')">←</div>
      <div class="cell" onclick="selectCenter()">Я</div>
      <div class="cell" onclick="selectDir('e')">→</div>
      <div class="cell" onclick="selectDir('sw')">↙</div>
      <div class="cell" onclick="selectDir('s')">↓</div>
      <div class="cell" onclick="selectDir('se')">↘</div>
    </div>
  `;

  drawCompass();
}

/* --- ВЫБОР --- */

function selectCenter() {
  selectedDirection = "center";
  drawCompass(true);
}

function selectDir(dir) {
  selectedDirection = dir;
  highlightOpposite();
  stepDistance();
}

/* --- ДИСТАНЦИЯ --- */

function stepDistance() {
  document.getElementById("top").innerHTML = `
    <div>Как далеко ты от Дома?</div>
    <button onclick="setDistance(1)">Близко</button>
    <button onclick="setDistance(2)">Средне</button>
    <button onclick="setDistance(3)">Далеко</button>
  `;
}

function setDistance(d) {
  selectedDistance = d;
  highlightFinal();
}

/* --- КОМПАС --- */

function drawCompass(center=false) {
  let svg = `<svg viewBox="0 0 300 300">`;

  // центр
  svg += `<circle cx="150" cy="150" r="25" class="center ${center?'active':''}" />`;

  svg += `</svg>`;

  document.getElementById("bottom").innerHTML = svg;
}

/* --- ПОДСВЕТКА --- */

function highlightOpposite() {
  // пока упрощённо (потом добавим реальные сегменты)
  drawCompass();
}

function highlightFinal() {
  drawCompass();
}

</script>

</body>
</html>
