<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#top{
flex:1;
display:flex;
}

#app{
height:100vh;
display:flex;
flex-direction:column;
}

#bottom{
padding:10px;
}

.btn{
flex:1;
height:50px;
border-radius:12px;
border:1px solid #333;
background:#111;
font-size:14px;
font-weight:700;
}

.wake{
color:#c9a86a; /* золото */
}

.dream{
color:#69b7ff; /* голубой */
}

#header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
border-bottom:1px solid #222;
}

#brand{
color:#c9a86a;
font-weight:700;
font-size:16px;
}

#brandWrap{
display:flex;
flex-direction:column;
}

#sub{
font-size:11px;
color:#777;
margin-top:2px;
}

#langs button{
background:none;
border:none;
color:#aaa;
font-size:13px;
margin-left:6px;
}

#langs button.active{
color:#fff;
}

</style>
</head>

<body>

<div id="app">
<div id="header"></div>

<div id="top">TOP OK</div>
<div id="bottom">BOTTOM OK</div>

<script>

const HAND_IMG = "https://i.postimg.cc/zXp9BVGf/Hands-1.png";
const HAND_VIDEO = "https://i.imgur.com/ocTkSQj.mp4";

const introTexts = [
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя сейчас настроение?"
];

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

window.onload = function(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

header.innerHTML = `
<div id="brandWrap">
  <div id="brand">ОСоЗНАЙКА!</div>
  <div id="sub">Посредник обучения Осознанности</div>
</div>

<div id="langs">
<button>RU</button>
<button>EN</button>
<button>ES</button>
</div>
`;

// рандомный экран
const r = Math.random();

let html = "";
let style = "";

// 🔴 АНОМАЛИЯ
if(r < 0.2){

document.body.classList.add("alert");

html = `
<div style="
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:800;
text-align:center;
">
ЭТО НЕ СОН?
</div>
`;

}

/* 🔴 режим аномалии */

body.alert{
background:#c00000;
}

/* кнопки становятся прозрачными */
body.alert .btn{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.25);
}

/* текст кнопок — белый */
body.alert .wake,
body.alert .dream{
color:#fff;
}

/* бренд */
body.alert #brand{
color:#fff;
}

/* языки */
body.alert #langs button{
color:#eee;
}

// 🖐 PNG
else if(r < 0.5){

html = `
<div style="
flex:1;
display:flex;
align-items:center;
justify-content:center;
">
<img src="${HAND_IMG}" style="width:120%; max-width:420px;">
</div>
`;

}

// 🎥 VIDEO
else if(r < 0.75){

html = `
<div style="
flex:1;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
">
<video autoplay muted loop playsinline
style="
max-width:95%;
max-height:100%;
object-fit:contain;
transform:scale(1.05);
">
<source src="${HAND_VIDEO}" type="video/mp4">
</video>
</div>
`;

}

// 🧠 ТЕКСТ
else{

html = `
<div style="
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
text-align:center;
padding:0 10px;
">
${rand(introTexts)}
</div>
`;

else{
document.body.classList.remove("alert");
}

}

topBox.innerHTML = `
<div style="${style}; flex:1; display:flex;">
${html}
</div>
`;

// кнопки
bottomBox.innerHTML = `
<div style="
display:flex;
gap:10px;
">
<button class="btn wake">ЯВЬ</button>
<button class="btn dream">СОН</button>
</div>
`;

};

</script>

</body>
</html>
