<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Awarenessy</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#top {
  border: none;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

#button {
  width: 100%;
  padding: 8px;

  background: #1a1a1a;   /* чуть светлее фона */
  color: #bbb;           /* светло-серый текст */

  border: 1px solid #333;
  border-radius: 6px;

  margin: 2px;
  font-size: 13px;

  transition: 0.2s;
}

#compass {
  width: 300px;
  height: 300px;
}

#compassContainer {
  position: relative;
  width: 300px;
  height: 300px;

  margin: 0 auto; /* центрирует */
}

#compassBg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#compass {
  position: absolute;
  width: 100%;
  height: 100%;
}

#compass svg path {
  transition: all 0.4s ease;
  mix-blend-mode: screen;
}

#compass svg path[fill]:not([fill="#0a0a0a"]) {
  filter: drop-shadow(0 0 6px currentColor);
}

#modeButtons {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: none;
  justify-content: center;
  gap: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
  margin-top: 20px;
}

.cell {
  width: 60px;
  height: 60px;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 6px;

  background: #1a1a1a !important;
  color: #bbb !important;

  border: 1px solid #333;
  border-radius: 6px;

  margin: 2px;
  font-size: 12px;

  transition: 0.2s;
}

button:active {
  background: #222 !important;
  color: #fff !important;
}

#bottom {
  height: 50%;
  display: none; /* СКРЫВАЕМ НА СТАРТЕ */
  justify-content: center;
  align-items: center;
  width: 100%;
}

</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">

  <div id="compassContainer">

    <!-- фон -->
    <img src="https://i.postimg.cc/QNqFwP2P/compass.png" id="compassBg">

    <!-- SVG компаса -->
    <div id="compass"></div>

  </div>

</div>

<div id="modeButtons">
  <button onclick="enterMode()">ЯВЬ</button>
  <button onclick="enterMode()">СОН</button>
</div>

<script>

/* ---------- STATE ---------- */

let activeSegments = [];
let finalSegment = null;
let centerActive = false;
let coloredSegments = {};

/* ---------- START ---------- */

const scenarios = [
  "Я наблюдаю...",
  "ЭТО НЕ СОН?",
  "В каком настроении ты был 5 минут назад?",
  "В каком направлении твой Дом?",
  {
    type: "image",
    src: "https://i.postimg.cc/zXp9BVGf/Hands-1.png"
  }
];

startScreen();

function startScreen() {
  const isVideo = Math.random() < 0.15;

if (isVideo) {

  document.body.style.background = "#050505";

  document.getElementById("top").innerHTML = `
    <video autoplay muted loop playsinline style="
      width: 120%;
      max-width: 380px;
      transform: scale(1.25);
      opacity: 0.95;
    ">
      <source src="https://i.imgur.com/ocTkSQj.mp4" type="video/mp4">
    </video>
  `;

  showModeButtons();
  return;
}

  const scenarios = [
    "text1",
    "text2",
    "text3",
    "alert",
    "image"
  ];

  const random = scenarios[Math.floor(Math.random() * scenarios.length)];

  // сброс
  document.body.style.background = "#050505";

  if (random === "text1") {
    document.getElementById("top").innerHTML = "Я наблюдаю...";
  }

  if (random === "text2") {
    document.getElementById("top").innerHTML = "В каком настроении ты был 5 минут назад?";
  }

  if (random === "text3") {
    document.getElementById("top").innerHTML = "В каком направлении твой Дом?";
  }

  if (random === "alert") {
    document.body.style.background = "#ff0000";
    document.getElementById("top").innerHTML = `
      <div style="font-size:28px;font-weight:bold;">
        ЭТО НЕ СОН?
      </div>
    `;
  }

  if (random.type === "image") {

    document.getElementById("top").innerHTML = `
      <img src="${random.src}" style="
        width: 110%;
        max-width: 360px;
        transform: scale(1.2);
        opacity: 0.95;
        filter: drop-shadow(0 0 25px rgba(0,150,255,0.4));
      ">
    `;

  }

  showModeButtons();
}

/* ---------- MODE ---------- */

function enterMode() {

  document.getElementById("compassContainer").style.display = "block";
  
  hideModeButtons();
  
  document.getElementById("bottom").style.display = "flex";

  drawCompass();

  document.getElementById("top").innerHTML = "";

  stepTurnSouth();
}

/* ---------- STEPS ---------- */

function stepTurnSouth() {
  document.getElementById("top").innerHTML = `
    <div>Повернись к Югу (Солнце в полдень)</div>
    <button onclick="stepTime()">Готово</button>
  `;
}

function stepTime() {

  const times = ["Рассвет","Утро","Полдень","Вечер","Закат","Ночь"];

  document.getElementById("top").innerHTML = `
    <div>Какое время суток?</div>

    <div style="
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:8px;
      margin-top:15px;
      width:100%;
      max-width:300px;
    ">
      ${times.map(t => `<button onclick="stepHome()">${t}</button>`).join("")}
    </div>
  `;
}

function stepHome() {
  document.getElementById("top").innerHTML = `
    <div>Где твой Дом?</div>
    <div class="grid">
      <div class="cell" onclick="selectDir('nw')">↖</div>
      <div class="cell" onclick="selectDir('n')">↑</div>
      <div class="cell" onclick="selectDir('ne')">↗</div>
      <div class="cell" onclick="selectDir('w')">←</div>
      <div class="cell" onclick="selectCenter()">Я</div>
      <div class="cell" onclick="selectDir('e')">→</div>
      <div class="cell" onclick="selectDir('sw')">↙</div>
      <div class="cell" onclick="selectDir('s')">↓</div>
      <div class="cell" onclick="selectDir('se')">↘</div>
    </div>
  `;
}

/* ---------- LOGIC ---------- */

const oppositeMap = {
  n:"s", ne:"sw", e:"w", se:"nw",
  s:"n", sw:"ne", w:"e", nw:"se"
};

function selectCenter() {
  centerActive = true;
  activeSegments = [];
  finalSegment = null;
  drawCompass();
  stepEmotion();
}

function selectDir(dir) {

  centerActive = false;

  const opp = oppositeMap[dir];

  activeSegments = [
    `0_${opp}`,
    `1_${opp}`,
    `2_${opp}`
  ];

  drawCompass();
  stepDistance();
}

/* ---------- DISTANCE ---------- */

function stepDistance() {
  document.getElementById("top").innerHTML = `
    <div>Как далеко?</div>
    <button onclick="setDistance(1)">Близко</button>
    <button onclick="setDistance(2)">Средне</button>
    <button onclick="setDistance(3)">Далеко</button>
  `;
}

function setDistance(d) {

  const dir = activeSegments[0].split("_")[1];

  activeSegments = [];
  finalSegment = `${d-1}_${dir}`;

  drawCompass();
  stepEmotion();
}

/* ---------- EMOTION ---------- */

function stepEmotion() {

  document.getElementById("top").innerHTML = `
    <div>Состояние:</div>

    <div style="
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-top:15px;
      width:100%;
      max-width:300px;
    ">

      <button onclick="selectEmotion('#FFD700')">Радостное созидание</button>
      <button onclick="selectEmotion('#FFFFFF')">Осознанное творчество</button>
      <button onclick="selectEmotion('#4FC3F7')">Вдохновение</button>

      <button onclick="selectEmotion('#26C6DA')">Фантазии</button>
      <button onclick="selectEmotion('#808080')">Нейтральное</button>
      <button onclick="selectEmotion('#4CAF50')">Тоска</button>

      <button onclick="selectEmotion('#F44336')">Агрессия</button>
      <button onclick="selectEmotion('#FF9800')">Активность</button>
      <button onclick="selectEmotion('#000000')">Хаос</button>

    </div>
  `;
}

function selectEmotion(color) {

  if (centerActive) {
    coloredSegments["center"] = color;
  } else {
    coloredSegments[finalSegment] = color;
  }

  drawCompass();
  showModeButtons();
}

/* ---------- COMPASS ---------- */

const centerX = 150;
const centerY = 150;

const rings = [
  {inner:30, outer:60},
  {inner:60, outer:95},
  {inner:95, outer:130}
];

const directions = ["s","sw","w","nw","n","ne","e","se"];

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function segmentPath(innerR, outerR, a0, a1) {

  const p1 = polar(centerX, centerY, outerR, a0);
  const p2 = polar(centerX, centerY, outerR, a1);
  const p3 = polar(centerX, centerY, innerR, a1);
  const p4 = polar(centerX, centerY, innerR, a0);

  return `
    M ${p1.x} ${p1.y}
    A ${outerR} ${outerR} 0 0 1 ${p2.x} ${p2.y}
    L ${p3.x} ${p3.y}
    A ${innerR} ${innerR} 0 0 0 ${p4.x} ${p4.y}
    Z
  `;
}

function drawCompass() {

  let svg = `<svg viewBox="0 0 300 300">`;

  const step = (Math.PI*2)/8;
  const offset = -step/2;

  rings.forEach((ring, rIndex) => {

    directions.forEach((dir, dIndex) => {

      let a0 = -Math.PI/2 + offset + dIndex*step;
      let a1 = a0 + step;

      const id = `${rIndex}_${dir}`;

      let fill = "transparent";

      if (activeSegments.includes(id)) fill = "#666";
      if (finalSegment === id) fill = "#aaa";
      if (coloredSegments[id]) fill = coloredSegments[id] + "88";

      svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
      fill="${fill}" stroke="#222"/>`;

    });

  });

  let centerFill = "#111";
  if (centerActive) centerFill = "#aaa";
  if (coloredSegments["center"]) centerFill = coloredSegments["center"];

  svg += `<circle cx="150" cy="150" r="25"
  fill="${centerFill}" stroke="#444"/>`;

  svg += `</svg>`;

  document.getElementById("compass").innerHTML = svg;
}

/* ---------- UI ---------- */

function hideModeButtons() {
  document.getElementById("modeButtons").style.display = "none";
}

function showModeButtons() {
  document.getElementById("modeButtons").style.display = "flex";
}

</script>

</body>
</html>
