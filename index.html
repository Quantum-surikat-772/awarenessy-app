<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Awarenessy</title>

<style>
:root{
  --bg:#050505;
  --panel:#0d0d0d;
  --card:#141414;
  --line:#262626;
  --text:#f2f2f2;
  --muted:#8d8d8d;
  --gold:#c8a96b;
  --danger:#c51616;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  justify-content:center;
}

#app{
  width:100%;
  max-width:520px;
  height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.03), transparent 25%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,.02), transparent 25%),
    var(--bg);
}

/* ---------- TOP / BOTTOM ---------- */

#topPanel{
  flex:1;
  padding:18px 16px 10px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

#bottomPanel{
  height:0;
  overflow:hidden;
  transition:.45s ease;
  border-top:1px solid rgba(255,255,255,.04);
}

#bottomPanel.show{
  height:50vh;
}

#compassWrap{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

#compassStage{
  width:min(78vw,340px);
  height:min(78vw,340px);
  border-radius:50%;
  border:1px solid rgba(255,255,255,.06);
  background:
    radial-gradient(circle at center, rgba(255,255,255,.03), transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(200,169,107,.05), transparent 62%);
  box-shadow:
    0 0 24px rgba(255,255,255,.03),
    inset 0 0 24px rgba(255,255,255,.02);
  position:relative;
}

#compassStage::before{
  content:"";
  position:absolute;
  inset:18%;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.03);
}

#compassStage::after{
  content:"";
  position:absolute;
  inset:40%;
  border-radius:50%;
  background:
    radial-gradient(circle, rgba(255,255,255,.55), rgba(200,169,107,.18), transparent 70%);
  filter:blur(4px);
}

/* ---------- TEXT ---------- */

.brand{
  font-size:12px;
  letter-spacing:2px;
  color:var(--gold);
  opacity:.85;
  margin-bottom:14px;
}

.title{
  font-size:28px;
  line-height:1.25;
  font-weight:700;
  max-width:340px;
}

.sub{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}

.fade{
  animation:fade .7s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:none;}
}

/* ---------- BUTTONS ---------- */

.row{
  display:flex;
  gap:10px;
  width:100%;
  max-width:320px;
  margin-top:24px;
}

button{
  appearance:none;
  border:none;
  outline:none;
  cursor:pointer;
  width:100%;
  min-height:48px;
  border-radius:12px;
  background:linear-gradient(180deg,#171717,#101010);
  color:var(--text);
  border:1px solid var(--line);
  font-size:15px;
  font-weight:600;
}

button:active{
  transform:translateY(1px) scale(.995);
}

.secondary{
  color:#d0d0d0;
}

.redMode{
  background:var(--danger)!important;
}

#langBar{
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  gap:6px;
}

.mini{
  width:42px;
  min-height:34px;
  font-size:12px;
  border-radius:10px;
}

/* ---------- VIDEO / IMG ---------- */

.media{
  width:100%;
  max-width:340px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  margin-top:8px;
}

.media img,
.media video{
  width:100%;
  display:block;
}

/* ---------- FOOT ---------- */

#footerHint{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
  font-size:11px;
  color:#666;
}
</style>
</head>
<body>

<div id="app">

  <div id="topPanel"></div>

  <div id="bottomPanel">
    <div id="compassWrap">
      <div id="compassStage"></div>
    </div>
  </div>

  <div id="footerHint">Awarenessy Foundation Build</div>
</div>

<script>
/* =====================================================
   FOUNDATION BUILD v2.0
===================================================== */

/* ---------- TELEGRAM INIT ---------- */
try{
  if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
}catch(e){}

/* ---------- STATE ---------- */
const state = {
  lang: localStorage.getItem("awarenessy_lang") || detectLang(),
  mode:null,
  screen:"intro"
};

/* ---------- I18N ---------- */
const TXT = {
  ru:{
    brand:"ОСоЗНАЙКА!",
    wake:"ЯВЬ",
    dream:"СОН",
    observe:"Я наблюдаю...",
    five:"Что ты делал 5 минут назад?",
    home:"В каком направлении твой Дом?",
    alert:"ЭТО НЕ СОН?",
    proceed:"Начать"
  },
  en:{
    brand:"AWARENESSY!",
    wake:"WAKE",
    dream:"DREAM",
    observe:"I observe...",
    five:"What were you doing 5 minutes ago?",
    home:"Where is your Home direction?",
    alert:"THIS IS NOT A DREAM?",
    proceed:"Begin"
  },
  es:{
    brand:"CONCIENCITO!",
    wake:"VIGILIA",
    dream:"SUEÑO",
    observe:"Estoy observando...",
    five:"¿Qué hacías hace 5 minutos?",
    home:"¿En qué dirección está tu Hogar?",
    alert:"¿ESTO NO ES UN SUEÑO?",
    proceed:"Empezar"
  }
};

function t(key){
  return TXT[state.lang][key] || key;
}

function detectLang(){
  let code="en";
  try{
    if(window.Telegram?.WebApp?.initDataUnsafe?.user?.language_code){
      code = Telegram.WebApp.initDataUnsafe.user.language_code;
    }else{
      code = navigator.language || "en";
    }
  }catch(e){}
  code = code.toLowerCase();
  if(code.startsWith("ru")) return "ru";
  if(code.startsWith("es")) return "es";
  return "en";
}

/* ---------- DOM ---------- */
const topPanel = document.getElementById("topPanel");
const bottomPanel = document.getElementById("bottomPanel");

/* ---------- INTRO VARIANTS ---------- */
const introVariants = [
  "observe",
  "five",
  "home",
  "alert",
  "image",
  "video"
];

function randomIntro(){
  return introVariants[Math.floor(Math.random()*introVariants.length)];
}

/* ---------- RENDER ---------- */
function renderIntro(){
  state.screen="intro";
  state.mode=null;

  bottomPanel.classList.remove("show");

  const v = randomIntro();

  if(v==="alert"){
    topPanel.innerHTML = `
      <div class="brand fade">${t("brand")}</div>
      <div class="title fade" style="background:var(--danger);padding:18px;border-radius:18px;">
        ${t("alert")}
      </div>
      ${modeButtons()}
      ${langBar()}
    `;
    bindLang();
    bindModes();
    return;
  }

  if(v==="image"){
    topPanel.innerHTML = `
      <div class="brand fade">${t("brand")}</div>
      <div class="media fade">
        <img src="https://picsum.photos/600/600?grayscale" alt="">
      </div>
      ${modeButtons()}
      ${langBar()}
    `;
    bindLang();
    bindModes();
    return;
  }

  if(v==="video"){
    topPanel.innerHTML = `
      <div class="brand fade">${t("brand")}</div>
      <div class="media fade">
        <video autoplay muted loop playsinline>
          <source src="" type="video/mp4">
        </video>
      </div>
      <div class="sub fade">video placeholder</div>
      ${modeButtons()}
      ${langBar()}
    `;
    bindLang();
    bindModes();
    return;
  }

  topPanel.innerHTML = `
    <div class="brand fade">${t("brand")}</div>
    <div class="title fade">${t(v)}</div>
    <div class="sub fade">Awareness training interface</div>
    ${modeButtons()}
    ${langBar()}
  `;

  bindLang();
  bindModes();
}

function modeButtons(){
  return `
    <div class="row fade">
      <button id="wakeBtn">${t("wake")}</button>
      <button id="dreamBtn" class="secondary">${t("dream")}</button>
    </div>
  `;
}

function langBar(){
  return `
    <div id="langBar">
      <button class="mini langBtn" data-lang="ru">RU</button>
      <button class="mini langBtn" data-lang="en">EN</button>
      <button class="mini langBtn" data-lang="es">ES</button>
    </div>
  `;
}

/* ---------- MODE ENTER ---------- */
function enterMode(mode){
  state.mode=mode;
  bottomPanel.classList.add("show");

  topPanel.innerHTML = `
    <div class="brand fade">${t("brand")}</div>
    <div class="title fade">${mode==="wake" ? t("wake") : t("dream")}</div>
    <div class="sub fade">
      Foundation build active.<br>
      Next phase adds full flow logic.
    </div>
    <div class="row fade">
      <button id="backBtn">←</button>
      <button>${t("proceed")}</button>
    </div>
  `;

  document.getElementById("backBtn").onclick = renderIntro;
}

/* ---------- BINDERS ---------- */
function bindModes(){
  document.getElementById("wakeBtn").onclick = ()=>enterMode("wake");
  document.getElementById("dreamBtn").onclick = ()=>enterMode("dream");
}

function bindLang(){
  document.querySelectorAll(".langBtn").forEach(btn=>{
    btn.onclick=()=>{
      state.lang = btn.dataset.lang;
      localStorage.setItem("awarenessy_lang",state.lang);
      renderIntro();
    };
  });
}

/* ---------- START ---------- */
renderIntro();

</script>
</body>
</html>
