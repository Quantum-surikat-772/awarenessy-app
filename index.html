<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Awarenessy</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* верх — сценарий */
#top {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* низ — всегда компас */
#bottom {
  height: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* контейнер компаса */
#compass {
  width: 300px;
  height: 300px;
}

/* кнопки режимов */
#modeButtons {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
}

/* сетка направлений */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
  margin-top: 20px;
}

.cell {
  width: 60px;
  height: 60px;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

/* кнопки */
button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  margin: 5px;
}
.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom" class="hidden">
  <div id="compass"></div>
</div>

<div id="modeButtons">
  <button onclick="enterMode()">ЯВЬ</button>
  <button onclick="enterMode()">СОН</button>
</div>

<script>

/* ---------------- STATE ---------------- */

let activeSegments = [];
let finalSegment = null;
let centerActive = false;
let coloredSegments = {};

/* ---------------- START ---------------- */

const scenarios = [
  "Я наблюдаю...",
  "ЭТО НЕ СОН?",
  "В каком настроении ты был 5 минут назад?",
  "В каком направлении твой Дом?"
];

function startScreen() {
  const text = scenarios[Math.floor(Math.random()*scenarios.length)];
  document.getElementById("top").innerHTML = `<div>${text}</div>`;
}

startScreen();

// гарантированно скрываем компас при запуске
document.getElementById("bottom").classList.add("hidden");

/* ---------------- MODE ---------------- */

function enterMode() {
  hideModeButtons();

  document.getElementById("bottom").classList.remove("hidden");

  drawCompass(); // ← вот сюда перенести

  document.getElementById("top").innerHTML = "";

  stepTurnSouth();
}

/* ---------------- STEPS ---------------- */

function stepTurnSouth() {
  document.getElementById("top").innerHTML = `
    <div>Повернись к Югу (Солнце в полдень)</div>
    <button onclick="stepTime()">Готово</button>
  `;
}

function stepTime() {

  const times = ["Рассвет","Утро","Полдень","Вечер","Закат","Ранняя ночь","Глубокая ночь","Перед рассветом"];

  document.getElementById("top").innerHTML = `
    <div>Какое время суток?</div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;">
      ${times.map(t => `<button onclick="stepHome()">${t}</button>`).join("")}
    </div>
  `;
}

function stepHome() {
  document.getElementById("top").innerHTML = `
    <div>В каком направлении твой Дом?</div>
    <div class="grid">
      <div class="cell" onclick="selectDir('nw')">↖</div>
      <div class="cell" onclick="selectDir('n')">↑</div>
      <div class="cell" onclick="selectDir('ne')">↗</div>
      <div class="cell" onclick="selectDir('w')">←</div>
      <div class="cell" onclick="selectCenter()">Я</div>
      <div class="cell" onclick="selectDir('e')">→</div>
      <div class="cell" onclick="selectDir('sw')">↙</div>
      <div class="cell" onclick="selectDir('s')">↓</div>
      <div class="cell" onclick="selectDir('se')">↘</div>
    </div>
  `;
}

/* ---------------- LOGIC ---------------- */

const oppositeMap = {
  n:"s", ne:"sw", e:"w", se:"nw",
  s:"n", sw:"ne", w:"e", nw:"se"
};

function selectCenter() {
  centerActive = true;
  activeSegments = [];
  finalSegment = null;
  drawCompass();
  stepEmotion();
}

function selectDir(dir) {

  centerActive = false;

  const opp = oppositeMap[dir];

  activeSegments = [
    `0_${opp}`,
    `1_${opp}`,
    `2_${opp}`
  ];

  drawCompass();
  stepDistance();
}

/* ---------------- DISTANCE ---------------- */

function stepDistance() {
  document.getElementById("top").innerHTML = `
    <div>Как далеко ты от Дома?</div>
    <button onclick="setDistance(1)">Близко</button>
    <button onclick="setDistance(2)">Средне</button>
    <button onclick="setDistance(3)">Далеко</button>
  `;
}

function setDistance(d) {
  const dir = activeSegments[0].split("_")[1];

  activeSegments = [];
  finalSegment = `${d-1}_${dir}`;

  drawCompass();
  stepEmotion();
}

/* ---------------- EMOTION ---------------- */

const emotions = [
  {name:"Радостное созидание", color:"#FFD700"},
  {name:"Осознанное творчество", color:"#FFFFFF"},
  {name:"Вдохновение", color:"#4FC3F7"},

  {name:"Фантазии / пассивность", color:"#26C6DA"},
  {name:"Нейтральное (пассивная вовлечённость)", color:"#808080"},
  {name:"Тоска / зависимость", color:"#4CAF50"},

  {name:"Агрессия / доминирование", color:"#F44336"},
  {name:"Активность / соревнование", color:"#FF9800"},
  {name:"Хаос / отчаяние", color:"#000000"}
];

function stepEmotion() {
  document.getElementById("top").innerHTML = `
    <div>Какое состояние сейчас доминирует?</div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;">
    <div>Выбери до 3 состояний (по убыванию силы)</div>
      ${emotionColors.map(c => `
        <button style="background:${c};width:40px;height:40px"
        onclick="selectEmotion('${c}')"></button>
      `).join("")}
    </div>
  `;
}

function selectEmotion(color) {

  if (selectedEmotions.length < 3) {
    selectedEmotions.push(color);
  }

  // применяем только ПЕРВУЮ (главную)
  const mainColor = selectedEmotions[0];

  if (centerActive) {
    coloredSegments["center"] = mainColor;
  } else {
    coloredSegments[finalSegment] = mainColor;
  }

  drawCompass();

  // если выбрали 3 — завершаем
  if (selectedEmotions.length === 3) {
    showModeButtons();
  }
}

/* ---------------- COMPASS ---------------- */

const centerX = 150;
const centerY = 150;

const rings = [
  {inner:30, outer:60},
  {inner:60, outer:95},
  {inner:95, outer:130}
];

const directions = ["s","sw","w","nw","n","ne","e","se"];

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function segmentPath(innerR, outerR, a0, a1) {

  const p1 = polar(centerX, centerY, outerR, a0);
  const p2 = polar(centerX, centerY, outerR, a1);
  const p3 = polar(centerX, centerY, innerR, a1);
  const p4 = polar(centerX, centerY, innerR, a0);

  return `
    M ${p1.x} ${p1.y}
    A ${outerR} ${outerR} 0 0 1 ${p2.x} ${p2.y}
    L ${p3.x} ${p3.y}
    A ${innerR} ${innerR} 0 0 0 ${p4.x} ${p4.y}
    Z
  `;
}

function drawCompass() {

  let svg = `<svg viewBox="0 0 300 300">`;

  const step = (Math.PI*2)/8;
  const offset = -step/2;

  rings.forEach((ring, rIndex) => {

    directions.forEach((dir, dIndex) => {

      let a0 = -Math.PI/2 + offset + dIndex*step;
      let a1 = a0 + step;

      const id = `${rIndex}_${dir}`;

      let fill = "#0a0a0a";

      if (activeSegments.includes(id)) fill = "#888";
      if (finalSegment === id) fill = "#ccc";
      if (coloredSegments[id]) fill = coloredSegments[id];

      svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
      fill="${fill}" stroke="#222"/>`;

    });

  });

  let centerFill = "#111";
  if (centerActive) centerFill = "#ccc";
  if (coloredSegments["center"]) centerFill = coloredSegments["center"];

  svg += `<circle cx="150" cy="150" r="25"
  fill="${centerFill}" stroke="#444"/>`;

  svg += `
    <text x="150" y="20" text-anchor="middle" fill="#666">S</text>
    <text x="280" y="155" text-anchor="middle" fill="#666">W</text>
    <text x="150" y="290" text-anchor="middle" fill="#666">N</text>
    <text x="20" y="155" text-anchor="middle" fill="#666">E</text>
  `;

  svg += `</svg>`;

  document.getElementById("compass").innerHTML = svg;
}

drawCompass();

/* ---------------- UI ---------------- */

function hideModeButtons() {
  document.getElementById("modeButtons").style.display = "none";
}

function showModeButtons() {
  document.getElementById("modeButtons").style.display = "flex";
}

</script>

</body>
</html>
