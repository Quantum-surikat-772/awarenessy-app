<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awarenessy V5.2</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

#app{
max-width:520px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

#top{
height:50%;
display:flex;
flex-direction:column;
}

#bottom{
height:50vh;
position:relative;
display:flex;
align-items:flex-end;
justify-content:center;
padding:10px;
}

#header{
display:flex;
justify-content:space-between;
padding:10px;
}

#brand{
color:#c9a86a;
font-weight:700;
}

#langs button{
background:none;
border:none;
color:#aaa;
margin-left:6px;
}

#content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
}

.row{
position:absolute;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
}

button{
flex:1;
height:50px;
background:#111;
color:#fff;
border:1px solid #333;
border-radius:10px;
}
</style>
</head>

<body>
<h1>Я ЖИВОЙ</h1>
<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<script>

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");

function intro(){

topBox.innerHTML = `
<div style="text-align:center; font-size:22px;">
Я наблюдаю...
</div>
`;

bottomBox.innerHTML = `
console.log("BOTTOM:", bottomBox.innerHTML);
<div style="
background:red;
padding:10px;
display:flex;
gap:10px;
">
<button style="flex:1;height:50px;">ЯВЬ</button>
<button style="flex:1;height:50px;">СОН</button>
</div>
`;
}

window.onload = intro;

</script>

</body>
</html>
