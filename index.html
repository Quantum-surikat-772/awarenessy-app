<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awarenessy V5</title>

<style>
body{
<h1>Я ЖИВОЙ</h1>
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#top{
height:50vh;
display:flex;
align-items:center;
justify-content:center;
}

#bottom{
height:50vh;
display:flex;
align-items:flex-end;
justify-content:center;
padding:10px;
}

.row{
width:100%;
display:flex;
gap:10px;
}

button{
flex:1;
height:50px;
background:#111;
color:#fff;
border:1px solid #333;
border-radius:10px;
}
</style>
</head>

<body>

<div id="top"></div>
<div id="bottom"></div>

<script>
alert("JS работает");

const top = document.getElementById("top");
const bottom = document.getElementById("bottom");

function intro(){
top.innerHTML = "СТАРТ ЭКРАН";

bottom.innerHTML = `
<div class="row">
<button>ЯВЬ</button>
<button>СОН</button>
</div>
`;
}

window.onload = intro;

</script>

</body>
</html>
