<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy V5.1</title>

<style>
:root{
--bg:#050505;
--gold:#c9a86a;
--line:#242424;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
margin:0;
height:100%;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}

#app{
max-width:520px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
background:#050505;
}

#top,#bottom{height:50%;padding:10px;}
#bottom{
position:relative;
display:flex;
justify-content:flex-end;
}

#top{
display:flex;
flex-direction:column;
}

#header{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

#brand{color:var(--gold);font-weight:700;cursor:pointer;}

#langs button{
background:none;
border:none;
color:#aaa;
font-size:13px;
margin-left:6px;
}

#langs button.active{
color:#fff;
}

#content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
overflow:hidden;
}

.main{
width:100%;
height:44px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:#fff;
margin-top:6px;
}

.row{
position:absolute;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:8px;
}

#modal{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999;
overflow:hidden;
}

#emissary{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%) scale(1);
width:90%;
opacity:0;
}

#msg{
position:absolute;
top:14%;
left:50%;
transform:translateX(-50%);
width:82%;
max-width:360px;
text-align:left;
line-height:1.5;
opacity:0;
}

</style>
</head>

<body>

<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<div id="app">
  <div id="top"></div>
  <div id="bottom"></div>
</div>

<button id="settingsBtn"
class="main"
onclick="openSettings()"
style="
position:absolute;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:90%;
opacity:0;
">
</button>

<button id="backBtn"
onclick="closeModal()"
class="main"
style="
position:absolute;
bottom:16px;
left:50%;
transform:translateX(-50%);
width:90%;
opacity:0;
">
</button>

</div>

<script>
window.onload = () => {
  document.getElementById("top").innerHTML = "TOP OK";
  document.getElementById("bottom").innerHTML = "BOTTOM OK";
};
</script>

</body>
</html>
