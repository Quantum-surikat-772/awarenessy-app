<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awarenessy</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#top {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

#bottom {
  height: 50%;
  display: none;
  justify-content: center;
  align-items: center;
}

#compassContainer {
  position: relative;
  width: 300px;
  height: 300px;
}

#compassBg {
  position: absolute;
  width: 100%;
  height: 100%;
}

#compass {
  position: absolute;
  width: 100%;
  height: 100%;
}

button {
  background: #1a1a1a;
  color: #bbb;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 8px;
  margin: 4px;
}

#modeButtons {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
}
</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">
  <div id="compassContainer">
    <img src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png" id="compassBg">
    <div id="compass"></div>
  </div>
</div>

<div id="modeButtons">
  <button onclick="enterMode()">ЯВЬ</button>
  <button onclick="enterMode()">СОН</button>
</div>

<script>

/* ---------- STATE ---------- */

let selectedDirection = null;
let invertedDirection = null;
let finalSegment = null;
let activeSegments = [];
let coloredSegments = {};

/* ---------- START ---------- */

startScreen();

function startScreen() {
  document.getElementById("top").innerHTML = "Я наблюдаю...";
}

/* ---------- MODE ---------- */

function enterMode() {

  document.getElementById("top").innerHTML = "";
  document.getElementById("bottom").style.display = "flex";

  drawCompass();

  setTimeout(stepTurnSouth, 200);
}

/* ---------- STEP 1 ---------- */

function stepTurnSouth() {
  document.getElementById("top").innerHTML = `
    <div>
      Повернись к Югу<br>
      <button onclick="stepHome()">Готово</button>
    </div>
  `;
}

/* ---------- STEP 2 ---------- */

function stepHome() {
  document.getElementById("top").innerHTML = `
    <div>Где твой Дом?</div>
    <div>
      <button onclick="selectDir('n')">↑</button>
      <button onclick="selectDir('ne')">↗</button>
      <button onclick="selectDir('e')">→</button>
      <button onclick="selectDir('se')">↘</button>
      <button onclick="selectDir('s')">↓</button>
      <button onclick="selectDir('sw')">↙</button>
      <button onclick="selectDir('w')">←</button>
      <button onclick="selectDir('nw')">↖</button>
      <button onclick="selectCenter()">Я</button>
    </div>
  `;
}

/* ---------- LOGIC ---------- */

const oppositeMap = {
  n:"s", ne:"sw", e:"w", se:"nw",
  s:"n", sw:"ne", w:"e", nw:"se"
};

function selectDir(dir) {

  selectedDirection = dir;
  invertedDirection = oppositeMap[dir];

  activeSegments = [
    `0_${invertedDirection}`,
    `1_${invertedDirection}`,
    `2_${invertedDirection}`
  ];

  finalSegment = null;

  drawCompass();
  stepDistance();
}

function selectCenter() {

  if (invertedDirection) {
    activeSegments = [
      `0_${invertedDirection}`,
      `1_${invertedDirection}`,
      `2_${invertedDirection}`
    ];
  }

  finalSegment = null;

  drawCompass();
  stepEmotion();
}

/* ---------- DISTANCE ---------- */

function stepDistance() {
  document.getElementById("top").innerHTML = `
    <div>Как далеко?</div>
    <button onclick="setDistance(1)">Близко</button>
    <button onclick="setDistance(2)">Средне</button>
    <button onclick="setDistance(3)">Далеко</button>
  `;
}

function setDistance(d) {

  activeSegments = [];
  finalSegment = `${d-1}_${invertedDirection}`;

  drawCompass();
  stepEmotion();
}

/* ---------- EMOTION ---------- */

function stepEmotion() {
  document.getElementById("top").innerHTML = `
    <div>Состояние:</div>
    <button onclick="selectEmotion('#FFD700')">Радость</button>
    <button onclick="selectEmotion('#3F51B5')">Вдохновение</button>
    <button onclick="selectEmotion('#26C6DA')">Фантазия</button>
  `;
}

function selectEmotion(color) {
  coloredSegments[finalSegment] = color;
  drawCompass();
}

/* ---------- COMPASS ---------- */

const centerX = 150;
const centerY = 150;

const rings = [
  {inner:30, outer:60},
  {inner:60, outer:95},
  {inner:95, outer:130}
];

const directions = ["s","sw","w","nw","n","ne","e","se"];

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function segmentPath(innerR, outerR, a0, a1) {
  const p1 = polar(centerX, centerY, outerR, a0);
  const p2 = polar(centerX, centerY, outerR, a1);
  const p3 = polar(centerX, centerY, innerR, a1);
  const p4 = polar(centerX, centerY, innerR, a0);

  return `
    M ${p1.x} ${p1.y}
    A ${outerR} ${outerR} 0 0 1 ${p2.x} ${p2.y}
    L ${p3.x} ${p3.y}
    A ${innerR} ${innerR} 0 0 0 ${p4.x} ${p4.y}
    Z
  `;
}

function drawCompass() {

  let svg = `<svg viewBox="0 0 300 300">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>`;

  const step = (Math.PI*2)/8;

  rings.forEach((ring, rIndex) => {
    directions.forEach((dir, dIndex) => {

      let a0 = -Math.PI/2 + dIndex*step;
      let a1 = a0 + step;

      const id = `${rIndex}_${dir}`;

      // направление (гало)
      if (activeSegments.includes(id)) {
        svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
          fill="url(#glow)" opacity="0.3"/>`;
      }

      // финальный сегмент
      if (finalSegment === id) {
        svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
          fill="url(#glow)" opacity="0.5"/>`;
      }

      // эмоция
      if (coloredSegments[id]) {
        svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
          fill="${coloredSegments[id]}" opacity="0.9"/>`;

        svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
          fill="url(#glow)" style="mix-blend-mode: screen"/>`;
      }

    });
  });

  svg += `</svg>`;

  document.getElementById("compass").innerHTML = svg;
}

</script>

</body>
</html>
