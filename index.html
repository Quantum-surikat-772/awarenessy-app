<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awarenessy V5.2</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

#app{
max-width:520px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

#top{
height:50%;
display:flex;
flex-direction:column;
}

#bottom{
height:50%;
position:relative;
}

#header{
display:flex;
justify-content:space-between;
padding:10px;
}

#brand{
color:#c9a86a;
font-weight:700;
}

#langs button{
background:none;
border:none;
color:#aaa;
margin-left:6px;
}

#content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
}

.row{
position:absolute;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
}

button{
flex:1;
height:50px;
background:#111;
color:#fff;
border:1px solid #333;
border-radius:10px;
}
</style>
</head>

<body>
<h1>Я ЖИВОЙ</h1>
<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<script>

const top = document.getElementById("top");
const bottom = document.getElementById("bottom");

const HAND_IMG="https://i.postimg.cc/zXp9BVGf/Hands-1.png";
const HAND_VIDEO="https://i.imgur.com/ocTkSQj.mp4";

const state={lang:"ru"};

const TXT={
ru:{
brand:"ОСоЗНАЙКА!",
wake:"ЯВЬ",
dream:"СОН",
special:"ЭТО НЕ СОН?",
intro:[
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя настроение?"
]
},
en:{
brand:"AWARENESSY!",
wake:"WAKE",
dream:"DREAM",
special:"IS THIS A DREAM?",
intro:[
"What were you doing 5 minutes ago?",
"I observe...",
"Where is your Home?",
"Look at your hands",
"How do you feel?"
]
},
es:{
brand:"¡CONCIENCITO!",
wake:"VIGILIA",
dream:"SUEÑO",
special:"¿ESTO ES UN SUEÑO?",
intro:[
"¿Qué hacías hace 5 minutos?",
"Observo...",
"¿Dónde está tu hogar?",
"Mira tus manos",
"¿Cómo te sientes?"
]
}
};

function t(k){ return TXT[state.lang][k]; }

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function intro(){

const r = Math.random();

let html = "";
let style = "";

// 🔴 АНОМАЛИЯ
if(r < 0.2){

style = "background:#c00000;";

html = `
<div style="font-size:28px;font-weight:800;">
${t("special")}
</div>
`;

}

// 🖐 PNG
else if(r < 0.5){

html = `
<img src="${HAND_IMG}" style="width:120%; max-width:480px;">
`;

}

// 🎥 VIDEO
else if(r < 0.75){

html = `
<video autoplay muted loop playsinline
style="width:110%; transform:translateY(-10%);">
<source src="${HAND_VIDEO}" type="video/mp4">
</video>
`;

}

// 🧠 TEXT
else{

html = `
<div style="font-size:22px;">
${rand(t("intro"))}
</div>
`;

}

// TOP
top.innerHTML = `
<div id="header">

<div id="brand">${t("brand")}</div>

<div id="langs">
<button onclick="setLang('ru')">RU</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>

</div>

<div id="content" style="${style}">
${html}
</div>
`;

// BOTTOM
bottom.innerHTML = `
<div class="row">
<button>${t("wake")}</button>
<button>${t("dream")}</button>
</div>
`;

}

function setLang(l){
state.lang = l;
intro();
}

window.onload = intro;

</script>

</body>
</html>
