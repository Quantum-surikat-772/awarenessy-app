<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Awarenessy Mini App</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #1e1e1e;
      color: #ffffff;
      text-align: center;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      margin: 10px 0;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4caf50;
      color: #fff;
      transition: transform 0.15s, background-color 0.15s;
    }
    button:active {
      transform: scale(1.1);
      background-color: #66bb6a;
    }
    #status {
      margin-top: 15px;
      font-size: 16px;
    }
    #counter {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      color: #ffeb3b;
    }
  </style>
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Awarenessy Mini App</h1>

  <button id="checkUser">Проверить / Создать пользователя</button>
  <button id="awarenessButton">🧠 Я осознался</button>

  <div id="status"></div>
  <div id="counter">Сегодня осознался: 0 раз</div>

<script>
  // === Supabase setup ===
  const SUPABASE_URL = "https://najicjitgyvtdrjaowig.supabase.co";
  const SUPABASE_KEY = "sb_publishable_mqjiX2afN7dtivBeOcerWQ_iP2wm1uR";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const checkUserBtn = document.getElementById("checkUser");
  const awarenessBtn = document.getElementById("awarenessButton");
  const statusDiv = document.getElementById("status");
  const counterDiv = document.getElementById("counter");

  let dailyCounter = 0; // локальный счётчик на сегодня

  // === Создание или проверка пользователя ===
  checkUserBtn.addEventListener("click", async () => {
    statusDiv.innerText = "Проверяем пользователя...";

    const tg = window.Telegram?.WebApp;
    let telegramUser = tg?.initDataUnsafe?.user;

    if (!telegramUser) {
      console.log("⚠️ Telegram user не получен, используем тестового");
      telegramUser = { id: 999999999, first_name: "TestUser" };
    }

    try {
      const { data, error } = await supabase
        .from("users")
        .upsert([
          { telegram_id: telegramUser.id, first_name: telegramUser.first_name, nickname: telegramUser.username || telegramUser.first_name }
        ], { onConflict: "telegram_id" });

      if (error) {
        console.error("Supabase error:", error);
        statusDiv.innerText = "Ошибка Supabase ❌";
        return;
      }

      statusDiv.innerText = "Пользователь успешно создан / проверен ✅";
    } catch (err) {
      console.error("Unexpected error:", err);
      statusDiv.innerText = "Неожиданная ошибка ❌";
    }
  });

  // === Фиксация момента осознанности ===
  awarenessBtn.addEventListener("click", async () => {
    statusDiv.innerText = "Фиксируем момент осознанности...";

    const tg = window.Telegram?.WebApp;
    let telegramUser = tg?.initDataUnsafe?.user;

    if (!telegramUser) {
      telegramUser = { id: 999999999 };
    }

    try {
      const { data: userData, error: userError } = await supabase
        .from("users")
        .select("id")
        .eq("telegram_id", telegramUser.id)
        .single();

      if (userError || !userData) {
        console.error("User not found:", userError);
        statusDiv.innerText = "Сначала создайте пользователя ❌";
        return;
      }

      const { error: insertError } = await supabase
        .from("awareness_sessions")
        .insert([{ user_id: userData.id }]);

      if (insertError) {
        console.error("Supabase insert error:", insertError);
        statusDiv.innerText = "Ошибка записи осознанности ❌";
        return;
      }

      dailyCounter++;
      counterDiv.innerText = `Сегодня осознался: ${dailyCounter} раз`;
      statusDiv.innerText = "Момент осознанности записан ✨";

      // лёгкая анимация кнопки
      awarenessBtn.style.transform = "scale(1.2)";
      setTimeout(() => { awarenessBtn.style.transform = "scale(1)"; }, 150);

    } catch (err) {
      console.error("Unexpected error:", err);
      statusDiv.innerText = "Неожиданная ошибка ❌";
    }
  });
</script>
</body>
</html>
