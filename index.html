<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy</title>

<style>
:root{
  --bg:#050505;
  --red:#d90000;
  --panel:#101010;
  --line:#2a2a2a;
  --text:#f4f4f4;
  --muted:#8a8a8a;
  --gold:#c8a96b;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}

body{
  display:flex;
  justify-content:center;
}

#app{
  width:100%;
  max-width:520px;
  height:100vh;
  position:relative;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.03), transparent 20%),
    radial-gradient(circle at 80% 65%, rgba(255,255,255,.02), transparent 25%),
    var(--bg);
}

/* ---------- TOP ---------- */

#topPanel{
  flex:1;
  padding:10px 16px 120px;
  display:flex;
  flex-direction:column;
}

#topPanel.mode{
  height:50vh;
  flex:none;
  padding:10px 16px 8px;
}

#header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

#headerLeft{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

#brand{
  font-size:16px;
  font-weight:700;
  letter-spacing:.8px;
  color:var(--gold);
}

#subBrand{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}

#langBar{
  display:flex;
  gap:6px;
}

.mini{
  width:38px;
  height:34px;
  border:none;
  border-radius:10px;
  background:#171717;
  color:#ddd;
  border:1px solid var(--line);
  font-size:12px;
}

#centerBox{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.title{
  font-size:30px;
  font-weight:700;
  line-height:1.25;
  max-width:360px;
}

.subtle{
  margin-top:10px;
  color:#d0d0d0;
  font-size:14px;
}

/* ---------- MEDIA ---------- */

.media{
  width:100%;
  max-width:360px;
  border-radius:18px;
  overflow:hidden;
}

.media img,
.media video{
  width:100%;
  display:block;
}

/* ---------- BOTTOM ---------- */

#bottomDock{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:12px 16px 16px;
}

#bottomDock.mode{
  height:50vh;
  padding:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.row{
  display:flex;
  gap:10px;
}

button.main{
  width:100%;
  height:52px;
  border:none;
  border-radius:14px;
  background:linear-gradient(180deg,#181818,#111);
  color:#fff;
  font-size:16px;
  font-weight:700;
  border:1px solid var(--line);
}

button.main:active{
  transform:translateY(1px);
}

#foot{
  margin-top:8px;
  font-size:11px;
  color:#666;
  text-align:center;
}

/* ---------- MODE CARD ---------- */

.modeCard{
  width:100%;
  max-width:360px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
}

.modeCard .title{
  font-size:26px;
}

/* ---------- COMPASS ---------- */

#compassArea{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

#compassWrap{
  position:relative;
  width:min(92vw,410px);
  height:min(92vw,410px);
}

#compassImg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
}

#compassSvg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* ---------- FX ---------- */

.fade{
  animation:fade .6s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:none;}
}

@keyframes emotionPulse{
  0%   { opacity:.45; transform:scale(0.92); }
  50%  { opacity:1; transform:scale(1.12); }
  100% { opacity:.45; transform:scale(0.92); }
}

.pulseCore{
  animation:emotionPulse 3s ease-in-out infinite;
  transform-origin:center;
}
  
</style>
</head>
<body>

<div id="app">
  <div id="topPanel"></div>
  <div id="bottomDock"></div>
</div>

<script>
/* =====================================
AWARENESSY FULL CLEAN 2.2
===================================== */

const state = {
  lang: localStorage.getItem("awarenessy_lang") || "ru",
  mode:null,
  emotionColor:null,

  entry:{
    mode:null,
    time:null,
    home:null,
    distance:null,
    created:null
  },

  beamDir:null,
  ring:null
};

const topPanel = document.getElementById("topPanel");
const bottomDock = document.getElementById("bottomDock");
const app = document.getElementById("app");

/* ---------- TEXT ---------- */

const TXT = {
ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения осознанности",
wake:"ЯВЬ",
dream:"СОН",
ready:"Готово",
turn:"Повернись к Югу",
hint:"(там где солнце в полдень)",
time:"Какое время суток?",
home:"В каком направлении от тебя твой Дом?",
dist:"Как далеко?",
saved:"Запись сохранена",
times:["Рассвет","Утро","День","Вечер","Закат","Ночь"],
distances:["Дом","Близко","Средне","Далеко"],
intro:[
"Я наблюдаю...",
"Что ты делал 5 минут назад?",
"В каком направлении твой Дом?"
]
},
en:{
brand:"AWARENESSY!",
sub:"Mediator of awareness training",
wake:"WAKE",
dream:"DREAM",
ready:"Ready",
turn:"Turn to the South",
hint:"(where the sun is at noon)",
time:"What time of day?",
home:"Where is your Home from you?",
dist:"How far?",
saved:"Saved",
times:["Dawn","Morning","Day","Evening","Sunset","Night"],
distances:["Home","Near","Medium","Far"],
intro:[
"I observe...",
"What were you doing 5 minutes ago?",
"Where is your Home?"
]
},
es:{
brand:"CONCIENCITO!",
sub:"Mediador del entrenamiento consciente",
wake:"VIGILIA",
dream:"SUEÑO",
ready:"Listo",
turn:"Gira hacia el Sur",
hint:"(donde el sol está al mediodía)",
time:"¿Qué momento del día?",
home:"¿Dónde está tu Hogar desde ti?",
dist:"¿Qué tan lejos?",
saved:"Guardado",
times:["Amanecer","Mañana","Día","Tarde","Atardecer","Noche"],
distances:["Hogar","Cerca","Medio","Lejos"],
intro:[
"Estoy observando...",
"¿Qué hacías hace 5 minutos?",
"¿Dónde está tu Hogar?"
]
}
};

function t(k){
  return TXT[state.lang][k];
}

/* ---------- HELPERS ---------- */

function rnd(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function header(){
return `
<div id="header">
 <div id="headerLeft">
   <div id="brand">${t("brand")}</div>
   <div id="subBrand">${t("sub")}</div>
 </div>

 <div id="langBar">
   <button class="mini lang" data-l="ru">RU</button>
   <button class="mini lang" data-l="en">EN</button>
   <button class="mini lang" data-l="es">ES</button>
 </div>
</div>
`;
}

function bindLang(){
document.querySelectorAll(".lang").forEach(btn=>{
btn.onclick=()=>{
state.lang=btn.dataset.l;
localStorage.setItem("awarenessy_lang",state.lang);
renderIntro();
};
});
}

/* ---------- INTRO ---------- */

function renderIntro(){

topPanel.className="";
bottomDock.className="";

const types=["text","image","video","alert"];
const mode=rnd(types);

app.style.background=`
radial-gradient(circle at 20% 15%, rgba(255,255,255,.03), transparent 20%),
radial-gradient(circle at 80% 65%, rgba(255,255,255,.02), transparent 25%),
var(--bg)
`;

let center="";

if(mode==="text"){
center=`<div class="title fade">${rnd(t("intro"))}</div>`;
}

if(mode==="image"){
center=`
<div class="media fade">
<img src="https://i.postimg.cc/zXp9BVGf/Hands-1.png">
</div>`;
}

if(mode==="video"){
center=`
<div class="media fade">
<video autoplay muted loop playsinline>
<source src="https://i.imgur.com/ocTkSQj.mp4" type="video/mp4">
</video>
</div>`;
}

if(mode==="alert"){
app.style.background="var(--red)";
center=`<div class="title fade">ЭТО НЕ СОН?</div>`;
}

topPanel.innerHTML=`
${header()}
<div id="centerBox">${center}</div>
`;

bottomDock.innerHTML=`
<div class="row">
<button class="main" id="wakeBtn">${t("wake")}</button>
<button class="main" id="dreamBtn">${t("dream")}</button>
</div>
<div id="foot">Awarenessy Full Clean 2.2</div>
`;

bindLang();

document.getElementById("wakeBtn").onclick=()=>enterMode("wake");
document.getElementById("dreamBtn").onclick=()=>enterMode("dream");
}

/* ---------- MODE ---------- */

function enterMode(mode){

state.mode=mode;

state.entry={
mode:mode,
time:null,
home:null,
distance:null,
created:new Date().toISOString()
};

state.beamDir=null;
state.ring=null;

topPanel.className="mode";
bottomDock.className="mode";

showCompass();
stepSouth();
}

/* ---------- COMPASS ---------- */

function showCompass(){

bottomDock.innerHTML=`
<div id="compassArea">
 <div id="compassWrap">
   <img id="compassImg"
   src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png">

   <svg id="compassSvg" viewBox="0 0 400 400"></svg>
 </div>
</div>
<div id="foot">Awarenessy Full Clean 2.2</div>
`;
}

const DIRS=["n","ne","e","se","s","sw","w","nw"];

function oppositeDir(dir){
const i=DIRS.indexOf(dir);
return DIRS[(i+4)%8];
}

function ringIndex(v){
if(v==="1") return 0;
if(v==="2") return 1;
if(v==="3") return 2;
return null;
}

function polar(cx,cy,r,a){
return {
x:cx+Math.cos(a)*r,
y:cy+Math.sin(a)*r
};
}

function path(innerR,outerR,a0,a1){

const p1=polar(200,200,outerR,a0);
const p2=polar(200,200,outerR,a1);
const p3=polar(200,200,innerR,a1);
const p4=polar(200,200,innerR,a0);

return `
M ${p1.x} ${p1.y}
A ${outerR} ${outerR} 0 0 1 ${p2.x} ${p2.y}
L ${p3.x} ${p3.y}
A ${innerR} ${innerR} 0 0 0 ${p4.x} ${p4.y}
Z
`;
}

function drawCompassLight(){

const svg=document.getElementById("compassSvg");
if(!svg) return;

svg.innerHTML="";

const emotion = state.emotionColor || null;

if(state.entry.home==="c" && emotion){

svg.innerHTML += `
<defs>
<radialGradient id="pulseCenter">
<stop offset="0%" stop-color="${emotion}" stop-opacity="1"/>
<stop offset="45%" stop-color="${emotion}" stop-opacity=".45"/>
<stop offset="100%" stop-color="${emotion}" stop-opacity="0"/>
</radialGradient>
</defs>

<circle
cx="200"
cy="200"
r="34"
fill="url(#pulseCenter)"
class="pulseCore"
/>
`;

return;
}

if(!state.beamDir) return;

const idx=DIRS.indexOf(state.beamDir);

const step=Math.PI*2/8;
const offset=-Math.PI/2-step/2;

const a0=offset+idx*step;
const a1=a0+step;

const rings=[
[48,92],
[92,138],
[138,184]
];

svg.innerHTML=`
<defs>
<filter id="glow">
<feGaussianBlur stdDeviation="5" result="b"/>
<feMerge>
<feMergeNode in="b"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>
`;

if(state.ring===null){

rings.forEach(r=>{
svg.innerHTML+=`
<path
d="${path(r[0],r[1],a0,a1)}"
fill="rgba(255,255,255,.14)"
stroke="rgba(255,220,170,.8)"
stroke-width="1.2"
filter="url(#glow)"
/>`;
});

return;
}

const r=rings[state.ring];

if(emotion){

const mid = (start + end)/2;
const rr = (r[0] + r[1]) / 2;

const cx = 200 + Math.cos(mid)*rr;
const cy = 200 + Math.sin(mid)*rr;

svg.innerHTML += `
<defs>
<radialGradient id="pulseOrb">
<stop offset="0%" stop-color="${emotion}" stop-opacity="1"/>
<stop offset="35%" stop-color="${emotion}" stop-opacity=".55"/>
<stop offset="100%" stop-color="${emotion}" stop-opacity="0"/>
</radialGradient>
</defs>

<circle
cx="${cx}"
cy="${cy}"
r="22"
fill="url(#pulseOrb)"
class="pulseCore"
/>
`;
}

svg.innerHTML+=`
<path
d="${path(r[0],r[1],a0,a1)}"
fill="rgba(255,255,255,.18)"
stroke="rgba(255,230,180,1)"
stroke-width="1.5"
filter="url(#glow)"
/>`;
}

/* ---------- FLOW ---------- */

function stepSouth(){

topPanel.innerHTML=`
${header()}
<div id="centerBox">
<div class="modeCard fade">
<div class="title">${t("turn")}</div>
<div class="subtle">${t("hint")}</div>
<button class="main" id="goBtn">${t("ready")}</button>
</div>
</div>
`;

bindLang();
document.getElementById("goBtn").onclick=stepTime;
}

function stepTime(){

topPanel.innerHTML=`
${header()}
<div id="centerBox">
<div class="modeCard fade">
<div class="title">${t("time")}</div>

<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px;">
${t("times").map((x,i)=>`
<button class="main timeBtn" data-v="${i}" style="height:46px;font-size:14px;">${x}</button>
`).join("")}
</div>

</div>
</div>
`;

bindLang();

document.querySelectorAll(".timeBtn").forEach(btn=>{
btn.onclick=()=>{
state.entry.time=btn.dataset.v;
stepHome();
};
});
}

function stepHome(){

const dirs=[
["nw","↖"],["n","↑"],["ne","↗"],
["w","←"],["c","Я"],["e","→"],
["sw","↙"],["s","↓"],["se","↘"]
];

topPanel.innerHTML=`
${header()}
<div id="centerBox">
<div class="modeCard fade">
<div class="title">${t("home")}</div>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;">
${dirs.map(d=>`
<button class="main dirBtn" data-v="${d[0]}" style="height:52px;font-size:20px;">${d[1]}</button>
`).join("")}
</div>

</div>
</div>
`;

bindLang();

document.querySelectorAll(".dirBtn").forEach(btn=>{
btn.onclick=()=>{

state.entry.home=btn.dataset.v;

if(btn.dataset.v==="c"){
state.entry.distance="0";
finishSave();
return;
}

state.beamDir=oppositeDir(btn.dataset.v);
state.ring=null;

drawCompass();
stepDistance();

};
});
}

function stepDistance(){

topPanel.innerHTML=`
${header()}
<div id="centerBox">
<div class="modeCard fade">
<div class="title">${t("dist")}</div>

<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px;">
${t("distances").map((x,i)=>`
<button class="main distBtn" data-v="${i}" style="height:48px;font-size:14px;">${x}</button>
`).join("")}
</div>

</div>
</div>
`;

bindLang();

document.querySelectorAll(".distBtn").forEach(btn=>{
btn.onclick=()=>{
state.entry.distance=btn.dataset.v;
state.ring=ringIndex(btn.dataset.v);
drawCompass();

setTimeout(finishSave,350);
};
});
}

function finishSave(){

let arr=[];
try{
arr=JSON.parse(localStorage.getItem("awarenessy_entries")||"[]");
}catch(e){}

arr.push(state.entry);

localStorage.setItem(
"awarenessy_entries",
JSON.stringify(arr)
);

topPanel.innerHTML=`
${header()}
<div id="centerBox">
<div class="modeCard fade">
<div class="title">${t("saved")}</div>
<button class="main" id="okBtn" style="margin-top:16px;">OK</button>
</div>
</div>
`;

bindLang();

document.getElementById("okBtn").onclick=renderIntro;
}

/* ---------- START ---------- */

renderIntro();

</script>
</body>
</html>
