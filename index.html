<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Awarenessy</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#top {
  border: none;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

#button {
  width: 100%;
  padding: 8px;

  background: #1a1a1a;   /* чуть светлее фона */
  color: #bbb;           /* светло-серый текст */

  border: 1px solid #333;
  border-radius: 6px;

  margin: 2px;
  font-size: 13px;

  transition: 0.2s;
}

#compass {
  width: 300px;
  height: 300px;
}

#compassContainer {
  position: relative;
  width: 300px;
  height: 300px;

  margin: 0 auto; /* центрирует */
}

#compassBg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#compass {
  position: absolute;
  width: 100%;
  height: 100%;
}

#compass svg path {
  transition: all 0.3s ease;
  opacity: 1;
}

@keyframes glowPulse {
  0% {
    filter:
      drop-shadow(0 0 4px currentColor)
      drop-shadow(0 0 10px currentColor)
      drop-shadow(0 0 20px currentColor);
  }
  50% {
    filter:
      drop-shadow(0 0 6px currentColor)
      drop-shadow(0 0 18px currentColor)
      drop-shadow(0 0 36px currentColor);
  }
  100% {
    filter:
      drop-shadow(0 0 4px currentColor)
      drop-shadow(0 0 10px currentColor)
      drop-shadow(0 0 20px currentColor);
  }
}

animation: glowPulse 2.5s ease-in-out infinite;

#modeButtons {
  position: fixed;
  bottom: 20px;
  width: 100%;

  display: none;
  flex-direction: row;   /* 👈 ВАЖНО */
  justify-content: center;
  gap: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  gap: 10px;
  margin-top: 20px;
}

.cell {
  width: 60px;
  height: 60px;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 6px;

  background: #1a1a1a !important;
  color: #bbb !important;

  border: 1px solid #333;
  border-radius: 6px;

  margin: 2px;
  font-size: 12px;

  transition: 0.2s;
}

button:active {
  background: #222 !important;
  color: #fff !important;
}

#bottom {
  height: 50%;
  display: none; /* СКРЫВАЕМ НА СТАРТЕ */
  justify-content: center;
  align-items: center;
  width: 100%;
}

.fade {
  opacity: 0;
  animation: fadeIn 0.8s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}

</style>
</head>

<body>

<div id="top"></div>

<div id="bottom">

  <div id="compassContainer">

    <!-- фон -->
    <img src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png" id="compassBg">

    <!-- SVG компаса -->
    <div id="compass"></div>

  </div>

</div>

<div id="modeButtons">
  <button onclick="enterMode()">ЯВЬ</button>
  <button onclick="enterMode()">СОН</button>
</div>

<script>

/* ---------- STATE ---------- */

let activeSegments = [];
let finalSegment = null;
let centerActive = false;
let coloredSegments = {};

/* ---------- START ---------- */

const scenarios = [
  "Я наблюдаю...",
  "ЭТО НЕ СОН?",
  "В каком настроении ты был 5 минут назад?",
  "В каком направлении твой Дом?",
  {
    type: "image",
    src: "https://i.postimg.cc/L56hkxFV/Archicompass-1.png"
  }
];

startScreen();

function startScreen() {

  const top = document.getElementById("top");

  document.body.style.background = "#050505";

  const scenarios = ["text1", "text2", "text3", "alert", "image"];

  const random = scenarios[Math.floor(Math.random() * scenarios.length)];

  if (random === "text1") {
    top.innerHTML = "Я наблюдаю...";
  } 
  else if (random === "text2") {
    top.innerHTML = "В каком настроении ты был 5 минут назад?";
  } 
  else if (random === "text3") {
    top.innerHTML = "В каком направлении твой Дом?";
  } 
  else if (random === "alert") {
    document.body.style.background = "#ff0000";
    top.innerHTML = `
      <div style="font-size:28px;font-weight:bold;">
        ЭТО НЕ СОН?
      </div>
    `;
  } 
  else if (random === "image") {
    top.innerHTML = `
      <img src="https://i.postimg.cc/zXp9BVGf/Hands-1.png"
      style="width:100%; transform: scale(1.2); opacity:0.95;">
    `;
  }

  showModeButtons();
}

/* ---------- MODE ---------- */

function enterMode() {

  document.body.style.background = "#050505";

  document.getElementById("compassContainer").style.display = "block";
  
  hideModeButtons();
  
  document.getElementById("bottom").style.display = "flex";

  drawCompass();

  document.getElementById("top").innerHTML = "";

  stepTurnSouth();
}

/* ---------- STEPS ---------- */

function stepTurnSouth() {

  const top = document.getElementById("top");

  top.innerHTML = `
    <div style="
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100%;
      gap:20px;
    ">

      <div style="
        font-size:20px;
        text-align:center;
        line-height:1.4;
        opacity:0;
        animation: fadeIn 1s forwards;
      ">
        Повернись к Югу<br>
        <span style="font-size:14px; opacity:0.7;">
          (там, где Солнце в полдень)
        </span>
      </div>

      <button onclick="stepTime()"
        style="
          width:140px;
          opacity:0;
          animation: fadeIn 1s forwards;
          animation-delay:0.6s;
        ">
        Готово
      </button>

    </div>
  `;
}

function stepTime() {

  const times = ["Рассвет","Утро","Полдень","Вечер","Закат","Ночь"];

  document.getElementById("top").innerHTML = `
    <div>Какое время суток?</div>

    <div style="
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:8px;
      margin-top:15px;
      width:100%;
      max-width:300px;
    ">
      ${times.map(t => `<button onclick="stepHome()">${t}</button>`).join("")}
    </div>
  `;
}

function stepHome() {
  document.getElementById("top").innerHTML = `
    <div>Где твой Дом?</div>
    <div class="grid">
      <div class="cell" onclick="selectDir('nw')">↖</div>
      <div class="cell" onclick="selectDir('n')">↑</div>
      <div class="cell" onclick="selectDir('ne')">↗</div>
      <div class="cell" onclick="selectDir('w')">←</div>
      <div class="cell" onclick="selectCenter()">Я</div>
      <div class="cell" onclick="selectDir('e')">→</div>
      <div class="cell" onclick="selectDir('sw')">↙</div>
      <div class="cell" onclick="selectDir('s')">↓</div>
      <div class="cell" onclick="selectDir('se')">↘</div>
    </div>
  `;
}

/* ---------- LOGIC ---------- */

const oppositeMap = {
  n:"s",
  ne:"sw",
  e:"w",
  se:"nw",
  s:"n",
  sw:"ne",
  w:"e",
  nw:"se"
};

let selectedDirection = null; // что выбрал пользователь (Дом)
let lastDirection = null;     // запоминаем для режима "Я"

// --- выбор направления ДОМА ---
function selectDir(dir) {

  centerActive = false;

  selectedDirection = dir;   // сохраняем выбор
  lastDirection = dir;

  // показываем где ДОМ (без инверсии)
  activeSegments = [
    `0_${dir}`,
    `1_${dir}`,
    `2_${dir}`
  ];

  finalSegment = null;

  drawCompass();
  stepDistance();
}

// --- выбор центра (Я) ---
function selectCenter() {

  centerActive = true;

  // показываем где Дом (мягко)
  if (lastDirection) {
    activeSegments = [
      `0_${lastDirection}`,
      `1_${lastDirection}`,
      `2_${lastDirection}`
    ];
  }

  finalSegment = null;

  drawCompass();
  stepEmotion();
}

/* ---------- DISTANCE ---------- */

function stepDistance() {
  document.getElementById("top").innerHTML = `
    <div>Как далеко?</div>
    <button onclick="setDistance(1)">Близко</button>
    <button onclick="setDistance(2)">Средне</button>
    <button onclick="setDistance(3)">Далеко</button>
  `;
}

function setDistance(d) {

  if (!selectedDirection) return;

  centerActive = false;

  // 🔥 ИНВЕРСИЯ ТОЛЬКО ЗДЕСЬ
  const inverted = oppositeMap[selectedDirection];

  finalSegment = `${d-1}_${inverted}`;

  drawCompass();
  stepEmotion();
}

/* ---------- EMOTION ---------- */

function stepEmotion() {

  document.getElementById("top").innerHTML = `
    <div>Состояние:</div>

    <div style="
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-top:15px;
      width:100%;
      max-width:300px;
    ">

      <button onclick="selectEmotion('#FFD700')">Радость, позитивная деятельность</button>
      <button onclick="selectEmotion('#FFFFFF')">Осознанное творчество</button>
      <button onclick="selectEmotion('#3F51B5')">Вдохновение, спокойствие, творчество</button>

      <button onclick="selectEmotion('#26C6DA')">Фантазёрство, пассивность</button>
      <button onclick="selectEmotion('#808080')">Нейтральное, пассивное вовлечение</button>
      <button onclick="selectEmotion('#4CAF50')">Тоска, испуг, зависимость</button>

      <button onclick="selectEmotion('#F44336')">Гнев, агрессия, превосходство</button>
      <button onclick="selectEmotion('#FF9800')">Самоуверенность, соревновательность</button>
      <button onclick="selectEmotion('#000000')">Хаос, ужас, отсутствие контроля</button>

    </div>
  `;
}

function selectEmotion(color) {

  if (centerActive) {
    coloredSegments["center"] = color;
  } else {
    coloredSegments[finalSegment] = color;
  }

  drawCompass();
  showModeButtons();
}

/* ---------- COMPASS ---------- */

const centerX = 150;
const centerY = 150;

const rings = [
  {inner:30, outer:60},
  {inner:60, outer:95},
  {inner:95, outer:130}
];

const directions = ["s","sw","w","nw","n","ne","e","se"];

function polar(cx, cy, r, angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function segmentPath(innerR, outerR, a0, a1) {

  const p1 = polar(centerX, centerY, outerR, a0);
  const p2 = polar(centerX, centerY, outerR, a1);
  const p3 = polar(centerX, centerY, innerR, a1);
  const p4 = polar(centerX, centerY, innerR, a0);

  return `
    M ${p1.x} ${p1.y}
    A ${outerR} ${outerR} 0 0 1 ${p2.x} ${p2.y}
    L ${p3.x} ${p3.y}
    A ${innerR} ${innerR} 0 0 0 ${p4.x} ${p4.y}
    Z
  `;
}

function drawCompass() {

  let svg = `<svg viewBox="0 0 300 300">`;

  svg += `<defs>

    <!-- свечение сегментов -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- мощный центр -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

  </defs>`;

  const step = (Math.PI*2)/8;
  const offset = -step/2;

  rings.forEach((ring, rIndex) => {

    directions.forEach((dir, dIndex) => {

      let a0 = -Math.PI/2 + offset + dIndex*step;
      let a1 = a0 + step;

      const id = `${rIndex}_${dir}`;

      let fill = "transparent";
      let glow = false;

      let strokeColor = "rgba(255,255,255,0.15)";
      let strokeWidth = 1;

      // 🔥 ПОКАЗЫВАЕМ ДОМ (до выбора дистанции)
      if (activeSegments.includes(id) && !finalSegment) {

        fill = "#888";

        svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
          fill="url(#glowGradient)"
          opacity="0.25"
        />`;
      }

      // мягкое сияние дома (когда нет эмоции)

      if (finalSegment === id) {
        strokeColor = "white";
        strokeWidth = 3;
      }

      if (coloredSegments[id]) {
        fill = coloredSegments[id];
        glow = false;
      }

      svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
        fill="${fill}"
        stroke="${strokeColor}"
        stroke-width="${strokeWidth}"
      />`;

      if (glow) {
        svg += `<path d="${segmentPath(ring.inner, ring.outer, a0, a1)}"
          fill="url(#glowGradient)" />`;
      }

    });

  });

  // ---------- CENTER ----------

  let centerRadius = 32;

  // лёгкая "линза" всегда (очень слабая)
  svg += `<circle cx="150" cy="150" r="${centerRadius}" fill="rgba(255,255,255,0.03)" />`;

  // если выбран центр (без эмоции)
  if (centerActive && !coloredSegments["center"]) {
    svg += `<circle cx="150" cy="150" r="${centerRadius}" fill="rgba(255,255,255,0.08)" />`;
  }

  // если есть эмоция
  if (coloredSegments["center"]) {

  let color = coloredSegments["center"];

    svg += `<circle cx="150" cy="150" r="${centerRadius}" fill="${color}" opacity="0.95" />`;

    svg += `<circle cx="150" cy="150" r="${centerRadius}" fill="url(#centerGlow)" style="mix-blend-mode: screen;" />`;
  }

  // закрываем SVG
  svg += `</svg>`;

  // вставляем в DOM
  document.getElementById("compass").innerHTML = svg;
}

/* ---------- UI ---------- */

function hideModeButtons() {
  document.getElementById("modeButtons").style.display = "none";
}

function showModeButtons() {
  document.getElementById("modeButtons").style.display = "flex";
}

</script>

</body>
</html>
