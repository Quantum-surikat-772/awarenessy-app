<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#top{
flex:1;
display:flex;
}

#bottom{
padding:10px;
}

.btn{
flex:1;
height:50px;
border-radius:12px;
border:1px solid #333;
background:#111;
font-size:14px;
font-weight:700;
}

.wake{
color:#c9a86a; /* золото */
}

.dream{
color:#69b7ff; /* голубой */
}

#header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
border-bottom:1px solid #222;
}

#brand{
color:#c9a86a;
font-weight:700;
font-size:16px;
}

#langs button{
background:none;
border:none;
color:#aaa;
font-size:13px;
margin-left:6px;
}

#langs button.active{
color:#fff;
}

</style>
</head>

<body>

<div id="app">
<div id="header"></div>

<div id="top">TOP OK</div>
<div id="bottom">BOTTOM OK</div>

<script>

window.onload = function(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

header.innerHTML = `
<div id="brand">ОСоЗНАЙКА!</div>

<div id="langs">
<button>RU</button>
<button>EN</button>
<button>ES</button>
</div>
`;

// центр
topBox.innerHTML = `
<div style="
width:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
text-align:center;
">
Я наблюдаю...
</div>
`;

// кнопки
bottomBox.innerHTML = `
<div style="
display:flex;
gap:10px;
">
<button class="btn wake">ЯВЬ</button>
<button class="btn dream">СОН</button>
</div>
`;

};

</script>

</body>
</html>
