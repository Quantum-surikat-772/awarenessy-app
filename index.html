<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy 3.2 CANON</title>

<style>
:root{
--bg:#050505;
--panel:#101010;
--line:#252525;
--text:#f5f5f5;
--muted:#8c8c8c;
--gold:#c9a96b;
--red:#d90000;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
margin:0;padding:0;width:100%;height:100%;
background:var(--bg);color:var(--text);
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}
body{display:flex;justify-content:center;}

#app{
width:100%;
max-width:520px;
height:100vh;
position:relative;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at 20% 15%, rgba(255,255,255,.03), transparent 20%),
radial-gradient(circle at 80% 65%, rgba(255,255,255,.02), transparent 25%),
var(--bg);
}

#topPanel{
height:50vh;
padding:10px 16px 8px;
display:flex;
flex-direction:column;
}

#bottomDock{
height:50vh;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:0;
}

#header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:6px;
}

#headerLeft{
display:flex;
flex-direction:column;
align-items:flex-start;
}

#brand{
font-size:16px;
font-weight:700;
color:var(--gold);
letter-spacing:.8px;
}

#subBrand{
font-size:11px;
color:var(--muted);
margin-top:2px;
}

#langBar{display:flex;gap:6px;}

.mini{
width:38px;height:34px;
border:none;
border-radius:10px;
background:#171717;
color:#ddd;
border:1px solid var(--line);
font-size:12px;
}

#centerBox{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.modeCard{
width:100%;
padding:16px;
border-radius:18px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.05);
}

.title{
font-size:24px;
font-weight:700;
text-align:center;
line-height:1.25;
}

.subtle{
font-size:13px;
color:#cfcfcf;
text-align:center;
margin-top:10px;
}

.row{display:flex;gap:10px;}

button.main{
height:50px;
width:100%;
border:none;
border-radius:14px;
background:linear-gradient(180deg,#181818,#111);
color:#fff;
font-size:15px;
font-weight:700;
border:1px solid var(--line);
}

.grid2{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:14px;
}

.grid3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:14px;
}

.smallBtn{height:46px;font-size:14px;}
.dirBtn{height:52px;font-size:20px;}

#compassArea{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

#compassWrap{
position:relative;
width:min(92vw,410px);
height:min(92vw,410px);
}

#compassImg,
#compassSvg{
position:absolute;
inset:0;
width:100%;
height:100%;
}

#foot{
padding:8px 0 10px;
font-size:11px;
color:#666;
text-align:center;
}

.pulseCore{
animation:pulse 3s ease-in-out infinite;
transform-origin:center;
}
@keyframes pulse{
0%{opacity:.45;transform:scale(.86);}
50%{opacity:1;transform:scale(1.18);}
100%{opacity:.45;transform:scale(.86);}
}
.fade{animation:fade .45s ease;}
@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:none;}
}
</style>
</head>
<body>

<div id="app">
<div id="topPanel"></div>
<div id="bottomDock"></div>
</div>

<script>
const state={
lang:localStorage.getItem("awarenessy_lang")||"ru",
mode:null,
beamDir:null,
ring:null,
time:null,
emotion:null,
entry:{}
};

const app=document.getElementById("app");
const topPanel=document.getElementById("topPanel");
const bottomDock=document.getElementById("bottomDock");

const TXT={
ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения осознанности",
wake:"ЯВЬ",
dream:"СОН",
ready:"Готово",
turn:"Повернись к Югу",
hint:"(там где солнце в полдень)",
time:"Какое время суток?",
home:"В каком направлении от тебя твой Дом?",
dist:"Как далеко?",
emo:"Какое твоё состояние?",
saved:"Запись сохранена",
times:["Рассвет","Утро","День","Вечер","Закат","Ночь"],
distances:["Дом","Близко","Средне","Далеко"],
intro:["Я наблюдаю...","Что ты делал 5 минут назад?","В каком направлении твой Дом?"],
alert:"ЭТО НЕ СОН?"
}
};

function t(k){return TXT[state.lang][k];}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

function header(){
return `
<div id="header">
<div id="headerLeft">
<div id="brand">${t("brand")}</div>
<div id="subBrand">${t("sub")}</div>
</div>
<div id="langBar">
<button class="mini lang" data-l="ru">RU</button>
<button class="mini lang" data-l="en">EN</button>
<button class="mini lang" data-l="es">ES</button>
</div>
</div>`;
}

function bindLang(){
document.querySelectorAll(".lang").forEach(b=>{
b.onclick=()=>{
state.lang=b.dataset.l;
localStorage.setItem("awarenessy_lang",state.lang);
renderIntro();
};
});
}

/* INTRO */

function renderIntro(){
state.beamDir=null;state.ring=null;state.time=null;state.emotion=null;

let v=rnd(["text","image","video","alert"]);
let center="";

app.style.background=`radial-gradient(circle at 20% 15%, rgba(255,255,255,.03), transparent 20%),radial-gradient(circle at 80% 65%, rgba(255,255,255,.02), transparent 25%),var(--bg)`;

if(v==="text") center=`<div class="title fade">${rnd(t("intro"))}</div>`;
if(v==="image") center=`<img src="https://i.postimg.cc/zXp9BVGf/Hands-1.png" style="max-width:360px;width:100%;border-radius:18px;">`;
if(v==="video") center=`<video autoplay muted loop playsinline style="max-width:360px;width:100%;border-radius:18px;"><source src="https://i.imgur.com/ocTkSQj.mp4"></video>`;
if(v==="alert"){
app.style.background="var(--red)";
center=`<div class="title fade">${t("alert")}</div>`;
}

topPanel.innerHTML=`${header()}<div id="centerBox">${center}</div>`;
bottomDock.innerHTML=`
<div style="padding:12px 16px 0;">
<div class="row">
<button class="main" id="wakeBtn">${t("wake")}</button>
<button class="main" id="dreamBtn">${t("dream")}</button>
</div>
</div>
<div id="foot">Awarenessy 3.2 CANON</div>
`;

bindLang();
document.getElementById("wakeBtn").onclick=()=>enterMode("wake");
document.getElementById("dreamBtn").onclick=()=>enterMode("dream");
}

function enterMode(mode){
state.mode=mode;
state.entry={mode:mode,created:new Date().toISOString()};
showCompass();
stepSouth();
}

/* COMPASS */

function showCompass(){
bottomDock.innerHTML=`
<div id="compassArea">
<div id="compassWrap">
<img id="compassImg" src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png">
<svg id="compassSvg" viewBox="0 0 400 400"></svg>
</div>
</div>
<div id="foot">Awarenessy 3.2 CANON</div>`;
drawCompass();
}

const DIRS=["s","sw","w","nw","n","ne","e","se"];

function oppositeDir(d){
const i=DIRS.indexOf(d);
return DIRS[(i+4)%8];
}

function polar(cx,cy,r,a){
return {x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};
}

function sector(innerR,outerR,a0,a1){
let p1=polar(200,200,outerR,a0);
let p2=polar(200,200,outerR,a1);
let p3=polar(200,200,innerR,a1);
let p4=polar(200,200,innerR,a0);
return `M ${p1.x} ${p1.y}
A ${outerR} ${outerR} 0 0 1 ${p2.x} ${p2.y}
L ${p3.x} ${p3.y}
A ${innerR} ${innerR} 0 0 0 ${p4.x} ${p4.y} Z`;
}

function drawCompass(){
const svg=document.getElementById("compassSvg");
if(!svg) return;
svg.innerHTML="";

svg.innerHTML+=`
<defs>
<filter id="blur"><feGaussianBlur stdDeviation="4"/></filter>
</defs>`;

drawSolar(svg);

if(!state.beamDir) return;

const step=Math.PI*2/8;
const idx=DIRS.indexOf(state.beamDir);
const a0=-Math.PI/2 + idx*step - step/2;
const a1=a0+step;

const rings=[[48,92],[92,138],[138,184]];

if(state.ring===null){
rings.forEach(r=>{
svg.innerHTML+=`<path d="${sector(r[0],r[1],a0,a1)}"
fill="rgba(255,220,150,.0)"
stroke="rgba(255,240,180,.95)"
stroke-width="8"
filter="url(#blur)"/>`;
});
return;
}

const r=rings[state.ring];

svg.innerHTML+=`<path d="${sector(r[0],r[1],a0,a1)}"
fill="none"
stroke="rgba(255,240,180,1)"
stroke-width="10"
filter="url(#blur)"/>`;

if(state.emotion){
let mid=(a0+a1)/2;
let rr=(r[0]+r[1])/2;
let c=polar(200,200,rr,mid);

svg.innerHTML+=`
<circle cx="${c.x}" cy="${c.y}" r="18" fill="${state.emotion}" class="pulseCore"/>`;
}
}

function drawSolar(svg){
if(state.time===null) return;

const map=[
{main:"e",adj:["se","ne"],col:"#ff2da8"},
{main:"se",adj:["s","e"],col:"#54c8ff"},
{main:"s",adj:["se","sw"],col:"#ffd76a"},
{main:"sw",adj:["s","w"],col:"#54c8ff"},
{main:"w",adj:["sw","nw"],col:"#ff2da8"},
{main:"n",adj:["nw","ne"],col:"#2f62ff"}
];

const cfg=map[state.time];
const thin=[186,194];

paint(cfg.main,cfg.col,1);
cfg.adj.forEach(d=>paint(d,cfg.col,.35));

function paint(dir,col,op){
const step=Math.PI*2/8;
const idx=DIRS.indexOf(dir);
const a0=-Math.PI/2 + idx*step - step/2;
const a1=a0+step;
svg.innerHTML+=`<path d="${sector(thin[0],thin[1],a0,a1)}"
fill="${col}" opacity="${op}"/>`;
}
}

/* FLOW */

function stepSouth(){
topPanel.innerHTML=`${header()}
<div id="centerBox"><div class="modeCard fade">
<div class="title">${t("turn")}</div>
<div class="subtle">${t("hint")}</div>
<button class="main" id="goBtn" style="margin-top:14px;">${t("ready")}</button>
</div></div>`;
bindLang();
goBtn.onclick=stepTime;
}

function stepTime(){
topPanel.innerHTML=`${header()}
<div id="centerBox"><div class="modeCard fade">
<div class="title">${t("time")}</div>
<div class="grid2">
${t("times").map((x,i)=>`<button class="main smallBtn timeBtn" data-v="${i}">${x}</button>`).join("")}
</div></div></div>`;
bindLang();
document.querySelectorAll(".timeBtn").forEach(b=>{
b.onclick=()=>{
state.time=+b.dataset.v;
drawCompass();
stepHome();
};
});
}

function stepHome(){
const dirs=[
["nw","↖"],["n","↑"],["ne","↗"],
["w","←"],["c","Я"],["e","→"],
["sw","↙"],["s","↓"],["se","↘"]
];

topPanel.innerHTML=`${header()}
<div id="centerBox"><div class="modeCard fade">
<div class="title">${t("home")}</div>
<div class="grid3">
${dirs.map(d=>`<button class="main dirBtn homeBtn" data-v="${d[0]}">${d[1]}</button>`).join("")}
</div></div></div>`;
bindLang();

document.querySelectorAll(".homeBtn").forEach(b=>{
b.onclick=()=>{
if(b.dataset.v==="c"){
state.ring=0;
state.emotion=null;
stepEmotion();
return;
}
state.beamDir=oppositeDir(b.dataset.v);
state.ring=null;
drawCompass();
state.entry.home=b.dataset.v;
stepDistance();
};
});
}

function stepDistance(){
topPanel.innerHTML=`${header()}
<div id="centerBox"><div class="modeCard fade">
<div class="title">${t("dist")}</div>
<div class="grid2">
${t("distances").map((x,i)=>`<button class="main smallBtn distBtn" data-v="${i}">${x}</button>`).join("")}
</div></div></div>`;
bindLang();

document.querySelectorAll(".distBtn").forEach(b=>{
b.onclick=()=>{
state.ring=+b.dataset.v;
drawCompass();
stepEmotion();
};
});
}

function stepEmotion(){

const emos=[
["#FFD700","Радость"],
["#FFFFFF","Творчество"],
["#3F51B5","Вдохновение"],
["#26C6DA","Мечтательность"],
["#808080","Нейтрально"],
["#4CAF50","Тоска"],
["#F44336","Гнев"],
["#FF9800","Самоуверенность"],
["#000000","Хаос"]
];

topPanel.innerHTML=`${header()}
<div id="centerBox"><div class="modeCard fade">
<div class="title">${t("emo")}</div>
<div class="grid2">
${emos.map(e=>`
<button class="main smallBtn emoBtn" data-c="${e[0]}" style="font-size:13px;">${e[1]}</button>`).join("")}
</div></div></div>`;
bindLang();

document.querySelectorAll(".emoBtn").forEach(b=>{
b.onclick=()=>{
state.emotion=b.dataset.c;
drawCompass();
setTimeout(finishSave,500);
};
});
}

function finishSave(){
topPanel.innerHTML=`${header()}
<div id="centerBox"><div class="modeCard fade">
<div class="title">${t("saved")}</div>
<button class="main" id="okBtn" style="margin-top:14px;">OK</button>
</div></div>`;
bindLang();
okBtn.onclick=renderIntro;
}

renderIntro();
</script>
</body>
</html>
