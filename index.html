<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Awarenessy Mini App</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <h1>Awarenessy! Mini App</h1>
  <button id="checkUser">Проверить / Создать пользователя</button>
  <div id="status"></div>

  <script>
    document.addEventListener("DOMContentLoaded", async function () {

      const statusDiv = document.getElementById("status");
      const button = document.getElementById("checkUser");

      // ====== ВСТАВЬ СВОИ ДАННЫЕ ======
      const SUPABASE_URL = "https://najicjitgyvtdrjaowig.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_mqjiX2afN7dtivBeOcerWQ_iP2wm1uR";
      // =================================

      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Telegram WebApp
      const tg = window.Telegram.WebApp;
      tg.expand();

      console.log("Telegram object:", tg);
      console.log("initDataUnsafe:", tg.initDataUnsafe);

      if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
        statusDiv.textContent = "Ошибка: Telegram user не получен";
        return;
      }

      const telegramId = tg.initDataUnsafe.user.id;
      console.log("Telegram ID:", telegramId);

      button.addEventListener("click", async () => {

        statusDiv.textContent = "Проверка пользователя...";

        try {
          // Проверяем существует ли пользователь
          const { data, error } = await supabaseClient
            .from("users")
            .select("*")
            .eq("telegram_id", telegramId);

          if (error) {
            console.error("Ошибка при проверке:", error);
            statusDiv.textContent = "Ошибка проверки пользователя";
            return;
          }

          if (data.length > 0) {
            statusDiv.textContent = "Пользователь уже существует ✅";
            console.log("User found:", data);
          } else {

            // Создаём пользователя
            const { data: newUser, error: insertError } = await supabaseClient
              .from("users")
              .insert([{ telegram_id: telegramId }])
              .select();

            if (insertError) {
              console.error("Ошибка создания:", insertError);
              statusDiv.textContent = "Ошибка создания пользователя ❌";
            } else {
              statusDiv.textContent = "Новый пользователь создан 🎉";
              console.log("User created:", newUser);
            }
          }

        } catch (err) {
          console.error("Общая ошибка:", err);
          statusDiv.textContent = "Критическая ошибка";
        }

      });

    });
  </script>

</body>
</html>

</html>
