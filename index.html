<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy V5.1</title>

<style>
:root{
--bg:#050505;
--gold:#c9a86a;
--line:#242424;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
margin:0;
height:100%;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}

#app{
max-width:520px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
background:#050505;
}

#top,#bottom{height:50%;padding:10px;}
#bottom{
position:relative;
display:flex;
justify-content:flex-end;
}

#top{
display:flex;
flex-direction:column;
}

#header{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

#brand{color:var(--gold);font-weight:700;cursor:pointer;}

#langs button{
background:none;
border:none;
color:#aaa;
font-size:13px;
margin-left:6px;
}

#langs button.active{
color:#fff;
}

#content{
flex:1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
overflow:hidden;
}

.main{
width:100%;
height:44px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:#fff;
margin-top:6px;
}

.row{
position:absolute;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:8px;
}

#modal{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999;
overflow:hidden;
}

#emissary{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%) scale(1);
width:90%;
opacity:0;
}

#msg{
position:absolute;
top:14%;
left:50%;
transform:translateX(-50%);
width:82%;
max-width:360px;
text-align:left;
line-height:1.5;
opacity:0;
}

</style>
</head>

<body>

<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<div id="modal">
<img id="emissary" src="https://i.postimg.cc/V6gqpw1V/Emissary.png">

<div id="msg"></div>

<button id="settingsBtn"
class="main"
onclick="openSettings()"
style="
position:absolute;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:90%;
opacity:0;
">
</button>

<button id="backBtn"
onclick="closeModal()"
class="main"
style="
position:absolute;
bottom:16px;
left:50%;
transform:translateX(-50%);
width:90%;
opacity:0;
">
</button>

</div>

<script>

const HAND_IMG="https://i.postimg.cc/zXp9BVGf/Hands-1.png";
const HAND_VIDEO="https://i.imgur.com/ocTkSQj.mp4";

const state={lang:"ru"};

const TXT={
ru:{
brand:"ОСоЗНАЙКА!",
wake:"ЯВЬ",dream:"СОН",
special:"ЭТО НЕ СОН?",
back:"Вернуться",
settings:"Настройка",
intro:[
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя настроение?"
],
emissary:`ЗДРАВСТВУЙ

Я — Эмиссар Сновидений

На русском языке меня зовут ОСоЗНАЙКА!

ОС — Осознанное Сновидение + Знание

Я твой Друг и Попутчик на Пути Осознания

Я смотрю из глубины твоего Внимания

Напоминаю об осознанности

Настрой частоту напоминаний,
и я буду с тобой

И я отвечу на вопросы
в этом Приложении

Мы встретимся.`
},

en:{
brand:"AWARENESSY!",
wake:"WAKE",dream:"DREAM",
special:"IS THIS A DREAM?",
back:"Back",
settings:"Settings",
intro:[
"What were you doing 5 minutes ago?",
"I observe...",
"Where is your Home?",
"Look at your hands",
"How do you feel?"
],
emissary:`HELLO

I am the Dream Emissary.

I am your Companion.

I watch from your attention.

I remind you of awareness.

Set the frequency — I’ll be there.

We will meet.`
},

es:{
brand:"¡CONCIENCITO!",
wake:"VIGILIA",dream:"SUEÑO",
special:"¿ESTO ES UN SUEÑO?",
back:"Volver",
settings:"Ajustes",
intro:[
"¿Qué hacías hace 5 minutos?",
"Observo...",
"¿Dónde está tu hogar?",
"Mira tus manos",
"¿Cómo te sientes?"
],
emissary:`HOLA

Soy el Emisario de los Sueños.

Soy tu Compañero.

Observo desde tu atención.

Te recuerdo la consciencia.

Ajusta la frecuencia — estaré contigo.

Nos veremos.`
}
};

function t(k){return TXT[state.lang][k];}

function intro(){

const top = document.getElementById("top");
const bottom = document.getElementById("bottom");

const r = Math.random();

let html = "";

let contentStyle = "";
let html = "";

if(r < 0.2){

// 🔴 КРАСНЫЙ ЭКРАН (правильный способ)
contentStyle = `
background:#c00000;
display:flex;
align-items:center;
justify-content:center;
`;

html = `
<div style="
font-size:28px;
font-weight:800;
color:#fff;
text-align:center;
">
${t("special")}
</div>
`;

}
else if(r < 0.5){

// 🖐 PNG (увеличен и центр)
html = `
<img src="${HAND_IMG}"
style="
width:110%;
max-width:420px;
object-fit:contain;
">
`;

}
else if(r < 0.75){

// 🎥 VIDEO (поднят и увеличен)
html = `
<video autoplay muted loop playsinline
style="
width:105%;
max-width:420px;
object-fit:contain;
transform:translateY(-6%);
">
<source src="${HAND_VIDEO}" type="video/mp4">
</video>
`;

}
else{

// 🧠 ТЕКСТ (центр)
html = `
<div style="
font-size:22px;
font-weight:600;
text-align:center;
">
${rand(t("introTexts"))}
</div>
`;

}

// 🔝 ВЕРХ
top.innerHTML = `
<div id="header">

<div id="brand" onclick="openModal()" style="color:#c9a86a;font-weight:700;">
${t("brand")}
</div>

<div id="langs">
<button onclick="setLang('ru')">RU</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>

</div>

<div id="content" style="${contentStyle}">${html}</div>
`;

// 🔻 НИЗ
bottom.innerHTML = `
<div class="row">
<button class="main">${t("wake")}</button>
<button class="main">${t("dream")}</button>
</div>
`;

}

function setLang(l){
state.lang = l;
intro();
}

function openModal(){
const modal=document.getElementById("modal");
const emissary=document.getElementById("emissary");
const backBtn=document.getElementById("backBtn");
const settingsBtn=document.getElementById("settingsBtn");

modal.style.display="block";

const img=emissary;
const msg=document.getElementById("msg");

msg.innerHTML="";
msg.style.opacity=1;

backBtn.innerText=t("back");
settingsBtn.innerText=t("settings");

img.style.opacity=0;
img.style.transform="translateX(-50%) scale(1)";
img.style.transition="none";

setTimeout(()=>{
img.style.transition="6s linear";
img.style.opacity=.65;
img.style.transform="translateX(-30%) scale(2)";
},50);

setTimeout(()=>{
img.style.opacity=0;
showTextWave(t("emissary"));

setTimeout(()=>{
backBtn.style.opacity=1;
settingsBtn.style.opacity=1;
},1200);

},6000);
}

function showTextWave(text){
const msg=document.getElementById("msg");
msg.innerHTML="";
const lines=text.split("\n");

lines.forEach((l,i)=>{
const d=document.createElement("div");
d.innerText=l;
d.style.opacity=0;
d.style.transition=".5s";
msg.appendChild(d);

setTimeout(()=>d.style.opacity=1,i*120);
});
}

function closeModal(){
modal.style.display="none";
}

window.onload = intro;

</script>
</body>
</html>
