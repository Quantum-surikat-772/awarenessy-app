<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy V5.0</title>

<style>
:root{
--bg:#050505;
--gold:#c9a86a;
--blue:#69b7ff;
--line:#242424;
--text:#f5f5f5;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
justify-content:center;
}

#app{
width:100%;
max-width:520px;
height:100vh;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at 18% 18%,rgba(255,255,255,.03),transparent 20%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,.02),transparent 24%),
#050505;
}

#top,#bottom{
height:50%;
padding:10px;
}

#top{
display:flex;
flex-direction:column;
}

#bottom{
display:flex;
flex-direction:column;
justify-content:flex-end;
}

#header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:8px;
}

#brand{
font-size:16px;
font-weight:700;
cursor:pointer;
}

#sub{
font-size:11px;
color:#777;
margin-top:2px;
}

#langs{
display:flex;
gap:8px;
}

.mini{
width:50px;
height:42px;
border:none;
border-radius:14px;
background:#151515;
border:1px solid #242424;
color:#ddd;
}

.active{
border-color:#c9a86a;
color:#fff;
}

#content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
width:100%;
padding:18px;
border-radius:22px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.05);
}

.title{
font-size:22px;
font-weight:700;
text-align:center;
line-height:1.2;
}

.small{
font-size:13px;
color:#aaa;
text-align:center;
margin-top:8px;
}

.row{
display:flex;
gap:10px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:12px;
}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-top:12px;
}

.column{
display:grid;
grid-template-columns:1fr;
gap:6px;
margin-top:12px;
}

.main{
width:100%;
height:46px;
border:none;
border-radius:14px;
background:linear-gradient(180deg,#1b1b1b,#101010);
border:1px solid #262626;
color:#fff;
font-size:14px;
font-weight:700;
}

.slim{
height:36px;
font-size:12px;
}

input.main{
font-weight:400;
text-align:center;
}

#compassWrap{
position:relative;
width:min(92vw,410px);
height:min(92vw,410px);
margin:0 auto;
}

#compassImg,#fx{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
}

#foot{
font-size:11px;
color:#666;
text-align:center;
margin-top:6px;
}

#modal{
position:fixed;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
z-index:99;
overflow:hidden;
}

#aura{
position:absolute;
inset:-20%;
background:
radial-gradient(circle at 30% 40%,rgba(140,0,255,.08),transparent 35%),
radial-gradient(circle at 70% 60%,rgba(0,160,255,.07),transparent 35%);
animation:drift 8s linear infinite alternate;
}

@keyframes drift{
from{transform:translate(-2%,-2%) scale(1);}
to{transform:translate(2%,2%) scale(1.06);}
}

#modalInner{
position:relative;
z-index:2;
width:90%;
max-width:420px;
text-align:center;
}

#emissary{
width:220px;
max-width:70%;
opacity:0;
transition:2s;
}

#msg{
margin-top:18px;
line-height:1.6;
font-size:15px;
opacity:0;
transition:1.5s;
white-space:pre-line;
}

.fadeIn{
opacity:1 !important;
}

</style>
</head>
<body>

<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<div id="modal">
<div id="aura"></div>
<div id="modalInner">
<img id="emissary" src="https://i.postimg.cc/V6gqpw1V/Emissary.png">
<div id="msg"></div>
<button class="main" style="margin-top:18px" onclick="closeModal()">Вернуться</button>
</div>
</div>

<script>

const topBox=document.getElementById("top");
const bottomBox=document.getElementById("bottom");

const state={lang:"ru"};

const HAND_IMG="https://i.postimg.cc/zXp9BVGf/Hands-1.png";
const HAND_VIDEO="https://i.imgur.com/ocTkSQj.mp4";

const TXT={

ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения осознанности",
wake:"ЯВЬ",
dream:"СОН",
special:"ЭТО НЕ СОН?",
back:"Вернуться",

intro:[
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя сейчас настроение?"
],

emissary:`ЗДРАВСТВУЙ

Я — Эмиссар Сновидений.

На русском языке меня зовут ОСоЗНАЙКА!

ОС — Осознанное Сновидение + Знание.

Я твой Друг и Попутчик на Пути Осознания.

Я смотрю из глубины твоего Внимания.

Напоминаю об осознанности.

Настрой частоту напоминаний —
и я буду с тобой.

И я отвечу на вопросы в этом Приложении.

Мы встретимся.`
},

en:{
brand:"AWARENESSY!",
sub:"Awareness trainer",
wake:"WAKE",
dream:"DREAM",
special:"IS THIS A DREAM?",
back:"Back",

intro:[
"What were you doing 5 minutes ago?",
"I observe...",
"Where is your Home?",
"Look at your hands",
"How do you feel right now?"
],

emissary:`HELLO

I am the Dream Emissary.

My name is AWARENESSY!

I am your Friend and Companion
on the Path of Awareness.

I watch from the depths
of your Attention.

I remind you of awareness.

Set the frequency of reminders,
and I will be with you.

And I will answer your questions
in this Application.

We will meet.`
},

es:{
brand:"¡CONCIENCITO!",
sub:"Entrenador de consciencia",
wake:"VIGILIA",
dream:"SUEÑO",
special:"¿ESTO ES UN SUEÑO?",
back:"Volver",

intro:[
"¿Qué hacías hace 5 minutos?",
"Observo...",
"¿Dónde está tu hogar?",
"Mira tus manos",
"¿Cómo te sientes ahora?"
],

emissary:`HOLA

Soy el Emisario de los Sueños.

Mi nombre es ¡CONCIENCITO!

Soy tu Amigo y Compañero
en el camino de la Consciencia.

Observo desde lo más profundo
de tu atención.

Te recordaré la consciencia.

Establece la frecuencia
de mis recordatorios
y estaré contigo.

Y responderé las preguntas
de esta aplicación.

Nos veremos.`
}

};

function t(k){return TXT[state.lang][k];}

function rand(a){return a[Math.floor(Math.random()*a.length)];}

function header(){
return `
<div id="header">
<div>
<div id="brand" onclick="openModal()" style="color:#c9a86a">${t("brand")}</div>
<div id="sub">${t("sub")}</div>
</div>

<div id="langs">
<button class="mini" onclick="setLang('ru')">RU</button>
<button class="mini" onclick="setLang('en')">EN</button>
<button class="mini" onclick="setLang('es')">ES</button>
</div>
</div>`;
}

function setLang(v){
state.lang=v;
intro();
}

function intro(){

const r=Math.random();

let content="";

if(r<0.2){

// КРАСНЫЙ ФОН, НО НЕ УБИВАЕТ UI
content=`
<div style="
position:absolute;
inset:0;
background:#c00000;
z-index:-1;"></div>

<div class="title" style="font-size:30px;font-weight:800;">
${t("special")}
</div>`;

}
else if(r<0.5){
content=`<img src="${HAND_IMG}" style="width:85%;">`;
}
else if(r<0.75){
content=`
<video autoplay muted loop playsinline
style="width:85%;border-radius:20px;">
<source src="${HAND_VIDEO}" type="video/mp4">
</video>`;
}
else{
content=`<div class="title">${rand(t("intro"))}</div>`;
}

topBox.innerHTML=`
${header()}
<div id="content" style="position:relative">${content}</div>`;

bottomBox.innerHTML=`
<div class="row">
<button class="main">${t("wake")}</button>
<button class="main">${t("dream")}</button>
</div>`;
}

function openModal(){

const modal=document.getElementById("modal");
modal.style.display="flex";

const img=document.getElementById("emissary");
const msg=document.getElementById("msg");
const btn=document.getElementById("backBtn");

img.style.opacity="0";
img.style.transform="scale(1)";
msg.style.opacity="0";
btn.style.opacity="0";

// ОДНА ПЛАВНАЯ АНИМАЦИЯ
img.style.transition="6s linear";
img.style.opacity=".65";
img.style.transform="scale(2)";

// после 6 сек → текст
setTimeout(()=>{
img.style.opacity="0";
msg.innerText=t("emissary");
msg.style.opacity="1";
btn.style.opacity="1";
},6000);

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

intro();

</script>
</body>
</html>
