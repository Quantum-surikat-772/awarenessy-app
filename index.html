<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#top{
flex:1;
padding:10px;
display:flex;
flex-direction:column;
}

#bottom{
padding:10px;
}
</style>
</head>

<body>

<h1>Я ЖИВОЙ</h1>

<div id="top">TOP OK</div>
<div id="bottom">BOTTOM OK</div>

<script>

window.onload = function(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");

// центр
topBox.innerHTML = `
<div style="font-size:22px;">
Я наблюдаю...
</div>
`;

// кнопки
bottomBox.innerHTML = `
<div style="
width:100%;
display:flex;
gap:10px;
">
<button style="flex:1;height:50px;">ЯВЬ</button>
<button style="flex:1;height:50px;">СОН</button>
</div>
`;

};

</script>

</body>
</html>
