<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Awarenessy Stable v1.0</title>

<style>
:root{
--bg:#050505;
--panel:#0d0d0d;
--line:#222;
--text:#f1f1f1;
--muted:#8c8c8c;
--gold:#d7b46a;
}

*{box-sizing:border-box;}

body{
margin:0;
background:radial-gradient(circle at center,#0a0a0a,#030303 70%);
color:var(--text);
font-family:Arial,Helvetica,sans-serif;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

#top{
height:50vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
text-align:center;
}

#bottom{
height:50vh;
display:none;
justify-content:center;
align-items:center;
position:relative;
}

.panel{
width:100%;
max-width:360px;
animation:fade .6s ease;
}

button{
width:100%;
margin:4px 0;
padding:11px;
background:#111;
color:#ddd;
border:1px solid #2a2a2a;
border-radius:10px;
font-size:14px;
cursor:pointer;
}

button:active{
transform:scale(.99);
background:#1a1a1a;
}

#modeButtons{
position:fixed;
bottom:18px;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:14px;
padding:0 18px;
}

#modeButtons button{
max-width:160px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
justify-content:center;
margin-top:18px;
}

.cell{
width:70px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border:1px solid #222;
border-radius:14px;
font-size:22px;
cursor:pointer;
}

#compassWrap{
width:320px;
height:320px;
position:relative;
}

#compassBg,#compass{
position:absolute;
inset:0;
width:100%;
height:100%;
}

.small{
font-size:13px;
color:var(--muted);
margin-top:8px;
}

.title{
font-size:26px;
letter-spacing:1px;
color:var(--gold);
margin-bottom:10px;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:none;}
}
</style>
</head>
<body>

<div id="top"></div>

<div id="bottom">
<div id="compassWrap">
<img id="compassBg" src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png">
<div id="compass"></div>
</div>
</div>

<div id="modeButtons">
<button onclick="startMode('wake')">ЯВЬ</button>
<button onclick="startMode('dream')">СОН</button>
</div>

<script>
/* =========================
STATE
========================= */

alert("JS START");

const top = document.getElementById("top");
const bottom = document.getElementById("bottom");
const compass = document.getElementById("compass");
const modeButtons = document.getElementById("modeButtons");

const state = {
mode:null,
time:null,
home:null,
location:null,
distance:null,
activity:null,
emotion:null,
entries: JSON.parse(localStorage.getItem("awarenessy_db") || "[]")
};

const directions = ["n","ne","e","se","s","sw","w","nw"];
const arrows = {
nw:"↖", n:"↑", ne:"↗",
w:"←", center:"Я", e:"→",
sw:"↙", s:"↓", se:"↘"
};

window.onload = function(){
  boot();
};

/* =========================
BOOT
========================= */

function boot(){
bottom.style.display = "none";
showStartScreen();
}

/* =========================
SCREENS
========================= */

function showStartScreen(){
const variants = [
"Я наблюдаю...",
"Это не сон?",
"Что ты здесь сейчас делаешь?",
"Где твой Дом?",
"Осознай момент."
];
const t = variants[Math.floor(Math.random()*variants.length)];

top.innerHTML = `
<div class="panel">
<div class="title">AWARENESSY</div>
<div>${t}</div>
<div class="small">Архикомпас осознанности</div>
</div>`;
}

function startMode(mode){

  state.mode = mode;

  // 👇 показываем компас
  bottom.style.display = "flex";

  // 👇 сразу рисуем
  drawCompass();

  // 👇 запускаем сценарий
  setTimeout(()=>{
    stepSouth();
  }, 300);
}

function stepSouth(){
top.innerHTML = `
<div class="panel">
<div style="font-size:24px;">Повернись к Югу</div>
<div class="small">(там, где Солнце в полдень)</div>
<br>
<button onclick="stepTime()">Готово</button>
</div>`;
}

function stepTime(){
const list = ["Рассвет","Утро","Полдень","Вечер","Закат","Ночь"];
top.innerHTML = `
<div class="panel">
<div>Какое время суток?</div><br>
${list.map(v=>`<button onclick="pickTime('${v}')">${v}</button>`).join("")}
</div>`;
}

function pickTime(v){
state.time=v;
stepHome();
}

function stepHome(){
top.innerHTML = `
<div class="panel">
<div>Где твой Дом?</div>
<div class="grid">
${dirCell()}
</div>
</div>`;
}

function dirCell(){
return `
<div class="cell" onclick="pickHome('nw')">↖</div>
<div class="cell" onclick="pickHome('n')">↑</div>
<div class="cell" onclick="pickHome('ne')">↗</div>
<div class="cell" onclick="pickHome('w')">←</div>
<div class="cell" onclick="pickLocation('center')">Я</div>
<div class="cell" onclick="pickHome('e')">→</div>
<div class="cell" onclick="pickHome('sw')">↙</div>
<div class="cell" onclick="pickHome('s')">↓</div>
<div class="cell" onclick="pickHome('se')">↘</div>
`;
}

function pickHome(dir){
state.home = dir;
drawCompass();
stepLocation();
}

function stepLocation(){
top.innerHTML = `
<div class="panel">
<div>Где ты сейчас?</div>
<div class="grid">
${locationGrid()}
</div>
</div>`;
}

function locationGrid(){
return `
<div class="cell" onclick="pickLocation('nw')">↖</div>
<div class="cell" onclick="pickLocation('n')">↑</div>
<div class="cell" onclick="pickLocation('ne')">↗</div>
<div class="cell" onclick="pickLocation('w')">←</div>
<div class="cell" onclick="pickLocation('center')">Я</div>
<div class="cell" onclick="pickLocation('e')">→</div>
<div class="cell" onclick="pickLocation('sw')">↙</div>
<div class="cell" onclick="pickLocation('s')">↓</div>
<div class="cell" onclick="pickLocation('se')">↘</div>
`;
}

function pickLocation(dir){
state.location = dir;

if(dir==="center"){
stepActivity();
}else{
stepDistance();
}

drawCompass();
}

function stepDistance(){
top.innerHTML = `
<div class="panel">
<div>Как далеко?</div><br>
<button onclick="pickDistance(1)">Близко</button>
<button onclick="pickDistance(2)">Средне</button>
<button onclick="pickDistance(3)">Далеко</button>
</div>`;
}

function pickDistance(v){
state.distance=v;
stepActivity();
drawCompass();
}

function stepActivity(){
top.innerHTML = `
<div class="panel">
<div>Что ты здесь сейчас делаешь?</div><br>

<button onclick="pickActivity('Творю')">Творю</button>
<button onclick="pickActivity('Работаю')">Работаю</button>
<button onclick="pickActivity('Учусь')">Учусь</button>
<button onclick="pickActivity('Иду / Еду')">Иду / Еду</button>
<button onclick="pickActivity('Отдыхаю')">Отдыхаю</button>
<button onclick="pickActivity('Ем')">Ем</button>
<button onclick="pickActivity('Выпиваю / прочее')">Выпиваю / прочее</button>
<button onclick="pickActivity('Развлекаюсь')">Развлекаюсь</button>
<button onclick="pickActivity('Торможу')">Торможу</button>

</div>`;
}

function pickActivity(v){
state.activity=v;
stepEmotion();
}

function stepEmotion(){
top.innerHTML = `
<div class="panel">
<div>Что чувствуешь?</div><br>

<button onclick="saveEmotion('#FFD700','Радость')">Радость, позитивная деятельность</button>
<button onclick="saveEmotion('#FFFFFF','Творчество')">Осознанное творчество</button>
<button onclick="saveEmotion('#3F51B5','Вдохновение')">Вдохновение, спокойствие, творчество</button>

<button onclick="saveEmotion('#26C6DA','Фантазия')">Фантазёрство, пассивность</button>
<button onclick="saveEmotion('#808080','Нейтрально')">Нейтральное вовлечение</button>
<button onclick="saveEmotion('#4CAF50','Тревожность')">Тоска, зависимость, тревожность</button>

<button onclick="saveEmotion('#F44336','Гнев')">Гнев, агрессия, превосходство</button>
<button onclick="saveEmotion('#FF9800','Активность')">Самоуверенность, соревновательность</button>
<button onclick="saveEmotion('#000000','Хаос')">Хаос, ужас, отсутствие контроля</button>

</div>`;
}

function saveEmotion(color,name){
state.emotion = {color,name};

state.entries.push({
date:new Date().toISOString(),
mode: state.mode,
time: state.time,
home: state.home,
location: state.location,
distance: state.distance,
activity: state.activity,
emotion: state.emotion
});

localStorage.setItem("awarenessy_db",JSON.stringify(state.entries));

showSaved();
drawCompass();
}

function showSaved(){
top.innerHTML = `
<div class="panel">
<div class="title">Сохранено</div>
<div>Нажми на сектор компаса</div>
<div class="small">увидеть повторяющиеся сценарии жизни</div>
</div>`;
}

/* =========================
COMPASS
========================= */

function drawCompass(){
  compass.innerHTML = `
    <svg viewBox="0 0 300 300">
      <circle cx="150" cy="150" r="120"
        stroke="rgba(255,255,255,0.2)"
        fill="none"
      />
      <circle cx="150" cy="150" r="60"
        stroke="rgba(255,255,255,0.1)"
        fill="none"
      />
    </svg>
  `;
}

function sector(cx,cy,r1,r2,a0,a1,fill){

const p1 = point(cx,cy,r2,a0);
const p2 = point(cx,cy,r2,a1);
const p3 = point(cx,cy,r1,a1);
const p4 = point(cx,cy,r1,a0);

return `
<path d="
M ${p1.x} ${p1.y}
A ${r2} ${r2} 0 0 1 ${p2.x} ${p2.y}
L ${p3.x} ${p3.y}
A ${r1} ${r1} 0 0 0 ${p4.x} ${p4.y}
Z"
fill="${fill}"
stroke="rgba(255,255,255,.12)"
stroke-width="1"
/>`;
}

function point(cx,cy,r,a){
return {
x: cx + r*Math.cos(a),
y: cy + r*Math.sin(a)
};
}
</script>
</body>
</html>
