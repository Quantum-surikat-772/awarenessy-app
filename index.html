<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Awarenessy Mini App</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
    button { padding: 10px 20px; font-size: 16px; margin: 5px 0; cursor: pointer; }
    #status { margin-top: 15px; }
  </style>
</head>
<body>
  <h1>Awarenessy Mini App</h1>

  <button id="checkUser">Проверить / Создать пользователя</button><br/>
  <button id="awareness">🧠 Я осознался</button>
  <div id="status"></div>

  <script>
    const SUPABASE_URL = "https://najicjitgyvtdrjaowig.supabase.co";
    const SUPABASE_KEY = "sb_publishable_mqjiX2afN7dtivBeOcerWQ_iP2wm1uR";

    // Создаем клиент Supabase один раз
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const button = document.getElementById("checkUser");
    const awarenessButton = document.getElementById("awareness");
    const status = document.getElementById("status");

    // --- Кнопка 1: Проверить / Создать пользователя ---
    button.addEventListener("click", async () => {
      status.innerText = "Проверяем пользователя...";
      try {
        const tg = window.Telegram?.WebApp;
        let telegramUser = tg?.initDataUnsafe?.user;

        if (!telegramUser) {
          console.log("⚠️ Telegram user не найден, используем тестового");
          telegramUser = { id: 123456789, first_name: "TestUser" };
        }

        const { data, error } = await sb
          .from("users")
          .upsert([
            { telegram_id: telegramUser.id, first_name: telegramUser.first_name, nickname: telegramUser.first_name }
          ], { onConflict: "telegram_id" });

        if (error) {
          console.error("Supabase error:", error);
          status.innerText = "Ошибка Supabase ❌";
          return;
        }

        status.innerText = "Пользователь успешно создан / обновлён ✅";

      } catch (err) {
        console.error("Unexpected error:", err);
        status.innerText = "Неожиданная ошибка ❌";
      }
    });

    // --- Кнопка 2: "Я осознался" ---
    awarenessButton.addEventListener("click", async () => {
      status.innerText = "Фиксируем момент осознанности...";
      try {
        const tg = window.Telegram?.WebApp;
        let telegramUser = tg?.initDataUnsafe?.user;

        if (!telegramUser) {
          telegramUser = { id: 123456789 }; // тестовый юзер вне Telegram
        }

        // Получаем ID пользователя
        const { data: user, error: userError } = await sb
          .from("users")
          .select("id")
          .eq("telegram_id", telegramUser.id)
          .single();

        if (userError) throw userError;

        // Создаем сессию осознанности
        const { error: insertError } = await sb
          .from("awareness_sessions")
          .insert({
            user_id: user.id,
            level: 1
          });

        if (insertError) throw insertError;

        status.innerText = "Момент осознанности записан ✨";

      } catch (err) {
        console.error(err);
        status.innerText = "Ошибка записи ❌";
      }
    });
  </script>
</body>
</html>
