<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Awarenessy Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#222;color:#fff;font-family:sans-serif;padding:20px;">
  <h1>Awarenessy Mini App</h1>
  <button id="checkUser">Проверить / Создать пользователя</button>
  <div id="status" style="margin-top:10px;"></div>

  <script>
    console.log("Awarenessy Mini App — VERSION 3");

    const SUPABASE_URL = "https://najicjitgyvtdrjaowig.supabase.co";
    const SUPABASE_KEY = "sb_publishable_mqjiX2afN7dtivBeOcerWQ_iP2wm1uR";

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById("checkUser").addEventListener("click", async () => {
      const status = document.getElementById("status");
      status.innerText = "Проверяем...";

      const tg = window.Telegram?.WebApp;

      let telegramUser = tg?.initDataUnsafe?.user;

      if (!telegramUser) {
        console.log("⚠️ Telegram user не получен, используем тестового");
        telegramUser = { id: 999999999, first_name: "TestUser" };
      }

      try {
        const { data, error } = await supabase
          .from("users")
          .upsert([
            {
              telegram_id: telegramUser.id,
              first_name: telegramUser.first_name
            }
          ], { onConflict: "telegram_id" });

        if (error) {
          console.error("Supabase error:", error);
          status.innerText = "Ошибка Supabase ❌";
          return;
        }

        console.log("Пользователь создан/проверен:", data);
        status.innerText = "Пользователь успешно создан / проверен ✅";

      } catch (err) {
        console.error("Unexpected error:", err);
        status.innerText = "Неожиданная ошибка ❌";
      }
    });
  </script>
</body>
</html>
