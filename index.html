<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#top{
flex:1;
display:flex;
}

#app{
height:100vh;
display:flex;
flex-direction:column;
transition:0.3s ease;
}

#bottom{
padding:10px;
}

.btn{
flex:1;
height:56px;

display:flex;
align-items:center;
justify-content:center;

border-radius:12px;
border:1px solid #333;
background:#111;

font-size:18px;
font-weight:600;

color:#fff;
}

.wake{
color:#c9a86a; /* золото */
}

.dream{
color:#69b7ff; /* голубой */
}

#header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
border-bottom:1px solid #222;
}

#brand{
color:#c9a86a;
font-weight:700;
font-size:16px;
}

#brandWrap{
display:flex;
flex-direction:column;
}

#sub{
font-size:11px;
color:#777;
margin-top:2px;
}

#langs button{
background:none;
border:none;
color:#aaa;
font-size:13px;
margin-left:6px;
}

#langs button.active{
color:#fff;
}

#modal{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:999;
overflow:hidden;
}

@keyframes pulseGlow{
0%{
opacity:0.4;
}
50%{
opacity:1;
}
100%{
opacity:0.4;
}
}

.pulse{
animation:pulseGlow 6s ease-in-out infinite;
}

/* Эмиссар */

.emissaryWrap{
position:absolute;
top:20%;
left:55%;
transform:translateX(-50%);
width:100%;
display:flex;
justify-content:center;
}

#emissary{
width:70%;
max-width:300px;
opacity:0;
}

.emissary{
filter:blur(2px);
}

@keyframes emissaryAppear{
0%{
opacity:0;
transform:scale(0.8) translateX(0);
filter:blur(6px);
}
50%{
opacity:0.6;
filter:blur(2px);
}
100%{
opacity:0;
transform:scale(2) translateX(20%);
filter:blur(0);
}
}

@keyframes emissaryFlow {

  0%{
    opacity:0;
    transform:translateX(-55%) scale(0.9);
  }

  25%{
    opacity:0.65;
    transform:translateX(-50%) scale(1.1);
  }

  50%{
    opacity:0.65;
    transform:translateX(-40%) scale(1.5);
  }

  100%{
    opacity:0;
    transform:translateX(-10%) scale(2.1);
  }

}

/* текст */

#msg{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:80%;
max-width:360px;
text-align:left;
line-height:1.5;
opacity:0;
}

/* кнопка */

#backBtn{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
height:50px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:#fff;
}

#settingsBtn:hover{
background:rgba(255,255,255,0.15);
}

/* 🔴 режим аномалии */

body.alert{
background:#c00000;
}

body.alert .btn{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.25);
}

body.alert .wake,
body.alert .dream{
color:#fff;
}

body.alert #brand{
color:#fff;
}

body.alert #langs button{
color:#eee;
}

body.alert{
background:#c00000;
animation:pulse 2.5s ease-in-out infinite alternate;
}

@keyframes pulse{
0%{background:#b00000;}
100%{background:#d00000;}
}

.anomalyText{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:800;
text-align:center;

opacity:0;
transform:scale(0.95);
animation:fadeIn 4s ease forwards;
}

@keyframes fadeIn{
to{
opacity:1;
transform:scale(1);
}
}

body.alert::after{
content:"";
position:fixed;
inset:0;
background:rgba(255,255,255,0.03);
pointer-events:none;
animation:glitch 0.8s infinite;
}

@keyframes glitch{
0%{opacity:0;}
50%{opacity:0.04;}
100%{opacity:0;}
}

@keyframes fadeIn{
0%{
opacity:0;
transform:scale(0.92);
filter:blur(6px);
}
60%{
opacity:0.6;
filter:blur(2px);
}
100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}
}

#settingsBtn{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:90%;
height:50px;

border-radius:12px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.08);
color:#fff;

opacity:0;
transition:1s ease;
}

</style>
</head>

<body>

<div id="app">
<div id="header"></div>

<div id="top">TOP OK</div>
<div id="bottom">BOTTOM OK</div>
</div>

<script>

const HAND_IMG = "https://i.postimg.cc/zXp9BVGf/Hands-1.png";
const HAND_VIDEO = "https://i.imgur.com/ocTkSQj.mp4";

const state = {
lang: "ru",

mode: null,   // wake / dream
step: "intro", // где мы сейчас

// будущий компас
time: null,
home: null,
beam: null,
ring: null,
emotion: null,
emotionLabel: null
};

const TXT = {

ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения Осознанности",
wake:"ЯВЬ",
dream:"СОН",
settings:"Настройка",
back:"Назад",

special:"ЭТО НЕ СОН?",
  
intro:[
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя сейчас настроение?"
],

emissary:`ЗДРАВСТВУЙ

Я — Эмиссар Сновидений

На русском языке меня зовут ОСоЗНАЙКА!

ОС — Осознанное Сновидение + Знание

Я твой Друг и Попутчик на Пути Осознания

Я смотрю из глубины твоего Внимания

Напоминаю об осознанности

Настрой частоту напоминаний,
и я буду с тобой

И я отвечу на вопросы
в этом Приложении


Мы встретимся.`
},

en:{
brand:"AWARENESSY!",
sub:"Awareness training mediator",
wake:"WAKE",
dream:"DREAM",
settings:"Settings",
back:"Back",

special:"IS THIS A DREAM?",
  
intro:[
"What were you doing 5 minutes ago?",
"I observe...",
"Where is your Home?",
"Look at your hands",
"How do you feel?"
],

emissary:`HELLO

I am the Dream Emissary.

In your language, I am called AWARENESSY!

I am your Companion on the Path of Awareness.

I observe from within your attention.

I appear when your awareness softens.

I remind you to notice.

To question.

To return.

You will find explanations here —
attached to certain elements.

Look for the question mark.


I will guide you.



We will meet.`
},

es:{
brand:"¡CONCIENCITO!",
sub:"Facilitador de consciencia",
wake:"VIGILIA",
dream:"SUEÑO",
settings:"Ajustes",
back:"Volver",

special:"¿ESTO ES UN SUEÑO?",
  
intro:[
"¿Qué hacías hace 5 minutos?",
"Observo...",
"¿Dónde está tu hogar?",
"Mira tus manos",
"¿Cómo te sientes?"
],

emissary:`HOLA

Soy el Emisario de los Sueños.

En tu idioma, me llaman ¡CONCIENCITO!

Soy tu compañero en el camino de la consciencia.

Observo desde el interior de tu atención.

Aparezco cuando tu consciencia se abre.

Te recuerdo que observes.

Que cuestiones.

Que regreses.

Ajusta la frecuencia de los recordatorios,
y estaré contigo.

Aquí encontrarás explicaciones,
asociadas a ciertos elementos.

Busca el signo de pregunta.


Te guiaré.


Nos encontraremos.`
}

};

function t(key){
return TXT[state.lang][key];
}

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

window.onload = function(){

  const savedLang = localStorage.getItem("lang");

  if(savedLang){
    state.lang = savedLang;
  } else {
    const deviceLang = navigator.language.slice(0,2);

    if(TXT[deviceLang]){
      state.lang = deviceLang;
    }
  }

  render();
};

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

function render(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");
const header = document.getElementById("header");

header.innerHTML = `
<div id="brandWrap">
  <div id="brand" onclick="openModal()">${t("brand")}</div>
  <div id="sub">${t("sub")}</div>
</div>

<div id="langs">
<button onclick="setLang('ru')">RU</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>
`;

// РАНДОМ
const r = Math.random();
document.body.classList.remove("alert");

let html = "";

if(r < 0.2){
document.body.classList.add("alert");

html = `<div class="anomalyText">${t("special")}</div>`;
}
else if(r < 0.5){
html = `<img src="${HAND_IMG}" style="width:120%; max-width:420px;">`;
}
else if(r < 0.75){
html = `
<video autoplay muted loop playsinline style="max-width:95%;">
<source src="${HAND_VIDEO}" type="video/mp4">
</video>`;
}
else{
html = `<div>${rand(t("intro"))}</div>`;
}

// ЕСЛИ режим НЕ выбран → стартовый экран
if(!state.mode){

topBox.innerHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
  <div>
    <div style="font-size:22px;font-weight:700">${rand(t("intro"))}</div>
  </div>
</div>
`;

bottomBox.innerHTML = `
<div style="display:flex;gap:10px;">
  <div class="btn wake" onclick="start('wake')">${t("wake")}</div>
  <div class="btn dream" onclick="start('dream')">${t("dream")}</div>
</div>
`;

return;
}

renderCompass();

}

function setLang(l){
  state.lang = l;

  localStorage.setItem("lang", l); // 👈 сохраняем

  render();
}

function openModal(){

const modal = document.getElementById("modal");
const img = document.getElementById("emissary");
const msg = document.getElementById("msg");

document.getElementById("backBtn").innerText = t("back");
document.getElementById("settingsBtn").innerText = t("settings");

modal.style.display = "block";

msg.innerHTML = "";
msg.style.opacity = 0;

// старт
img.style.opacity = 0;
img.style.transform = "translateX(-55%) scale(1)";
img.style.transition = "none";

img.style.animation = "emissaryFlow 9s linear forwards";

// текст
setTimeout(()=>{
  showText();
},3500);

}

function showText(){

const msg = document.getElementById("msg");

const text = t("emissary");

msg.innerHTML = "";

const lines = text.split("\n");

lines.forEach((line,i)=>{
const d = document.createElement("div");
d.innerText = line;
d.style.opacity = 0;
d.style.transition = "1.2s ease";
msg.appendChild(d);

setTimeout(()=>{
d.style.opacity = 1;
}, i * 700);
});

const settingsBtn = document.getElementById("settingsBtn");

// время появления = последняя строка + пауза
setTimeout(()=>{
settingsBtn.style.opacity = 1;
}, lines.length * 700 + 800);

document.getElementById("settingsBtn").onclick = function(){
alert("Здесь будет настройка будильника");
};

msg.style.opacity = 1;

}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

function start(mode){

state.mode = mode;
state.step = "south"; // первый шаг

renderCompass();
}

function renderCompass(){

const topBox = document.getElementById("top");
const bottomBox = document.getElementById("bottom");

// 🔝 ВЕРХ — КОНТЕНТ
let topHTML = "";

if(state.step === "south"){

topHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
<div>
<div style="
font-size:22px;
font-weight:700;
color:${state.mode === 'wake' ? '#c9a86a' : '#fff'};
">
Повернись к Югу
</div>
<div style="font-size:14px;color:#777;margin-top:8px">(там где солнце в полдень)</div>

<button class="btn"
style="margin-top:20px;width:160px;margin-left:auto;margin-right:auto;"
onclick="nextStep()">OK</button>
</div>
</div>
`;

}

if(state.step === "home"){

const dirs = [
["nw","↖"],["n","↑"],["ne","↗"],
["w","←"],["c","Я"],["e","→"],
["sw","↙"],["s","↓"],["se","↘"]
];

topHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
<div>

<div style="
font-size:20px;
font-weight:700;
color:${state.mode === 'wake' ? '#c9a86a' : '#fff'};
">
В каком направлении твой Дом?
</div>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:20px;">
${dirs.map(d=>`
<button class="btn" 
style="${d[0]==='c' ? 'font-weight:700;border:1px solid #c9a86a;' : ''}"
onclick="pickDir('${d[0]}')">
${d[1]}
</button>
`).join("")}
</div>

</div>
</div>
`;

}

if(state.step === "distance"){

topHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
<div>

<div style="
font-size:20px;
font-weight:700;
color:${state.mode === 'wake' ? '#c9a86a' : '#fff'};
">
Как далеко твой Дом?
</div>

<div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">

<button class="btn" onclick="pickDistance(1)">Близко</button>
<button class="btn" onclick="pickDistance(2)">Далеко</button>
<button class="btn" onclick="pickDistance(3)">Очень далеко</button>

</div>

</div>
</div>
`;

}

if(state.step === "activity"){

topHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;">
<div>

<div style="
font-size:20px;
font-weight:700;
color:${state.mode === 'wake' ? '#c9a86a' : '#fff'};
">
Что ты сейчас здесь делаешь?
</div>

<div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">

<button class="btn" onclick="pickActivity('create')">Творю</button>
<button class="btn" onclick="pickActivity('work')">Работаю</button>
<button class="btn" onclick="pickActivity('learn')">Учусь</button>
<button class="btn" onclick="pickActivity('move')">Иду / Еду</button>
<button class="btn" onclick="pickActivity('rest')">Отдыхаю</button>
<button class="btn" onclick="pickActivity('eat')">Ем</button>
<button class="btn" onclick="pickActivity('drink')">Выпиваю и/или прочее</button>
<button class="btn" onclick="pickActivity('fun')">Развлекаюсь</button>
<button class="btn" onclick="pickActivity('freeze')">"Торможу"</button>

<input id="customAct" placeholder="Другое..."
style="
margin-top:10px;
height:44px;
border-radius:10px;
border:1px solid #333;
background:#111;
color:#fff;
padding:0 10px;
">

<button class="btn" onclick="pickCustomActivity()">Записать</button>

</div>
</div>
</div>
`;
}

if(state.step === "emotions"){

const emotions = [

["#FFD700","Радость, позитивная деятельность"],
["#FFFFFF","Осознанное творчество"],
["#3F51B5","Вдохновение, спокойствие, творчество"],
["#26C6DA","Фантазёрство, мечтательность"],
["#808080","Нейтральное, пассивное вовлечение"],
["#4CAF50","Тоска, зависимость, тревожность"],
["#F44336","Гнев, агрессия, превосходство"],
["#FF9800","Самоуверенность, соревновательность"],
["#000000","Хаос, ужас, отсутствие контроля"]

];

topHTML = `
<div style="flex:1;overflow:auto;padding:20px;">

<div style="
font-size:20px;
font-weight:700;
text-align:center;
margin-bottom:20px;
color:${state.mode === 'wake' ? '#c9a86a' : '#fff'};
">
Что ты сейчас чувствуешь?
</div>

<div style="display:flex;flex-direction:column;gap:10px;">

${emotions.map(e=>`

<button class="btn"
style="
justify-content:flex-start;
padding:0 14px;
font-size:15px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
"
onclick="selectEmotion('${e[0]}', '${e[1]}')">

${e[1]}

</button>

`).join("")}

</div>
</div>
`;
}

if(!topHTML){
  
  topHTML = `<div style="padding:20px">STEP: ${state.step || 'undefined'}</div>`;
}

topBox.innerHTML = topHTML;

// 🔻 НИЗ — КОМПАС (пока заглушка)
bottomBox.innerHTML = `
<div style="flex:1;display:flex;align-items:center;justify-content:center;">

<div id="compassWrap" style="
position:relative;
width:85vw;
max-width:320px;
aspect-ratio:1;
">

<img id="compassImg"
src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png"
style="
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
">

<svg id="fx"
viewBox="0 0 400 400"
style="
position:absolute;
inset:6%;
width:88%;
height:88%;
">

<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="12" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

</svg>

</div>

</div>
`;

drawFX();

  }

function nextStep(){

if(state.step === "south"){
  state.step = "home";
}

renderCompass();
}

function drawFX(){

const svg = document.getElementById("fx");
if(!svg) return;

svg.innerHTML = `
<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="18" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
`;

// если нет направления — ничего
if(!state.beam) return;

// центр (ДОМ)
const activeColor = state.emotion || "#9b5cff";
if(state.beam === "c"){
svg.innerHTML += `
<circle cx="200" cy="200" r="48"
fill="none"
stroke="${activeColor}"
stroke-width="4"
opacity="0.9"
class="pulse"
/>

<circle cx="200" cy="200" r="60"
fill="none"
stroke="${activeColor}"
stroke-width="10"
opacity="0.15"
filter="url(#glow)"
class="pulse"
/>
`;
return;
}

// геометрия
const step = Math.PI * 2 / 8;
const idx = DIRS.indexOf(state.beam);

const start = -Math.PI/2 - step/2 + idx * step;
const end = start + step;

// кольца (исправленные)
const rings = [
[55,95],   // Близко
[95,145],  // Не близко
[145,195]  // Далеко
];

let r;

// до выбора дистанции → широкий сектор
if(state.ring == null){
  r = [40,180];
}else{
  r = rings[state.ring - 1] || rings[1];
}

// путь
const d = sector(r[0], r[1], start, end);

// ☀️ Фиолетовый контур

svg.innerHTML += `

<!-- основной контур -->
<path d="${d}"
fill="none"
stroke="${activeColor}"
stroke-width="3"
opacity="0.9"
class="pulse"
/>

<!-- мягкое внешнее свечение (очень лёгкое) -->
<path d="${d}"
fill="none"
stroke="${activeColor}"
stroke-width="8"
opacity="0.15"
filter="url(#glow)"
class="pulse"
/>

`;
}

function sector(ir, or, a0, a1){

function p(r,a){
return [200 + Math.cos(a)*r, 200 + Math.sin(a)*r];
}

const A = p(or,a0);
const B = p(or,a1);
const C = p(ir,a1);
const D = p(ir,a0);

return `
M ${A[0]} ${A[1]}
A ${or} ${or} 0 0 1 ${B[0]} ${B[1]}
L ${C[0]} ${C[1]}
A ${ir} ${ir} 0 0 0 ${D[0]} ${D[1]}
Z`;
}

const DIRS = ["n","ne","e","se","s","sw","w","nw"];

function opposite(v){
let i = DIRS.indexOf(v);
return DIRS[(i+4)%8];
}

function pickDir(v){

state.home = v;

// центр
if(v === "c"){
  state.beam = "c";
  state.ring = 0;

  // 👉 теперь тоже идём в деятельность
  state.step = "activity";

  renderCompass();
  return;
}

// обычный случай
state.beam = opposite(v);
state.ring = null;

// 👉 ПЕРЕХОД К ДИСТАНЦИИ
state.step = "distance";

renderCompass();
}

function pickDistance(v){

state.ring = v;

// переход к деятельности
state.step = "activity";

renderCompass();

        }

function pickActivity(v){
state.activity = v;
state.step = "emotions";
renderCompass();
}

function pickCustomActivity(){
const val = document.getElementById("customAct").value;
if(val){
state.activity = val;
state.step = "emotions";
renderCompass();
}
}

function selectEmotion(color){

state.emotion = color;

drawFX();

// дальше потом будет шаг "attention"
// пока просто проверяем окраску

}
  
</script>

<div id="modal">

  <div class="emissaryWrap">
    <img id="emissary" src="https://i.postimg.cc/V6gqpw1V/Emissary.png">
  </div>

  <div id="msg"></div>
