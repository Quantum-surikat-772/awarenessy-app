<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Awarenessy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
padding:20px;
}

h1{
font-weight:400;
}

#compass{
width:220px;
height:220px;
border:2px solid #444;
border-radius:50%;
margin:30px auto;
position:relative;
}

#center{
width:12px;
height:12px;
background:#fff;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#needle{
width:2px;
height:90px;
background:#00ffcc;
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom center;
transform:rotate(0deg);
transition:transform 0.6s ease;
}

button{
padding:14px 26px;
font-size:18px;
border:none;
border-radius:8px;
background:#00aa88;
color:white;
margin-top:20px;
}

#stats{
margin-top:20px;
font-size:18px;
color:#ddd;
}

</style>
</head>

<body>

<h1>Awarenessy</h1>

<div id="compass">

<div id="needle"></div>
<div id="center"></div>

</div>

<button id="awareness">🧠 Я осознался</button>

<div id="stats">
Сегодня: <span id="today">0</span><br>
Всего: <span id="total">0</span>
</div>

<div id="status"></div>

<script>

const SUPABASE_URL="https://najicjitgyvtdrjaowig.supabase.co"
const SUPABASE_KEY="YOUR_KEY"

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

const needle=document.getElementById("needle")
const todaySpan=document.getElementById("today")
const totalSpan=document.getElementById("total")
const status=document.getElementById("status")

let angle=0
let userId=null

async function getUser(){

const tg=window.Telegram?.WebApp
let u=tg?.initDataUnsafe?.user

if(!u){
u={id:999999,first_name:"Test"}
}

const {data,error}=await sb
.from("users")
.upsert({
telegram_id:u.id,
first_name:u.first_name,
nickname:u.first_name
},{onConflict:"telegram_id"})
.select()
.single()

userId=data.id

loadStats()

}

async function loadStats(){

const {data}=await sb
.from("awareness_sessions")
.select("created_at")
.eq("user_id",userId)

const todayDate=new Date().toISOString().slice(0,10)

let todayCount=0

data.forEach(s=>{
if(s.created_at.slice(0,10)==todayDate) todayCount++
})

todaySpan.innerText=todayCount
totalSpan.innerText=data.length

}

async function awareness(){

status.innerText="Фиксируем..."

const {error}=await sb
.from("awareness_sessions")
.insert({user_id:userId})

if(error){
status.innerText="Ошибка"
return
}

angle+=30

needle.style.transform=`rotate(${angle}deg)`

await loadStats()

status.innerText="Момент осознанности ✨"

}

document.getElementById("awareness").addEventListener("click",awareness)

getUser()

</script>

</body>
</html>
