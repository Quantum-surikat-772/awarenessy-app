<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy V5.0</title>

<style>
:root{
--bg:#050505;
--gold:#c9a86a;
--blue:#69b7ff;
--line:#242424;
--text:#f5f5f5;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
justify-content:center;
}

#app{
width:100%;
max-width:520px;
height:100vh;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at 18% 18%,rgba(255,255,255,.03),transparent 20%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,.02),transparent 24%),
#050505;
}

#top,#bottom{
height:50%;
padding:10px;
}

#top{
display:flex;
flex-direction:column;
}

#bottom{
display:flex;
flex-direction:column;
justify-content:flex-end;
}

#header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:8px;
}

#brand{
font-size:16px;
font-weight:700;
cursor:pointer;
}

#sub{
font-size:11px;
color:#777;
margin-top:2px;
}

#langs{
display:flex;
gap:8px;
}

.mini{
width:50px;
height:42px;
border:none;
border-radius:14px;
background:#151515;
border:1px solid #242424;
color:#ddd;
}

.active{
border-color:#c9a86a;
color:#fff;
}

#content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
width:100%;
padding:18px;
border-radius:22px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.05);
}

.title{
font-size:22px;
font-weight:700;
text-align:center;
line-height:1.2;
}

.small{
font-size:13px;
color:#aaa;
text-align:center;
margin-top:8px;
}

.row{
display:flex;
gap:10px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:12px;
}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-top:12px;
}

.column{
display:grid;
grid-template-columns:1fr;
gap:6px;
margin-top:12px;
}

.main{
width:100%;
height:46px;
border:none;
border-radius:14px;
background:linear-gradient(180deg,#1b1b1b,#101010);
border:1px solid #262626;
color:#fff;
font-size:14px;
font-weight:700;
}

.slim{
height:36px;
font-size:12px;
}

input.main{
font-weight:400;
text-align:center;
}

#compassWrap{
position:relative;
width:min(92vw,410px);
height:min(92vw,410px);
margin:0 auto;
}

#compassImg,#fx{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
}

#foot{
font-size:11px;
color:#666;
text-align:center;
margin-top:6px;
}

#modal{
position:fixed;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
z-index:99;
overflow:hidden;
}

#aura{
position:absolute;
inset:-20%;
background:
radial-gradient(circle at 30% 40%,rgba(140,0,255,.08),transparent 35%),
radial-gradient(circle at 70% 60%,rgba(0,160,255,.07),transparent 35%);
animation:drift 8s linear infinite alternate;
}

@keyframes drift{
from{transform:translate(-2%,-2%) scale(1);}
to{transform:translate(2%,2%) scale(1.06);}
}

#modalInner{
position:relative;
z-index:2;
width:90%;
max-width:420px;
text-align:center;
}

#emissary{
width:220px;
max-width:70%;
opacity:0;
transition:2s;
}

#msg{
margin-top:18px;
line-height:1.6;
font-size:15px;
opacity:0;
transition:1.5s;
white-space:pre-line;
}

.fadeIn{
opacity:1 !important;
}

</style>
</head>
<body>

<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<div id="modal">
<div id="aura"></div>
<div id="modalInner">
<img id="emissary" src="https://i.postimg.cc/V6gqpw1V/Emissary.png">
<div id="msg"></div>
<button class="main" style="margin-top:18px" onclick="closeModal()">Вернуться</button>
</div>
</div>

<script>

const topBox=document.getElementById("top");
const bottomBox=document.getElementById("bottom");

const state={
lang:"ru",
mode:null,
step:"intro"
};

const TXT={

ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения осознанности",
wake:"ЯВЬ",
dream:"СОН",
ready:"Готово",
turn:"Повернись к Югу",
hint:"(там где солнце в полдень)",
time:"Какое время суток?",
next:"Далее",

intro:[
"Что ты делал(а) 5 минут назад?",
"Я наблюдаю...",
"В каком направлении твой Дом?",
"Посмотри на свои руки",
"Какое у тебя сейчас настроение?"
],

emissary:
`Здравствуй.

Я — Эмиссар Сновидений.

На русском языке меня зовут ОСоЗНАЙКА!

ОС — Осознанное Сновидение + Знание.

Я твой Друг и Попутчик на Пути Осознания.

Я смотрю из глубины твоего Внимания.

Напоминаю об осознанности.

Настрой частоту напоминаний —
и я буду с тобой.

И я отвечу на вопросы в этом Приложении.

Мы встретимся.`
},

en:{
brand:"AWARENESSY!",
sub:"Awareness trainer",
wake:"WAKE",
dream:"DREAM",
ready:"Ready",
turn:"Turn to South",
hint:"(where sun is at noon)",
time:"What time is it?",
next:"Next",

intro:[
"What were you doing 5 minutes ago?",
"I observe...",
"Where is your Home?",
"Look at your hands",
"How do you feel right now?"
],

emissary:
`Hello,

I am the Dream Emissary.

In English, my name is AWARENESSY!

I am your Friend and Companion
on the Path of Awareness.

I watch from the depths
of your Attention.

I remind you of awareness.

Set the frequency of reminders,
and I will be with you.

And I will answer your questions
in this Application.

We will meet.`
},

es:{
brand:"¡CONCIENCITO!",
sub:"Entrenador de consciencia",
wake:"VIGILIA",
dream:"SUEÑO",
ready:"Listo",
turn:"Gira al Sur",
hint:"(donde está el sol al mediodía)",
time:"¿Qué hora del día?",
next:"Siguiente",

intro:[
"¿Qué hacías hace 5 minutos?",
"Observo...",
"¿Dónde está tu hogar?",
"Mira tus manos",
"¿Cómo te sientes ahora?"
],

emissary:
`Hola,

Soy el Emisario de los Sueños.

En español,
mi nombre es ¡CONCIENCITO!

Soy tu Amigo y Compañero
en el camino de la Consciencia.

Observo desde lo más profundo
de tu atención.

Te recordaré la consciencia.

Establece la frecuencia
de mis recordatorios
y estaré contigo.

Y responderé las preguntas
de esta aplicación.

Nos veremos.`
}

};

function t(k){
return TXT[state.lang][k];
}

function rand(a){
return a[Math.floor(Math.random()*a.length)];
}

function titleColor(){
return state.mode==="dream" ? "#69b7ff" : "#c9a86a";
}

function header(){
return `
<div id="header">
<div>
<div id="brand"
onclick="openModal()"
style="color:${titleColor()}">${t("brand")}</div>
<div id="sub">${t("sub")}</div>
</div>

<div id="langs">
<button class="mini ${state.lang==="ru"?"active":""}" onclick="setLang('ru')">RU</button>
<button class="mini ${state.lang==="en"?"active":""}" onclick="setLang('en')">EN</button>
<button class="mini ${state.lang==="es"?"active":""}" onclick="setLang('es')">ES</button>
</div>
</div>`;
}

function setLang(v){
state.lang=v;
router();
}

function router(){
if(state.step==="intro") intro();
if(state.step==="south") south();
if(state.step==="time") stepTime();
}

function intro(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="title">${rand(t("intro"))}</div>
</div>`;

bottomBox.innerHTML=`
<div class="row">
<button class="main" onclick="start('wake')">${t("wake")}</button>
<button class="main" onclick="start('dream')">${t("dream")}</button>
</div>
<div id="foot">Awarenessy V5.0</div>`;
}

function start(mode){
state.mode=mode;
state.step="south";

bottomBox.innerHTML=`
<div id="compassWrap">
<img id="compassImg"
src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png">
<svg id="fx" viewBox="0 0 400 400"></svg>
</div>
<div id="foot">Awarenessy V5.0</div>`;

router();
}

function south(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card">
<div class="title"
style="color:${titleColor()}">${t("turn")}</div>
<div class="small">${t("hint")}</div>

<button class="main"
style="margin-top:16px"
onclick="goTime()">${t("ready")}</button>

</div>
</div>`;
}

function goTime(){
state.step="time";
router();
}

function stepTime(){

const arr=state.lang==="ru"
?["Рассвет","Утро","День","Вечер","Закат","Ночь"]
:state.lang==="en"
?["Dawn","Morning","Day","Evening","Sunset","Night"]
:["Amanecer","Mañana","Día","Tarde","Atardecer","Noche"];

topBox.innerHTML=`
${header()}
<div id="content">
<div class="card">
<div class="title"
style="font-size:20px;color:${titleColor()}">${t("time")}</div>

<div class="grid2">
${arr.map(x=>`
<button class="main">${x}</button>
`).join("")}
</div>

</div>
</div>`;
}

function openModal(){

document.getElementById("modal").style.display="flex";

const img=document.getElementById("emissary");
const msg=document.getElementById("msg");

img.style.opacity="0";
msg.style.opacity="0";
msg.innerText="";

img.style.width="94%";

setTimeout(()=>{
img.style.transition="3s";
img.style.opacity=".68";
},200);

setTimeout(()=>{
img.style.transition="1s";
img.style.opacity="0";
},3400);

setTimeout(()=>{
msg.innerText=t("emissary");
msg.style.textAlign="left";
msg.style.opacity="1";
},4700);

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

intro();

</script>
</body>
</html>
