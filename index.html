<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Awarenessy 4.0 Canonical</title>

<style>
:root{
--bg:#050505;
--panel:#101010;
--line:#242424;
--text:#f5f5f5;
--muted:#7e7e7e;
--gold:#c9a86a;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
justify-content:center;
}

#app{
width:100%;
max-width:520px;
height:100vh;
display:flex;
flex-direction:column;
background:
radial-gradient(circle at 20% 18%,rgba(255,255,255,.03),transparent 20%),
radial-gradient(circle at 80% 72%,rgba(255,255,255,.02),transparent 24%),
var(--bg);
}

#top,#bottom{
height:50%;
padding:10px;
}

#top{
display:flex;
flex-direction:column;
}

#bottom{
display:flex;
flex-direction:column;
justify-content:flex-end;
}

#header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:8px;
}

#brand{
font-size:16px;
font-weight:700;
color:var(--gold);
}

#sub{
font-size:11px;
color:#777;
margin-top:2px;
}

#langs{
display:flex;
gap:8px;
}

.mini{
width:50px;
height:42px;
border:none;
border-radius:14px;
background:#161616;
border:1px solid #242424;
color:#ddd;
font-size:13px;
}

.mini.active{
border-color:#c9a86a;
color:#fff;
}

#content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.card{
width:100%;
padding:18px;
border-radius:22px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.05);
}

.title{
font-size:22px;
font-weight:700;
text-align:center;
line-height:1.25;
}

.small{
font-size:14px;
color:#aaa;
text-align:center;
margin-top:8px;
}

.row{
display:flex;
gap:10px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:14px;
}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-top:14px;
}

.column{
display:grid;
grid-template-columns:1fr;
gap:6px;
margin-top:12px;
}

.main{
width:100%;
height:48px;
border:none;
border-radius:14px;
background:linear-gradient(180deg,#1b1b1b,#101010);
border:1px solid #262626;
color:#fff;
font-size:15px;
font-weight:700;
}

.slim{
height:40px;
font-size:12px;
}

input.main{
text-align:center;
font-weight:400;
}

#compassWrap{
position:relative;
width:min(92vw,410px);
height:min(92vw,410px);
margin:0 auto;
}

#compassImg,#fx{
position:absolute;
inset:0;
width:100%;
height:100%;
}

#foot{
font-size:11px;
color:#666;
text-align:center;
margin-top:6px;
}

@keyframes pulse{
0%{opacity:.62}
50%{opacity:1}
100%{opacity:.62}
}

.pulse{
animation:pulse 3s ease-in-out infinite;
}

.fade{
animation:f .35s ease;
}

@keyframes f{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:none}
}
</style>
</head>
<body>

<div id="app">
<div id="top"></div>
<div id="bottom"></div>
</div>

<script>
const topBox=document.getElementById("top");
const bottomBox=document.getElementById("bottom");

const state={
lang:"ru",
step:"intro",
mode:null,
time:null,
activity:null,
dir:null,
distance:null,
emotion:null
};

const TXT={
ru:{
brand:"ОСоЗНАЙКА!",
sub:"Посредник обучения осознанности",
wake:"ЯВЬ",
dream:"СОН",
ready:"Готово",
turn:"Повернись к Югу",
hint:"(там где солнце в полдень)",
time:"Какое время суток?",
doing:"Что сейчас здесь делаешь?",
home:"Где твой Дом?",
dist:"Как далеко?",
emo:"Эмоция",
saved:"Запись сохранена",
ok:"OK",
next:"Далее",
times:["Рассвет","Утро","День","Вечер","Закат","Ночь"]
},
en:{
brand:"Awarenessy!",
sub:"Awareness trainer",
wake:"WAKE",
dream:"DREAM",
ready:"Ready",
turn:"Turn to South",
hint:"(where sun is at noon)",
time:"What time is it?",
doing:"What are you doing here now?",
home:"Where is Home?",
dist:"How far?",
emo:"Emotion",
saved:"Saved",
ok:"OK",
next:"Next",
times:["Dawn","Morning","Day","Evening","Sunset","Night"]
},
es:{
brand:"¡Awarenessy!",
sub:"Entrenador de consciencia",
wake:"VIGILIA",
dream:"SUEÑO",
ready:"Listo",
turn:"Gira al Sur",
hint:"(donde está el sol al mediodía)",
time:"¿Qué hora del día?",
doing:"¿Qué haces aquí ahora?",
home:"¿Dónde está tu hogar?",
dist:"¿Qué tan lejos?",
emo:"Emoción",
saved:"Guardado",
ok:"OK",
next:"OK",
times:["Amanecer","Mañana","Día","Tarde","Atardecer","Noche"]
}
};

function t(k){
return TXT[state.lang][k];
}

function header(){
return `
<div id="header">
<div>
<div id="brand">${t("brand")}</div>
<div id="sub">${t("sub")}</div>
</div>
<div id="langs">
<button class="mini ${state.lang==="ru"?"active":""}" onclick="setLang('ru')">RU</button>
<button class="mini ${state.lang==="en"?"active":""}" onclick="setLang('en')">EN</button>
<button class="mini ${state.lang==="es"?"active":""}" onclick="setLang('es')">ES</button>
</div>
</div>`;
}

function setLang(v){
state.lang=v;
router();
}

function router(){
if(state.step==="intro") intro();
if(state.step==="south") stepSouth();
if(state.step==="time") stepTime();
if(state.step==="doing") stepDoing();
if(state.step==="home") stepHome();
if(state.step==="dist") stepDist();
if(state.step==="emo") stepEmotion();
if(state.step==="done") done();
}

function intro(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="title fade">Я наблюдаю...</div>
</div>`;

bottomBox.innerHTML=`
<div class="row">
<button class="main" onclick="start('wake')">${t("wake")}</button>
<button class="main" onclick="start('dream')">${t("dream")}</button>
</div>
<div id="foot">Awarenessy 4.0 Canonical</div>`;
}

function start(mode){
state.mode=mode;
compass();
state.step="south";
router();
}

function compass(){
bottomBox.innerHTML=`
<div id="compassWrap">
<img id="compassImg" src="https://i.postimg.cc/L56hkxFV/Archicompass-1.png">
<svg id="fx" viewBox="0 0 400 400"></svg>
</div>
<div id="foot">Awarenessy 4.0 Canonical</div>`;
drawFX();
}

function stepSouth(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("turn")}</div>
<div class="small">${t("hint")}</div>
<button class="main" style="margin-top:16px" onclick="gotoTime()">${t("ready")}</button>
</div>
</div>`;
}

function gotoTime(){
state.step="time";
router();
}

function stepTime(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("time")}</div>
<div class="grid2">
${t("times").map((x,i)=>`
<button class="main" onclick="pickTime(${i})">${x}</button>`).join("")}
</div>
</div>
</div>`;
}

function pickTime(i){
state.time=i;
drawFX();
state.step="doing";
router();
}

function stepDoing(){
const list=[
"Творю","Работаю","Учусь","Иду / Еду","Отдыхаю",
"Ем","Выпиваю / прочее","Развлекаюсь","Торможу"
];

topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("doing")}</div>
<div class="column">
${list.map(v=>`
<button class="main slim" onclick="pickActivity('${v}')">${v}</button>`).join("")}
<input class="main slim" placeholder="Другое...">
</div>
</div>
</div>`;
}

function pickActivity(v){
state.activity=v;
state.step="home";
router();
}

function stepHome(){
const dirs=[
["nw","↖"],["n","↑"],["ne","↗"],
["w","←"],["c","Я"],["e","→"],
["sw","↙"],["s","↓"],["se","↘"]
];

topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("home")}</div>
<div class="grid3">
${dirs.map(d=>`
<button class="main" onclick="pickDir('${d[0]}')">${d[1]}</button>`).join("")}
</div>
</div>
</div>`;
}

function pickDir(v){
state.dir=v;
drawFX();

if(v==="c"){
state.distance=0;
state.step="emo";
}else{
state.step="dist";
}
router();
}

function stepDist(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("dist")}</div>
<div class="column">
<button class="main" onclick="pickDistance(1)">Близко</button>
<button class="main" onclick="pickDistance(2)">Средне</button>
<button class="main" onclick="pickDistance(3)">Далеко</button>
</div>
</div>
</div>`;
}

function pickDistance(v){
state.distance=v;
drawFX();
state.step="emo";
router();
}

function stepEmotion(){
const list=[
["#FFD700","Радость"],
["#FFFFFF","Творчество"],
["#3F51B5","Вдохновение"],
["#26C6DA","Мечтательность"],
["#808080","Нейтральность"],
["#4CAF50","Тоска"],
["#F44336","Гнев"],
["#FF9800","Самоуверенность"],
["#000000","Хаос"]
];

topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("emo")}</div>
<div class="column">
${list.map(x=>`
<button class="main slim"
onclick="pickEmotion('${x[0]}')">${x[1]}</button>`).join("")}
</div>
</div>
</div>`;
}

function pickEmotion(c){
state.emotion=c;
drawFX();
setTimeout(()=>{
state.step="done";
router();
},400);
}

function done(){
topBox.innerHTML=`
${header()}
<div id="content">
<div class="card fade">
<div class="title">${t("saved")}</div>
<button class="main" style="margin-top:14px" onclick="resetAll()">${t("ok")}</button>
</div>
</div>`;
}

function resetAll(){
location.reload();
}

function drawFX(){
const svg=document.getElementById("fx");
if(!svg)return;
svg.innerHTML="";

drawTimeGlow(svg);
drawDirection(svg);
}

function drawTimeGlow(svg){
if(state.time===null)return;

/*
0 dawn left(E)
1 morning upper-left
2 day top(S)
3 evening upper-right
4 sunset right(W)
5 night bottom(N)
*/

const map=[6,7,0,1,2,4];
const idx=map[state.time];

for(let k=-2;k<=2;k++){
let i=(idx+k+8)%8;
let power=[0.18,0.45,1,0.45,0.18][k+2];

const col=[
"#ff3fcf",
"#7be7ff",
"#ffd76a",
"#7be7ff",
"#ff3fcf",
"#3569ff"
][state.time];

const step=Math.PI*2/8;
const a0=-Math.PI/2-step/2+i*step;
const a1=a0+step;

svg.innerHTML+=`
<path d="${sector(188,198,a0,a1)}"
fill="${col}"
opacity="${power}"/>`;
}
}

function drawDirection(svg){
if(!state.dir)return;

if(state.dir==="c"){
svg.innerHTML+=`
<circle cx="200" cy="200" r="46"
fill="none"
stroke="${state.emotion||'white'}"
stroke-width="8"
opacity=".65"
class="pulse"/>`;
return;
}

const map={
n:0,ne:1,e:2,se:3,s:4,sw:5,w:6,nw:7
};

const idx=map[state.dir];
const step=Math.PI*2/8;
const a0=-Math.PI/2-step/2+idx*step;
const a1=a0+step;

const rings={
1:[48,92],
2:[48,138],
3:[48,184]
};

const rr=rings[state.distance||1];

svg.innerHTML+=`
<path d="${sector(rr[0],rr[1],a0,a1)}"
fill="none"
stroke="${state.emotion||'white'}"
stroke-width="18"
opacity=".35"
filter="blur(8)"/>`;

svg.innerHTML+=`
<path d="${sector(rr[0],rr[1],a0,a1)}"
fill="${state.emotion||'white'}"
opacity=".18"/>`;
}

function sector(ir,or,a0,a1){
function p(r,a){
return [200+Math.cos(a)*r,200+Math.sin(a)*r];
}
const A=p(or,a0),B=p(or,a1),C=p(ir,a1),D=p(ir,a0);
return `
M ${A[0]} ${A[1]}
A ${or} ${or} 0 0 1 ${B[0]} ${B[1]}
L ${C[0]} ${C[1]}
A ${ir} ${ir} 0 0 0 ${D[0]} ${D[1]}
Z`;
}

intro();
</script>
</body>
</html>
